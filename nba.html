<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0f14">
<title>Hardwood IQ</title>
<style>
:root{
  --bg:#0b0f14; --card:#131a23; --card2:#1a2330; --line:#243043;
  --text:#e8eef6; --muted:#8ea0b5; --accent:#f97316; --accent2:#fdba74;
  --green:#22c55e; --red:#ef4444; --amber:#f59e0b;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; background:var(--bg); color:var(--text);
  font:16px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
.hidden{ display:none !important; }
header{ position:sticky; top:0; z-index:20; background:rgba(11,15,20,.92);
  -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
  padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
  display:flex; align-items:center; gap:8px; }
header h1{ font-size:18px; margin:0; letter-spacing:.3px; }
header h1 span{ color:var(--accent); }
.badge{ font-size:11px; color:var(--accent2); border:1px solid var(--accent);
  border-radius:999px; padding:1px 8px; font-weight:600; }
.pill{ font-size:11px; border-radius:999px; padding:2px 8px;
  border:1px solid var(--line); color:var(--muted); }
main{ padding:12px 12px calc(84px + env(safe-area-inset-bottom));
  max-width:760px; margin:0 auto; }
.card{ background:var(--card); border:1px solid var(--line);
  border-radius:14px; padding:12px; margin-bottom:12px; }
.card h2{ margin:0 0 8px; font-size:13px; color:var(--accent2);
  text-transform:uppercase; letter-spacing:.6px; }
.btn{ background:var(--accent); color:#0b0f14; border:0; border-radius:10px;
  padding:10px 14px; font-weight:700; font-size:14px; }
.btn.ghost{ background:var(--card2); color:var(--text); border:1px solid var(--line); }
.btn:disabled{ opacity:.45; }
input[type=text],input[type=number],input[type=password]{
  background:var(--card2); border:1px solid var(--line); color:var(--text);
  border-radius:10px; padding:9px 10px; font-size:15px; width:100%; }
input[type=checkbox]{ width:20px; height:20px; accent-color:var(--accent); }
.row{ display:flex; align-items:center; gap:10px; }
.row .grow{ flex:1; }
.muted{ color:var(--muted); } .small{ font-size:12px; }
.datebar{ display:flex; gap:8px; align-items:center; margin-bottom:10px; }
.datebar .dstep{ width:44px; height:40px; border-radius:10px; background:var(--card2);
  border:1px solid var(--line); color:var(--text); font-size:18px; }
.datebar .dlabel{ flex:1; text-align:center; font-weight:700; }
.datebar .dpick{ flex:1; text-align:center; font-weight:700; font-size:15px;
  height:40px; border-radius:10px; background:var(--card2);
  border:1px solid var(--line); color:var(--text); padding:0 10px;
  -webkit-appearance:none; appearance:none; }
.datebar .dpick::-webkit-date-and-time-value{ text-align:center; }
.datebar .dpick::-webkit-calendar-picker-indicator{ filter:invert(1); opacity:.7; }
.gmark{ font-weight:800; }
.gmark.y{ color:var(--green); }
.gmark.n{ color:var(--red); }
.dday{ border-bottom:1px solid var(--line); }
.dday summary{ display:flex; justify-content:space-between; align-items:center;
  padding:9px 2px; cursor:pointer; list-style:none; }
.dday summary::-webkit-details-marker{ display:none; }
.dday summary > span:first-child{ font-weight:700; }
.dday[open] summary{ color:var(--accent2); }
.ddaybody{ padding:2px 2px 10px; }
.game{ display:flex; align-items:center; justify-content:space-between;
  background:var(--card); border:1px solid var(--line); border-radius:14px;
  padding:12px; margin-bottom:10px; }
.game .teams{ font-weight:700; }
.game .sub{ color:var(--muted); font-size:12px; margin-top:2px; }
.status-pre{ color:var(--muted); } .status-in{ color:var(--amber); }
.status-post{ color:var(--green); }
.tbl{ width:100%; border-collapse:collapse; font-size:13px; }
.tbl th,.tbl td{ text-align:left; padding:7px 6px; border-bottom:1px solid var(--line); }
.tbl th{ color:var(--muted); font-weight:600; font-size:11px;
  text-transform:uppercase; letter-spacing:.5px; }
.rate-good{ color:var(--green); font-weight:700; }
.rate-bad{ color:var(--red); font-weight:700; }
.lock{ color:var(--accent); font-weight:700; }
.chip{ display:inline-block; padding:4px 10px; border-radius:999px; border:1px solid var(--line);
  color:var(--muted); font-size:12px; margin:0 6px 6px 0; }
.chip.on{ color:#0b0f14; background:var(--accent); border-color:var(--accent); font-weight:700; }
.daterow{ display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--line); }
nav#tabbar{ position:fixed; bottom:0; left:0; right:0; z-index:30; display:flex;
  background:rgba(15,20,28,.96); border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom); }
nav#tabbar button{ flex:1; background:none; border:0; color:var(--muted);
  padding:10px 0 8px; font-size:12px; font-weight:600; }
nav#tabbar button .ico{ display:block; font-size:20px; margin-bottom:2px; }
nav#tabbar button.active{ color:var(--accent); }
#pinGate{ position:fixed; inset:0; z-index:50; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:24px; text-align:center; }
#pinGate .logo{ font-size:40px; }
#pinGate input{ text-align:center; font-size:22px; letter-spacing:6px; max-width:220px; }
#toast{ position:fixed; left:50%; transform:translateX(-50%);
  bottom:calc(96px + env(safe-area-inset-bottom)); background:var(--card2);
  border:1px solid var(--line); color:var(--text); padding:10px 14px;
  border-radius:12px; font-size:13px; z-index:60; max-width:86%; }
/* unified readability pass */
body{font-size:16px}
#tabbar button{font-size:12px;padding-top:10px;padding-bottom:9px}
#tabbar .ico{font-size:21px}
</style>
</head>
<body>

<div id="pinGate">
  <div class="logo">&#127936;</div>
  <h1 style="margin:8px 0 2px">Hardwood <span style="color:var(--accent)">IQ</span></h1>
  <div class="muted small" style="margin-bottom:18px">Members only &mdash; NBA projections &amp; tracked accuracy</div>
  <div id="gateAd" class="card" style="max-width:340px;width:100%;text-align:left"></div>
  <input id="pinInput" type="password" inputmode="numeric" autocomplete="off" placeholder="PIN">
  <div style="height:10px"></div>
  <button class="btn" id="pinBtn">Enter</button>
  <div id="pinMsg" class="small" style="color:var(--red);height:18px;margin-top:8px"></div>
</div>

<div id="app" class="hidden">
  <header>
    <h1>Hardwood <span>IQ</span></h1>
    <span class="badge" id="verBadge"></span>
    <div style="flex:1"></div>
    <span class="pill" id="fbPill"></span>
  </header>
  <main>
    <section id="tab-games">
      <div class="datebar">
        <button class="dstep" id="dPrev">&#8249;</button>
        <input type="date" class="dpick" id="dPick">
        <button class="dstep" id="dNext">&#8250;</button>
      </div>
      <div class="row" style="margin-bottom:10px">
        <button class="btn grow" id="loadBtn">Load Slate</button>
        <button class="btn ghost" id="projBtn">Project Slate</button>
        <button class="btn ghost" id="todayBtn">Today</button>
      </div>
      <input type="text" id="gameSearch" placeholder="Search teams&hellip; (bet search arrives with props)" style="margin-bottom:10px">
      <div id="gamesList"></div>
      <div id="gameDetail" class="hidden"></div>
    </section>
    <section id="tab-bets" class="hidden"></section>
    <section id="tab-facts" class="hidden"></section>
    <section id="tab-settings" class="hidden"></section>
  </main>
  <nav id="tabbar">
    <button data-tab="games" class="active"><span class="ico">&#127936;</span>Today</button>
    <button data-tab="bets"><span class="ico">&#128274;</span>Bets</button>
    <button data-tab="facts"><span class="ico">&#128202;</span>Results</button>
    <button data-tab="settings"><span class="ico">&#9881;&#65039;</span>Settings</button>
  </nav>
</div>
<div id="toast" class="hidden"></div>

<script>
'use strict';
/* ==========================================================================
   HARDWOOD IQ — build stages
   v0.1 skeleton [done]: tabs, PIN gate, date slates (load-on-tap only),
        cache armor (BUG 1), units architecture (BUG 5), settings, injuries,
        Firebase placeholder.
   v0.2 data layer [done]: rosters -> position map (BUG 2), compact game
        records + day markers (raw ESPN payloads never persisted), walk-forward
        player/team logs, per-prop sigma/confidence plumbing (BUG 4).
   v0.3 model [done]: pace x off/def efficiency scores, HCA from real home
        margins, rest/B2B adjustment, opponent-vs-position defense factors,
        player pts/reb/ast projections + per-prop confidence (BUG 4),
        Project Slate, bet search, locks-only Bets tab.
   v0.4 grading [done]: regrade-all from stored records into raw units,
        All-Time record, by-date drilldown, auto-tuner (thresholds+tolerances).
   v0.5 DK odds [done]: manual game-lines pull (events-first, quota-aware),
        DK line in game detail, per-date snapshots, vs-DK record.
   v0.6 Firebase + automation [done]: shared nflbets-45561, nba_* docs via
        open-rules REST (config/PIN, allTime, dkOdds, dkQuota, heartbeat,
        dkPull); dk_pull.js + workflow YAML ship alongside this file.
   ========================================================================== */

/* ============ 0. CONFIG ============ */
const APP = { name: 'Hardwood IQ', version: '0.6.0' };
const CACHE_VERSION = 'v1'; // bump to abandon poisoned caches
const TZ = 'America/Los_Angeles';
const SEASON = { label: '2025-26', start: '2025-10-21' }; // update when the 2026-27 schedule drops

// ---- FIREBASE (SHARED with Gridline) ---------------------------------------
// Same project as the NFL app. Every NBA doc lives in the 'nba' collection
// (plus 'nba_accuracy' for per-slate units), so nothing touches Gridline's
// docs. Open-rules Firestore via REST, no SDK — same pattern as the NFL build.
const FB = {
  projectId: 'nflbets-45561',
  apiKey: 'AIzaSyAznP57admgAtnJqnMu7uJ6WZYpYjrIP3g'
};
function fbReady(){ return FB.projectId.length > 0; }
const FB_NS = 'nba';                 // singleton docs: nba/config, nba/dkOdds, ...
const FB_ACC = 'nba_accuracy';       // per-slate unit docs: nba_accuracy/2026-01-15
const FB_DK = 'nba_dk';              // per-date DK line snapshots: nba_dk/2026-01-15
const ODDS_KEY_SHARED = '370bfb0e8958dcfc4e4880fedfb548b1'; // the-odds-api, used by the automated pull

function fbDocUrl(col, doc){
  return 'https://firestore.googleapis.com/v1/projects/' + FB.projectId +
    '/databases/(default)/documents/' + col + '/' + doc + '?key=' + FB.apiKey;
}
// Every doc is { data: <JSON string>, t: <ISO> } — trivial encode/decode.
async function fbRead(col, doc){
  if (!fbReady()) return null;
  const res = await fetch(fbDocUrl(col, doc));
  if (res.status === 404) return null;
  if (!res.ok) throw new Error('FB read ' + res.status);
  const j = await res.json();
  const s = j.fields && j.fields.data && j.fields.data.stringValue;
  return s ? JSON.parse(s) : null;
}
async function fbWrite(col, doc, obj){
  if (!fbReady()) return false;
  const body = { fields: { data: { stringValue: JSON.stringify(obj) }, t: { stringValue: new Date().toISOString() } } };
  const res = await fetch(fbDocUrl(col, doc), {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('FB write ' + res.status);
  return true;
}
async function fbListCol(col){
  if (!fbReady()) return {};
  const url = 'https://firestore.googleapis.com/v1/projects/' + FB.projectId +
    '/databases/(default)/documents/' + col + '?pageSize=400&key=' + FB.apiKey;
  const res = await fetch(url);
  if (!res.ok) throw new Error('FB list ' + res.status);
  const j = await res.json();
  const out = {};
  for (const d of (j.documents || [])){
    const id = d.name.split('/').pop();
    const s = d.fields && d.fields.data && d.fields.data.stringValue;
    if (s){ try { out[id] = JSON.parse(s); } catch (e) {} }
  }
  return out;
}
async function fbListAccuracy(){ return fbListCol(FB_ACC); }
// Compact game records mirrored to Firestore so a fresh device (or the grading
// cron's throwaway browser) can seed the whole season in ONE read instead of
// re-fetching ~1,300 ESPN summaries. One doc per completed date.
const FB_RECS = 'nba_recs';

// Placeholder member PIN. Once Firebase config sync is wired the synced PIN
// takes over; until then, change this constant to whatever you want.
const PLACEHOLDER_PIN = '1111';

const ESPN = {
  scoreboard: function(d){ return 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard?dates=' + d; },
  summary: function(id){ return 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/summary?event=' + id; },
  roster: function(teamId){ return 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/teams/' + teamId + '/roster'; },
  teams: function(){ return 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/teams?limit=40'; }
};

// the-odds-api — the key lives in Settings (on-device only). The GitHub
// Action will read it from a repo secret. Never hardcode it here: this file
// ships in a public repo.
const ODDS = {
  sportKey: 'basketball_nba',
  bookmaker: 'draftkings',
  events: function(k){ return 'https://api.the-odds-api.com/v4/sports/basketball_nba/events?apiKey=' + k; },
  gameLines: function(k){ return 'https://api.the-odds-api.com/v4/sports/basketball_nba/odds/?regions=us&markets=h2h,spreads,totals&oddsFormat=american&bookmakers=draftkings&apiKey=' + k; }
};

/* ============ 1. STATE & LOG ============ */
const state = {
  slateDate: null,   // 'YYYY-MM-DD' in PT, set at boot
  slate: null,       // { date, games: [] }
  units: [],         // graded raw units (populated at the grading stage)
  settings: null,
  posMap: null,      // athleteId -> { p, n, t } from real rosters (BUG 2)
  priorPlayer: {},   // athleteId -> { name, pos, tm, rows: [...] }
  teamLog: {},       // teamId -> [{ date, opp, home, pf, pa, poss }]
  coverage: null,    // built-data summary { games, players, from, to, kb }
  scan: null,        // active build-data run { running, stop }
  projections: {},   // gameId -> projection (cleared on every slate load)
  defCache: null,    // opponent-vs-position factors, keyed by beforeDate
  lgCache: null,     // league baselines, keyed by beforeDate
  seasonUnits: {},   // date -> raw units[] (rebuilt from records; FB-syncable)
  dkGrades: {},      // date -> { n, usHit, dkHit } where DK snapshots exist
  dkByDate: {},      // date -> DK snapshot (seeded from nba_dk for cron grading)
  dkOdds: null,      // { date, fetched, games: { 'AWY@HOM': {...} } }
  fbConfig: null,    // synced nba/config (pin + settings) once read
  factsCat: 'allLocks',
  openGameId: null,
  log: []
};

function logEvent(level, area, msg){
  const t = new Date().toISOString().slice(11, 19);
  state.log.push({ t: t, level: level, area: area, msg: msg });
  if (state.log.length > 300) state.log.shift();
  if (level === 'err') console.error('[' + area + '] ' + msg);
}

/* ============ 2. CACHE LAYER (BUG 1 armor) ============ */
const memCache = {};

function cacheKey(url){
  // FULL url — a truncated key made every game share one box score in the
  // NFL build and accuracy looked godlike. Never shorten this.
  return 'hiq_' + CACHE_VERSION + '_' + url;
}

function purgeStaleCache(){
  const keep = 'hiq_' + CACHE_VERSION + '_';
  const doomed = [];
  for (let i = 0; i < localStorage.length; i++){
    const k = localStorage.key(i);
    if (k && /^hiq_v\d+_/.test(k) && k.indexOf(keep) !== 0) doomed.push(k);
  }
  for (const k of doomed){ try { localStorage.removeItem(k); } catch (e) {} }
  if (doomed.length) logEvent('info', 'cache', 'purged ' + doomed.length + ' stale-version entries');
}

function countKeys(re){
  let n = 0;
  for (let i = 0; i < localStorage.length; i++){
    const k = localStorage.key(i);
    if (k && re.test(k)) n++;
  }
  return n;
}
function removeKeys(re){
  const doomed = [];
  for (let i = 0; i < localStorage.length; i++){
    const k = localStorage.key(i);
    if (k && re.test(k)) doomed.push(k);
  }
  for (const k of doomed){ try { localStorage.removeItem(k); } catch (e) {} }
  return doomed.length;
}
// URL cache = raw fetched payloads keyed by full URL. Built data = the parsed
// game records / day markers / roster map that scans spend minutes producing.
// They clear separately so a cache wipe never destroys hours of built history.
function clearUrlCache(){
  const n = removeKeys(/^hiq_v\d+_https?:/);
  for (const k in memCache) delete memCache[k];
  return n;
}
function deleteBuiltData(){ return removeKeys(/^hiq_v\d+_(rec_|day_|posmap)/); }

function safeSetItem(key, val){
  try { localStorage.setItem(key, val); return true; }
  catch (e){
    // iOS quota — evict the URL cache only (never settings/PIN/built records).
    logEvent('warn', 'cache', 'quota hit — evicting URL cache');
    const n = clearUrlCache();
    try {
      localStorage.setItem(key, val);
      logEvent('info', 'cache', 'recovered after evicting ' + n + ' entries');
      return true;
    } catch (e2){
      logEvent('err', 'cache', 'write still failing: ' + e2.message);
      return false;
    }
  }
}

async function cachedJSON(url, opts){
  opts = opts || {};
  const key = cacheKey(url);
  if (Object.prototype.hasOwnProperty.call(memCache, key)) return memCache[key];
  try {
    const raw = localStorage.getItem(key);
    if (raw != null){ const j = JSON.parse(raw); memCache[key] = j; return j; }
  } catch (e){ logEvent('warn', 'cache', 'read fail: ' + e.message); }
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const j = await res.json();
  memCache[key] = j;
  // Only persist payloads that are final; live data stays memory-only.
  const persist = typeof opts.persistIf === 'function' ? !!opts.persistIf(j) : opts.persist !== false;
  if (persist) safeSetItem(key, JSON.stringify(j));
  return j;
}

// Verify every summary belongs to the game we asked for; evict poisoned entries.
// Raw summaries are MEMORY-ONLY (each runs 100-300KB and this origin's
// localStorage is shared with your other jeells96 apps). The data layer
// persists a ~2-4KB parsed record per game instead — same information the
// model needs at a fraction of the quota.
async function fetchSummary(eventId){
  const url = ESPN.summary(eventId);
  const summary = await cachedJSON(url, { persist: false });
  const sid = summary && summary.header && summary.header.id;
  if (sid != null && String(sid) !== String(eventId)){
    logEvent('err', 'data', 'summary mismatch: asked ' + eventId + ' got ' + sid + ' — discarded + evicted');
    try { localStorage.removeItem(cacheKey(url)); } catch (e) {}
    delete memCache[cacheKey(url)];
    return null;
  }
  return summary;
}

/* ============ 3. SETTINGS (on-device; Firebase config sync layers on later) ============ */
const SETTINGS_KEY = 'hiq_settings'; // outside the hiq_v*_ pattern -> purge never touches it

function defaultSettings(){
  return {
    lockThresholds: {},   // overrides per th-key (winner / lines / props)
    hitTol: {},           // overrides per tol-key (pts / stat)
    markets: { winner: true, total: true, teamPts: true, playerPts: true, playerReb: true, playerAst: true },
    oddsApiKey: '',
    autoPull: false       // background DK pull — needs Firebase
  };
}
function loadSettings(){
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    if (raw) return Object.assign(defaultSettings(), JSON.parse(raw));
  } catch (e) {}
  return defaultSettings();
}
function saveSettings(){
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings)); }
  catch (e){ logEvent('err', 'settings', 'save failed: ' + e.message); }
}

/* ============ 4. UNITS ARCHITECTURE (BUG 5 fix) ============
   Grading emits raw units carrying metric + raw miss distance. Thresholds
   and tolerances apply at read time, so any knob change re-grades the
   current slate, the full-season scan and history instantly, no refetch. */
const CAT_META = {
  winner:    { label: 'Winner',              th: 'winner', short: 'Winner' },
  total:     { label: 'Game Total \u00b1T',  th: 'lines',  short: 'Total' },
  teamPts:   { label: 'Team Points \u00b1T', th: 'lines',  short: 'Team pts' },
  playerPts: { label: 'Player Points \u00b1T',   th: 'props', short: 'Points' },
  playerReb: { label: 'Player Rebounds \u00b1T', th: 'props', short: 'Rebounds' },
  playerAst: { label: 'Player Assists \u00b1T',  th: 'props', short: 'Assists' },
  dkML:      { label: 'vs DK \u00b7 ML value',   th: 'dk', short: 'DK ML' },
  dkTotal:   { label: 'vs DK \u00b7 Total O/U',  th: 'dk', short: 'DK Tot' },
  dkSpread:  { label: 'vs DK \u00b7 Spread ATS', th: 'dk', short: 'DK ATS' }
};
const TOL_KEY_BY_CAT = { total: 'pts', teamPts: 'pts', playerPts: 'stat', playerReb: 'stat', playerAst: 'stat' };
const LOCK_DEFAULTS = { winner: 60, lines: 0, props: 0, dk: 0 };
const TOL_DEFAULTS = { pts: 4, stat: 3 };

function lockTh(key){
  const lt = (state.settings && state.settings.lockThresholds) || {};
  const v = +lt[key];
  return isFinite(v) && lt[key] !== '' && lt[key] != null ? Math.max(0, Math.min(99, v)) : LOCK_DEFAULTS[key];
}
function hitTol(key){
  const ht = (state.settings && state.settings.hitTol) || {};
  const v = +ht[key];
  return isFinite(v) && ht[key] !== '' && ht[key] != null && v > 0 ? Math.min(50, v) : TOL_DEFAULTS[key];
}
function unitQualifies(u){ return u.metric >= lockTh(CAT_META[u.cat].th); }
function unitHit(u){
  const tk = TOL_KEY_BY_CAT[u.cat];
  if (tk && u.adelta != null) return u.adelta <= hitTol(tk);
  return !!u.hit;
}
function aggregateUnits(units){
  const cats = {};
  for (const k in CAT_META){ if (typeof window!=='undefined' && window.__DK_OK===false && /^dk/.test(k)) continue; cats[k] = { hit: 0, n: 0, label: CAT_META[k].label }; }
  const all = { hit: 0, n: 0, label: 'All Locks' };
  for (const u of units){
    if (typeof window!=='undefined' && window.__DK_OK===false && /^dk/.test(u.cat)) continue; 
    if (!cats[u.cat] || !unitQualifies(u)) continue;
    const h = unitHit(u);
    cats[u.cat].n++; if (h) cats[u.cat].hit++;
    all.n++; if (h) all.hit++;
  }
  return Object.assign({ allLocks: all }, cats);
}
function sortedCatEntries(cats){
  const entries = Object.entries(cats);
  const pinned = entries.filter(function(e){ return e[0] === 'allLocks'; });
  const rest = entries.filter(function(e){ return e[0] !== 'allLocks'; }).sort(function(a, b){
    const ap = a[1].n ? a[1].hit / a[1].n : -1, bp = b[1].n ? b[1].hit / b[1].n : -1;
    return (bp - ap) || (b[1].n - a[1].n);
  });
  return pinned.concat(rest);
}

/* ============ 5. MODEL SCAFFOLDING (filled at v0.3) ============ */
// League-typical per-game sigma priors by position/stat — starting estimates;
// TUNE from our own accumulated box scores once the data layer runs.
const SIGMA_PRIOR = {
  G: { pts: 9, reb: 3, ast: 4 },
  F: { pts: 8, reb: 4, ast: 3 },
  C: { pts: 7, reb: 5, ast: 2 }
};
const PLAYER_RECENCY_DECAY = 0.94; // weight decay per game back
const TEAM_RECENCY_DECAY = 0.97;   // gentler — 82-game season
const SIGMA_MARGIN = 12;           // sd of NBA final margin around a projection
const SIGMA_TOTAL_PRIOR = 18;      // sd of game total around a projection (TUNE from grading)
const SIGMA_TEAMPTS_PRIOR = 11;    // sd of one team's points (TUNE from grading)
const B2B_SELF = 1.5;              // pts a team loses on 0 days rest (TUNE)
const B2B_OPP = 1.0;               // pts its opponent gains (TUNE)
const MIN_AVG_MIN = 15;            // props only for real rotation players
// League-typical per-game MEANS small samples shrink toward (rotation players)
const MEAN_PRIOR = {
  G: { pts: 12, reb: 3.5, ast: 4.5 },
  F: { pts: 12, reb: 5.5, ast: 2.5 },
  C: { pts: 11, reb: 8,   ast: 2 }
};
function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

// Abramowitz–Stegun normal CDF (no dependencies)
function normCdf(x){
  const t = 1 / (1 + 0.2316419 * Math.abs(x));
  const d = 0.3989423 * Math.exp(-x * x / 2);
  const p = d * t * (0.31938153 + t * (-0.356563782 + t * (1.781477937 + t * (-1.821255978 + t * 1.330274429))));
  return x > 0 ? 1 - p : p;
}

// Per-player volatility for a stat, from that player's own recency-weighted
// game log, shrunk toward the positional prior on small samples. beforeDate
// enforces WALK-FORWARD: only games strictly before the slate date count.
function playerStatSigma(p, stat, pos, beforeDate){
  const prior = (SIGMA_PRIOR[pos] || SIGMA_PRIOR.F)[stat] || 8;
  const cur = state.priorPlayer[p.id];
  const rows = cur && cur.rows ? cur.rows.filter(function(r){ return r.date < beforeDate; }) : [];
  if (rows.length < 2) return { sigma: prior, n: rows.length, playerSigma: null };
  let sumW = 0, mean = 0;
  const w = rows.map(function(r, i){ return Math.pow(PLAYER_RECENCY_DECAY, rows.length - 1 - i); });
  rows.forEach(function(r, i){ sumW += w[i]; mean += w[i] * r[stat]; });
  mean = sumW ? mean / sumW : 0;
  let varSum = 0;
  rows.forEach(function(r, i){ varSum += w[i] * Math.pow(r[stat] - mean, 2); });
  const playerSigma = Math.sqrt(sumW ? varSum / sumW : 0);
  const shrink = rows.length / (rows.length + 3);
  const sigma = Math.max(2, shrink * playerSigma + (1 - shrink) * prior);
  return { sigma: sigma, n: rows.length, playerSigma: playerSigma };
}

// BUG-4 fix: per-prop confidence = P(|actual - proj| <= tol) = 2*Phi(tol/sigma) - 1,
// from that player's own sigma. Kills the "every prop says 51%" failure mode.
function propConfidence(p, stat, pos, injuryStatus, beforeDate){
  const tol = hitTol('stat');
  const sg = playerStatSigma(p, stat, pos, beforeDate);
  let conf = (2 * normCdf(tol / sg.sigma) - 1) * 100;
  if (injuryStatus === 'questionable') conf *= 0.75;
  conf = Math.max(5, Math.min(95, Math.round(conf)));
  return { conf: conf, sigma: sg.sigma, sampleN: sg.n, playerSigma: sg.playerSigma };
}

// Injury extraction — ported from Gridline. NBA summaries carry the same
// block, and it matters more here: stars sit often. OUT players get excluded
// from projections/props pre-game; questionable get damped + a Q tag.
function extractInjuries(summary){
  const out = {};
  const blocks = (summary && summary.injuries) || [];
  const OUT_WORDS = ['out', 'inactive', 'injured reserve', 'doubtful', 'suspension', 'not with team'];
  for (const blk of blocks){
    const teamAbbr = (blk.team && (blk.team.abbreviation || blk.team.displayName)) || '';
    for (const inj of (blk.injuries || [])){
      const a = inj.athlete || {};
      if (!a.id) continue;
      const raw = String(inj.status || (inj.type && inj.type.description) || '').toLowerCase();
      let status = null;
      if (OUT_WORDS.some(function(wd){ return raw.indexOf(wd) !== -1; })) status = 'out';
      else if (raw.indexOf('questionable') !== -1 || raw.indexOf('day-to-day') !== -1 || raw.indexOf('probable') !== -1 || raw.indexOf('game-time') !== -1) status = 'questionable';
      if (status) out[String(a.id)] = { status: status, label: inj.status || raw, name: a.displayName || '', team: teamAbbr };
    }
  }
  return out;
}

/* ============ 5.5 DATA LAYER (v0.2) ============
   Each completed game is parsed ONCE into a compact record (~2-4KB) stored
   under hiq_v1_rec_<eventId>. A tiny per-day marker is written when a date is
   fully recorded so re-scans skip it with zero network. Raw ESPN payloads are
   never persisted. Bumping CACHE_VERSION abandons everything (rebuildable). */

const POSMAP_KEY = 'hiq_' + CACHE_VERSION + '_posmap';
const REC_PREFIX = 'hiq_' + CACHE_VERSION + '_rec_';
const DAY_PREFIX = 'hiq_' + CACHE_VERSION + '_day_';
const POSMAP_TTL_MS = 3 * 24 * 3600 * 1000; // trades happen — refresh every 3 days

function sleep(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }

// BUG-2 guard: positions come from real rosters, never guessed from stats.
function normPos(abbr){
  const a = String(abbr || '').toUpperCase();
  if (a.indexOf('G') !== -1) return 'G';
  if (a === 'C') return 'C';
  return 'F'; // F, SF, PF, F/C and unknowns shrink toward the F prior
}

function loadPosMapEnvelope(){
  try {
    const raw = localStorage.getItem(POSMAP_KEY);
    if (raw){ const env = JSON.parse(raw); if (env && env.map) return env; }
  } catch (e) {}
  return null;
}

async function buildPosMap(force, onMsg){
  const env = loadPosMapEnvelope();
  if (!force && env && (Date.now() - env.t) < POSMAP_TTL_MS){
    state.posMap = env.map;
    return env.map;
  }
  const say = onMsg || function(){};
  say('Fetching team list\u2026');
  const tj = await cachedJSON(ESPN.teams(), { persist: false });
  let teams = [];
  try {
    teams = tj.sports[0].leagues[0].teams.map(function(x){ return x.team; });
  } catch (e){ throw new Error('teams payload shape changed'); }
  const map = {};
  for (let i = 0; i < teams.length; i++){
    const t = teams[i];
    say('Rosters ' + (i + 1) + '/' + teams.length + ' \u2014 ' + (t.abbreviation || t.id));
    try {
      const rj = await cachedJSON(ESPN.roster(t.id), { persist: false });
      const raw = (rj && rj.athletes) || [];
      const flat = [];
      for (const entry of raw){
        if (entry && Array.isArray(entry.items)){ for (const a of entry.items) flat.push(a); }
        else if (entry) flat.push(entry);
      }
      for (const a of flat){
        if (!a || a.id == null) continue;
        const pos = a.position && (a.position.abbreviation || a.position.name);
        map[String(a.id)] = { p: normPos(pos), n: a.displayName || '', t: String(t.id) };
      }
    } catch (e){
      logEvent('warn', 'data', 'roster fail ' + (t.abbreviation || t.id) + ': ' + e.message);
    }
    await sleep(80);
  }
  state.posMap = map;
  safeSetItem(POSMAP_KEY, JSON.stringify({ t: Date.now(), map: map }));
  logEvent('info', 'data', 'position map: ' + Object.keys(map).length + ' players from rosters');
  return map;
}

function posForPlayer(pid, boxAbbr){
  const m = state.posMap && state.posMap[String(pid)];
  if (m && m.p) return m.p;
  return boxAbbr ? normPos(boxAbbr) : 'F';
}

/* ---- box-score parsing -> compact record ---- */
function statFind(entries, names){
  for (const s of (entries || [])){
    if (!s) continue;
    const nm = String(s.name || s.abbreviation || s.label || '').toLowerCase();
    for (const want of names){ if (nm === want) return s.displayValue != null ? String(s.displayValue) : null; }
  }
  return null;
}
function attemptsOf(v){ // "41-88" -> 88
  if (v == null) return null;
  const parts = String(v).split('-');
  const n = +parts[parts.length - 1];
  return isFinite(n) ? n : null;
}
function numOf(v){ const n = parseFloat(v); return isFinite(n) ? n : null; }

function parseTeamBlock(summary, teamId){
  const blocks = (summary.boxscore && summary.boxscore.teams) || [];
  const blk = blocks.find(function(b){ return b.team && String(b.team.id) === String(teamId); });
  const st = (blk && blk.statistics) || [];
  return {
    fga: attemptsOf(statFind(st, ['fieldgoalsmade-fieldgoalsattempted'])),
    fta: attemptsOf(statFind(st, ['freethrowsmade-freethrowsattempted'])),
    orb: numOf(statFind(st, ['offensiverebounds'])),
    tov: numOf(statFind(st, ['turnovers', 'totalturnovers']))
  };
}

function parsePlayers(summary){
  const out = [];
  const blocks = (summary.boxscore && summary.boxscore.players) || [];
  for (const blk of blocks){
    const teamId = String((blk.team && blk.team.id) || '');
    const grp = (blk.statistics && blk.statistics[0]) || null;
    if (!grp) continue;
    const keys = (grp.keys || []).map(function(k){ return String(k).toLowerCase(); });
    const labels = (grp.labels || grp.names || []).map(function(k){ return String(k).toLowerCase(); });
    const idx = function(keyNames, labelNames){
      for (const k of keyNames){ const i = keys.indexOf(k); if (i !== -1) return i; }
      for (const l of labelNames){ const i = labels.indexOf(l); if (i !== -1) return i; }
      return -1;
    };
    const iMin = idx(['minutes'], ['min']);
    const iPts = idx(['points'], ['pts']);
    const iReb = idx(['totalrebounds', 'rebounds'], ['reb']);
    const iAst = idx(['assists'], ['ast']);
    for (const row of (grp.athletes || [])){
      const a = row.athlete || {};
      if (a.id == null || row.didNotPlay) continue;
      const s = row.stats || [];
      const min = iMin !== -1 ? numOf(s[iMin]) : null;
      if (min == null || min <= 0) continue; // DNP / 0 min is not a form data point
      out.push({
        id: String(a.id), n: a.displayName || '', tm: teamId,
        p: posForPlayer(a.id, a.position && a.position.abbreviation),
        min: min,
        pts: iPts !== -1 ? (numOf(s[iPts]) || 0) : 0,
        reb: iReb !== -1 ? (numOf(s[iReb]) || 0) : 0,
        ast: iAst !== -1 ? (numOf(s[iAst]) || 0) : 0,
        st: !!row.starter
      });
    }
  }
  return out;
}

function parseGameRecord(summary, dateStr){
  const comp = summary && summary.header && summary.header.competitions && summary.header.competitions[0];
  if (!comp || !comp.status || !comp.status.type || !comp.status.type.completed) return null;
  const comps = comp.competitors || [];
  const h = comps.find(function(c){ return c.homeAway === 'home'; });
  const a = comps.find(function(c){ return c.homeAway === 'away'; });
  if (!h || !a || !h.team || !a.team) return null;
  const side = function(c){
    const tb = parseTeamBlock(summary, c.team.id);
    return {
      id: String(c.team.id), ab: c.team.abbreviation || '?',
      pts: numOf(c.score),
      fga: tb.fga, fta: tb.fta, orb: tb.orb, tov: tb.tov
    };
  };
  return {
    v: 1, id: String(summary.header.id), date: dateStr,
    home: side(h), away: side(a),
    players: parsePlayers(summary)
  };
}

/* ---- record store + hydration ---- */
function recKey(id){ return REC_PREFIX + id; }
function hasRecord(id){ try { return localStorage.getItem(recKey(id)) != null; } catch (e){ return false; } }
function saveRecord(rec){ return safeSetItem(recKey(rec.id), JSON.stringify(rec)); }

function eachStoredRecord(fn){
  const keys = [];
  for (let i = 0; i < localStorage.length; i++){
    const k = localStorage.key(i);
    if (k && k.indexOf(REC_PREFIX) === 0) keys.push(k);
  }
  for (const k of keys){
    try {
      const raw = localStorage.getItem(k);
      const rec = JSON.parse(raw);
      if (rec) fn(rec, raw.length);
    } catch (e) {}
  }
  return keys.length;
}

// poss ~= FGA + 0.44*FTA - ORB + TOV (per team; game pace = mean of the two)
function possessions(t){
  if (t.fga == null || t.fta == null || t.orb == null || t.tov == null) return null;
  return t.fga + 0.44 * t.fta - t.orb + t.tov;
}

function hydrateFromList(records){
  if (!state.posMap){
    const env = loadPosMapEnvelope();
    if (env) state.posMap = env.map;
  }
  const pp = {}, tl = {};
  let n = 0, bytes = 0, minD = null, maxD = null;
  for (const rec of records){
    if (!rec || rec.id == null) continue;
    n++; bytes += JSON.stringify(rec).length;
    if (minD == null || rec.date < minD) minD = rec.date;
    if (maxD == null || rec.date > maxD) maxD = rec.date;
    const ph = possessions(rec.home), pa = possessions(rec.away);
    const poss = (ph != null && pa != null) ? (ph + pa) / 2 : (ph != null ? ph : pa);
    const tRow = function(me, opp, home){
      if (!tl[me.id]) tl[me.id] = [];
      tl[me.id].push({ date: rec.date, opp: opp.ab, oppId: opp.id, home: home, pf: me.pts, pa: opp.pts, poss: poss });
    };
    tRow(rec.home, rec.away, true);
    tRow(rec.away, rec.home, false);
    for (const p of (rec.players || [])){
      if (!pp[p.id]) pp[p.id] = { name: p.n, pos: p.p, tm: p.tm, tmD: rec.date, rows: [] };
      const live = state.posMap && state.posMap[p.id];
      pp[p.id].name = p.n;
      pp[p.id].pos = (live && live.p) || p.p;
      if (rec.date >= pp[p.id].tmD){ pp[p.id].tm = p.tm; pp[p.id].tmD = rec.date; }
      const home = p.tm === rec.home.id;
      pp[p.id].rows.push({ date: rec.date, min: p.min, pts: p.pts, reb: p.reb, ast: p.ast, home: home, opp: home ? rec.away.ab : rec.home.ab });
    }
  }
  const byDate = function(x, y){ return x.date < y.date ? -1 : x.date > y.date ? 1 : 0; };
  for (const k in pp) pp[k].rows.sort(byDate);
  for (const k in tl) tl[k].sort(byDate);
  state.priorPlayer = pp;
  state.teamLog = tl;
  state.lgCache = null; state.defCache = null; // baselines depend on the log
  state.coverage = { games: n, from: minD, to: maxD, players: Object.keys(pp).length, kb: Math.round(bytes / 1024) };
  logEvent('info', 'data', 'hydrated ' + n + ' records \u00b7 ' + state.coverage.players + ' players \u00b7 ~' + state.coverage.kb + 'KB');
  return state.coverage;
}

function hydrateFromStore(){
  const list = [];
  eachStoredRecord(function(rec){ list.push(rec); });
  return hydrateFromList(list);
}

/* Seed the whole season from the cloud that the grading autopilot fills
   (nba_recs/{date}). Hydrates directly from the fetched records so a full
   season projects even when this phone's shared localStorage is too full to
   persist ~1,300 box scores. Opportunistically caches what fits for offline. */
async function hydrateFromCloud(){
  if (!fbReady()){ toast('Cloud off: Firebase not configured', 5000); throw new Error('Firebase not configured'); }
  toast('Cloud: reading nba_recs from ' + FB.projectId + '\u2026', 4000);
  let docs;
  try { docs = await fbListCol(FB_RECS); }
  catch (e){ toast('Cloud read FAILED: ' + e.message, 6000); throw e; }
  const dateCount = Object.keys(docs).length;
  const list = [];
  for (const d in docs){
    const recs = docs[d] && docs[d].recs;
    if (!Array.isArray(recs)) continue;
    for (const rec of recs){
      list.push(rec);
      try { if (rec && rec.id != null && !hasRecord(rec.id)) saveRecord(rec); } catch (e) {}
    }
    if (!dayDone(d)) markDay(d, recs.length);
  }
  if (!list.length){
    logEvent('info', 'data', 'cloud empty (' + dateCount + ' docs) \u2014 nothing to sync yet');
    hydrateFromList(list);
    return { dates: dateCount, games: 0, coverage: state.coverage };
  }
  toast('Cloud: found ' + list.length + ' games across ' + dateCount + ' dates \u2014 hydrating\u2026', 4000);
  hydrateFromList(list);
  const c = state.coverage;
  toast('Cloud loaded: ' + c.games + ' games \u00b7 ' + c.from + '\u2192' + c.to + ' \u00b7 ' + c.players + ' players', 6000);
  return { dates: dateCount, games: list.length, coverage: c };
}

/* ---- resumable date scan ---- */
function dayDone(dateStr){ try { return localStorage.getItem(DAY_PREFIX + dateStr) != null; } catch (e){ return false; } }
function markDay(dateStr, n){ safeSetItem(DAY_PREFIX + dateStr, String(n)); }

async function buildData(fromStr, toStr){
  if (state.scan && state.scan.running) return;
  state.scan = { running: true, stop: false };
  const say = function(msg){ const el = document.getElementById('scanMsg'); if (el) el.textContent = msg; };
  const busy = function(dis){
    ['updBtn', 'rangeBtn', 'rosterBtn'].forEach(function(id){
      const b = document.getElementById(id); if (b) b.disabled = dis;
    });
    const s = document.getElementById('stopBtn'); if (s) s.classList.toggle('hidden', !dis);
  };
  busy(true);
  let recorded = 0, failures = 0;
  try {
    // ESPN's /teams and /roster endpoints don't send CORS headers, so this
    // fetch fails in real browsers (phone AND autopilot). It was aborting the
    // whole build. It's optional by design: parsePlayers reads each player's
    // position straight from the box score (posForPlayer falls back to it),
    // so a missing roster map only means no live-roster override.
    try { await buildPosMap(false, say); }
    catch (e){
      say('Roster map unavailable \u2014 using positions from box scores.');
      logEvent('warn', 'data', 'posMap skipped: ' + e.message);
    }
    let d = fromStr;
    while (d <= toStr){
      if (state.scan.stop){
        say('Stopped at ' + d + ' \u00b7 ' + recorded + ' recorded. Update resumes from the markers.');
        break;
      }
      if (dayDone(d)){ d = addDays(d, 1); continue; }
      say(d + ' \u2026');
      let sb = null;
      try { sb = await cachedJSON(ESPN.scoreboard(toESPN(d)), { persist: false }); }
      catch (e){
        failures++;
        logEvent('warn', 'data', 'scoreboard ' + d + ': ' + e.message);
        d = addDays(d, 1);
        await sleep(200);
        continue;
      }
      const games = parseScoreboard(sb);
      let allFinal = true, dayRecorded = 0;
      for (const g of games){
        if (state.scan.stop) break;
        if (!g.completed){ allFinal = false; continue; }
        if (hasRecord(g.id)){ dayRecorded++; continue; }
        try {
          const summary = await fetchSummary(g.id); // memory-only + BUG-1 verified
          if (!summary){ failures++; allFinal = false; continue; }
          const rec = parseGameRecord(summary, d);
          if (rec && rec.players.length){
            if (saveRecord(rec)){ recorded++; dayRecorded++; }
            else { failures++; allFinal = false; } // quota — logged by safeSetItem
          } else {
            failures++; allFinal = false;
            logEvent('warn', 'data', 'empty parse for ' + g.id);
          }
        } catch (e){
          failures++; allFinal = false;
          logEvent('warn', 'data', 'summary ' + g.id + ': ' + e.message);
        }
        say(d + ' \u00b7 ' + g.away.abbr + '@' + g.home.abbr + ' \u00b7 recorded ' + recorded);
        await sleep(120);
      }
      if (!state.scan.stop && allFinal && d < todayPT()) markDay(d, dayRecorded);
      d = addDays(d, 1);
    }
    if (!state.scan.stop){
      say('Done \u00b7 ' + recorded + ' new games recorded' + (failures ? ' \u00b7 ' + failures + ' failures (see log)' : ''));
      if (recorded > 0 && fbReady()){
        // Cloud sync is automatic: anything built here is shared immediately.
        try {
          say('Backing up to cloud\u2026');
          const pushed = await pushRecsFB();
          say('Done \u00b7 ' + recorded + ' new games recorded \u00b7 ' + pushed + ' day(s) backed up to cloud');
        } catch (e){ logEvent('warn', 'data', 'auto push after build: ' + e.message); }
      }
    }
  } catch (e){
    logEvent('err', 'data', 'build failed: ' + e.message);
    say('Build failed \u2014 ' + e.message);
  } finally {
    state.scan.running = false;
    busy(false);
    hydrateFromStore();
    renderFactsDataCard();
  }
}

/* ============ 5.7 MODEL (v0.3) ============
   Everything here is WALK-FORWARD: given a slate date D, only rows with
   date < D are ever read. Scores come from pace x off/def efficiency (not raw
   points), HCA is estimated from actual home margins in our own data, and the
   weather adjustment from Gridline is replaced by a rest/B2B adjustment. */

function leagueBaselines(beforeDate){
  if (state.lgCache && state.lgCache.date === beforeDate) return state.lgCache;
  let pts = 0, poss = 0, n = 0, paceSum = 0, paceN = 0, margin = 0, homeN = 0;
  for (const tid in state.teamLog){
    for (const r of state.teamLog[tid]){
      if (r.date >= beforeDate) continue;
      n++;
      if (r.poss != null && r.poss > 0){ pts += r.pf; poss += r.poss; paceSum += r.poss; paceN++; }
      if (r.home){ margin += r.pf - r.pa; homeN++; }
    }
  }
  const lg = {
    date: beforeDate,
    ppp: poss > 0 ? pts / poss : 1.12,
    pace: paceN > 0 ? paceSum / paceN : 99,
    hca: homeN >= 20 ? margin / homeN : 2.5, // fall back to a sane prior early-season
    nRows: n
  };
  state.lgCache = lg;
  return lg;
}

function teamForm(tid, beforeDate, lg){
  const allRows = (state.teamLog[tid] || []).filter(function(r){ return r.date < beforeDate; });
  const rows = allRows.filter(function(r){ return r.poss != null && r.poss > 0; });
  const base = {
    off: lg.ppp, def: lg.ppp, pace: lg.pace, n: rows.length,
    b2b: allRows.length > 0 && allRows[allRows.length - 1].date === addDays(beforeDate, -1),
    raw: null
  };
  if (!rows.length) return base;
  let sw = 0, off = 0, def = 0, pace = 0;
  rows.forEach(function(r, i){
    const w = Math.pow(TEAM_RECENCY_DECAY, rows.length - 1 - i);
    sw += w; off += w * (r.pf / r.poss); def += w * (r.pa / r.poss); pace += w * r.poss;
  });
  off /= sw; def /= sw; pace /= sw;
  const sh = rows.length / (rows.length + 8); // shrink toward league early on
  base.off = sh * off + (1 - sh) * lg.ppp;
  base.def = sh * def + (1 - sh) * lg.ppp;
  base.pace = sh * pace + (1 - sh) * lg.pace;
  base.raw = { off: off, def: def, pace: pace };
  return base;
}

/* Opponent-vs-position defense from OUR OWN accumulated box scores.
   Clamped hard (0.9-1.1) and sample-gated so noise can't masquerade as edge. */
function zeroPos(){ return { G: { pts: 0, reb: 0, ast: 0, n: 0 }, F: { pts: 0, reb: 0, ast: 0, n: 0 }, C: { pts: 0, reb: 0, ast: 0, n: 0 } }; }
function buildDefFactors(beforeDate){
  if (state.defCache && state.defCache.date === beforeDate) return state.defCache;
  const map = {}, lg = zeroPos();
  for (const pid in state.priorPlayer){
    const pl = state.priorPlayer[pid];
    const pos = pl.pos || 'F';
    for (const r of pl.rows){
      if (r.date >= beforeDate) continue;
      if (!map[r.opp]) map[r.opp] = zeroPos();
      const m = map[r.opp][pos], L = lg[pos];
      m.pts += r.pts; m.reb += r.reb; m.ast += r.ast; m.n++;
      L.pts += r.pts; L.reb += r.reb; L.ast += r.ast; L.n++;
    }
  }
  state.defCache = { date: beforeDate, map: map, lg: lg };
  return state.defCache;
}
function defFactor(oppAb, pos, stat, beforeDate){
  const dc = buildDefFactors(beforeDate);
  const L = dc.lg[pos];
  if (!L || L.n < 60) return 1;
  const m = dc.map[oppAb] && dc.map[oppAb][pos];
  if (!m || m.n < 30) return 1;
  const lgAvg = L[stat] / L.n;
  if (!(lgAvg > 0)) return 1;
  return clamp((m[stat] / m.n) / lgAvg, 0.9, 1.1);
}

function currentTeamOf(pid){
  const m = state.posMap && state.posMap[pid];
  if (m && m.t) return m.t;
  const pl = state.priorPlayer[pid];
  return pl ? pl.tm : null;
}

// Recency-weighted mean, shrunk toward the positional prior, times the
// opponent-vs-position factor. Returns null under 2 prior games.
function projectPlayerStat(pid, stat, pos, oppAb, beforeDate){
  const cur = state.priorPlayer[pid];
  const rows = cur && cur.rows ? cur.rows.filter(function(r){ return r.date < beforeDate; }) : [];
  if (rows.length < 2) return null;
  let sw = 0, mean = 0, mins = 0;
  rows.forEach(function(r, i){
    const w = Math.pow(PLAYER_RECENCY_DECAY, rows.length - 1 - i);
    sw += w; mean += w * r[stat]; mins += w * r.min;
  });
  mean /= sw; mins /= sw;
  const sh = rows.length / (rows.length + 3);
  const prior = (MEAN_PRIOR[pos] || MEAN_PRIOR.F)[stat];
  const fac = defFactor(oppAb, pos, stat, beforeDate);
  const val = (sh * mean + (1 - sh) * prior) * fac;
  return { value: Math.round(val * 10) / 10, n: rows.length, wMin: mins, fac: fac };
}

function buildProps(g, injuries, beforeDate, isPost){
  const props = [];
  const sides = [[g.away, g.home], [g.home, g.away]];
  for (const pair of sides){
    const me = pair[0], opp = pair[1];
    const cands = [];
    for (const pid in state.priorPlayer){
      if (currentTeamOf(pid) !== String(me.id)) continue;
      const pl = state.priorPlayer[pid];
      const injRec = injuries && injuries[pid];
      const injStatus = injRec ? injRec.status : null;
      if (!isPost && injStatus === 'out') continue; // OUT excluded pre-game; post is ungated
      const base = projectPlayerStat(pid, 'pts', pl.pos, opp.ab, beforeDate);
      if (!base || base.wMin < MIN_AVG_MIN) continue;
      cands.push({ pid: pid, pl: pl, injStatus: injStatus, wMin: base.wMin });
    }
    cands.sort(function(a, b){ return b.wMin - a.wMin; });
    for (const c of cands.slice(0, 9)){
      for (const stat of ['pts', 'reb', 'ast']){
        const proj = projectPlayerStat(c.pid, stat, c.pl.pos, opp.ab, beforeDate);
        if (!proj) continue;
        const pc = propConfidence({ id: c.pid }, stat, c.pl.pos, c.injStatus, beforeDate);
        props.push({
          pid: c.pid, name: c.pl.name, team: me.ab, pos: c.pl.pos, stat: stat,
          proj: proj.value, n: proj.n, fac: proj.fac, conf: pc.conf, sigma: pc.sigma,
          inj: c.injStatus,
          cat: stat === 'pts' ? 'playerPts' : stat === 'reb' ? 'playerReb' : 'playerAst'
        });
      }
    }
  }
  return props;
}

function projectGame(g, injuries, beforeDate){
  if (!state.coverage) hydrateFromStore();
  if (!state.coverage || !state.coverage.games) return null;
  const lg = leagueBaselines(beforeDate);
  if (lg.nRows < 40) return null; // not enough walk-forward history before this date
  const A = teamForm(g.away.id, beforeDate, lg);
  const H = teamForm(g.home.id, beforeDate, lg);
  const pace = clamp((A.pace * H.pace) / lg.pace, 85, 115);
  let awayPts = (A.off * H.def / lg.ppp) * pace;
  let homePts = (H.off * A.def / lg.ppp) * pace;
  homePts += lg.hca / 2; awayPts -= lg.hca / 2;   // HCA from real home margins
  if (A.b2b){ awayPts -= B2B_SELF; homePts += B2B_OPP; } // rest replaces weather
  if (H.b2b){ homePts -= B2B_SELF; awayPts += B2B_OPP; }
  const margin = homePts - awayPts;
  const pHome = normCdf(margin / SIGMA_MARGIN);
  const winProb = Math.max(pHome, 1 - pHome);
  const sigTotal = SIGMA_TOTAL_PRIOR * pace / lg.pace;
  const sigTeam = SIGMA_TEAMPTS_PRIOR * pace / lg.pace;
  const pct = function(x){ return Math.max(5, Math.min(95, Math.round(x * 100))); };
  return {
    date: beforeDate, lg: lg, A: A, H: H, pace: pace,
    awayPts: Math.round(awayPts * 10) / 10,
    homePts: Math.round(homePts * 10) / 10,
    margin: Math.round(margin * 10) / 10,
    winAb: margin >= 0 ? g.home.ab || g.home.abbr : g.away.ab || g.away.abbr,
    winMetric: Math.round(winProb * 100),
    total: Math.round((awayPts + homePts) * 10) / 10,
    confTotal: pct(2 * normCdf(hitTol('pts') / sigTotal) - 1),
    confTeam: pct(2 * normCdf(hitTol('pts') / sigTeam) - 1),
    props: buildProps(g, injuries, beforeDate, g.stateCode === 'post')
  };
}

function actualFor(recData, pid, stat){
  if (!recData) return null;
  const p = (recData.players || []).find(function(x){ return x.id === pid; });
  return p ? p[stat] : null;
}

function propsHtml(proj, recData){

      html += '<div class="prow" style="padding:7px 0;border-bottom:1px solid var(--line)">' +
        '<div class="row"><div class="grow">' + esc(p.name) +

        (act != null ? ' <span class="small ' + hitCls + '">' + act + ' (' + (delta >= 0 ? '+' : '') + delta.toFixed(1) + ')</span>' : '') +
        '</div></div>' +
        '<div class="pdetail hidden small muted" style="margin-top:4px">\u03c3 ' + p.sigma.toFixed(1) + ' \u00b7 n=' + p.n +

function betRowsForSearch(q){
  const out = [];
  for (const gid in state.projections){
    const proj = state.projections[gid];
    const g = state.slate.games.find(function(x){ return x.id === gid; });
    if (!g) continue;
    const label = g.away.abbr + '@' + g.home.abbr;
    const hay = (g.away.abbr + ' ' + g.away.name + ' ' + g.home.abbr + ' ' + g.home.name).toLowerCase();
    const teamHit = hay.indexOf(q) !== -1;
    if (teamHit){
      out.push({ gid: gid, txt: label + ' \u2014 Winner: ' + proj.winAb, conf: proj.winMetric, lock: proj.winMetric >= lockTh('winner') });
      out.push({ gid: gid, txt: label + ' \u2014 Total ' + proj.total + ' \u00b1' + hitTol('pts'), conf: proj.confTotal, lock: proj.confTotal >= lockTh('lines') });
    }
    for (const p of proj.props){
      if (!teamHit && (p.name + ' ' + p.team).toLowerCase().indexOf(q) === -1) continue;
      out.push({
        gid: gid, inj: p.inj,
        txt: label + ' \u2014 ' + p.name + ' ' + p.stat + ' ' + p.proj + ' \u00b1' + hitTol('stat'),
        conf: p.conf, lock: p.conf >= lockTh('props')
      });
    }
  }
  out.sort(function(a, b){ return b.conf - a.conf; });
  return out.slice(0, 40);
}

/* ============ 5.8 GRADING + DK + AUTO-TUNER (v0.4/0.5) ============
   Records are the source of truth; units are DERIVED. Regrade-all replays the
   whole stored season through the walk-forward model with zero network and
   emits raw units (metric + raw miss distance), so thresholds and tolerances
   re-grade everything instantly (BUG 5). Units live in memory + optionally in
   Firebase per-slate docs — never bulk in shared localStorage. */

const DK_PREFIX = 'hiq_' + CACHE_VERSION + '_dk_';
function fmtSigned(v){ return v == null ? '\u2014' : (v >= 0 ? '+' : '') + v; }

/* ---- record sync + cron grading (headless GitHub Action) ----
   pullRecsFB seeds local storage from nba_recs/{date} docs; pushRecsFB
   mirrors any locally-built complete days back. runCronGrade is the whole
   automated flow: seed -> build only genuinely new days from ESPN ->
   regrade the season with the app's own model -> nba/allTime updated
   (inside saveGateSummary) -> mirror new records. Idempotent: day markers
   skip covered dates and regrading recomputes the same units. */
async function pullRecsFB(){
  const docs = await fbListCol(FB_RECS);
  let seeded = 0;
  for (const d in docs){
    const recs = docs[d] && docs[d].recs;
    if (!Array.isArray(recs)) continue;
    for (const rec of recs){
      if (rec && rec.id != null && !hasRecord(rec.id)){ saveRecord(rec); seeded++; }
    }
    if (!dayDone(d)) markDay(d, recs.length);
  }
  return { dates: Object.keys(docs).length, seeded: seeded };
}
async function pushRecsFB(){
  const remote = await fbListCol(FB_RECS);
  const byDate = loadRecsByDate();
  let pushed = 0;
  for (const d in byDate){
    if (!dayDone(d)) continue;          // only mirror complete days
    if (remote[d] && remote[d].recs && remote[d].recs.length >= byDate[d].length) continue;
    await fbWrite(FB_RECS, d, { recs: byDate[d] });
    pushed++;
    await sleep(60);
  }
  return pushed;
}
/* Cloud sync is NOT optional: every device pulls the shared season on boot and
   pushes any locally-built days back, automatically. Quiet when in sync. */
async function autoCloudSync(){
  if (!fbReady()) return;
  if (state.cloudSync && state.cloudSync.running) return;
  state.cloudSync = { running: true };
  try {
    const before = state.coverage ? state.coverage.games : (hydrateFromStore().games || 0);
    let r = null;
    try { r = await hydrateFromCloud(); } catch (e){ logEvent('warn', 'data', 'auto pull: ' + e.message); }
    const after = state.coverage ? state.coverage.games : 0;
    if (r && after > before) toast('Cloud sync: +' + (after - before) + ' games', 3000);
    try {
      const pushed = await pushRecsFB();
      if (pushed) toast('Backed up ' + pushed + ' day(s) to the cloud', 3000);
    } catch (e){ logEvent('warn', 'data', 'auto push: ' + e.message); }
    // Success rates should exist without taps: grade in the background when
    // records are present but ungraded. regradeAll also refreshes nba/allTime,
    // so the Board reflects this device's data automatically.
    try {
      if (state.coverage && state.coverage.games && !flatUnits().length) await regradeAll();
    } catch (e){ logEvent('warn', 'data', 'auto grade: ' + e.message); }
    try { if (document.getElementById('updBtn')) renderFactsDataCard(); } catch (e) {}
    try { if (document.getElementById('factsBody')) renderFactsBody(); } catch (e) {}
  } finally { state.cloudSync.running = false; }
}

/* Scheduled DK pull (?cron=dk): reads the Board's app_settings/dk_auto
   (nbaOn/nbaDays/nbaHours, Pacific), and only spends odds-API quota when this
   app is toggled on and the current PT day+hour is scheduled. Stores a per-date
   snapshot to nba_dk so the grading cron can bet against DK historically. */
const MLBCFG = { p: 'mlb-bets-d196c', k: 'AIzaSyAm8TgK3Hl5ndWmqpYlBJs-u64JbeIg2W0' };
async function runCronDkPull(){
  window.__cronStatus = 'dk: starting';
  try {
    let c = {};
    try {
      const r = await fetch('https://firestore.googleapis.com/v1/projects/' + MLBCFG.p + '/databases/(default)/documents/app_settings/dk_auto?key=' + MLBCFG.k, { cache: 'no-store' });
      if (r.ok){ const f = (await r.json()).fields || {};
        c = { on: f.nbaOn ? f.nbaOn.booleanValue !== false : true, hours: f.nbaHours ? f.nbaHours.stringValue : null, days: f.nbaDays ? f.nbaDays.stringValue : null }; }
    } catch (e) {}
    const on = c.on !== false;
    const days = String(c.days || '0,1,2,3,4,5,6').split(',').map(function(x){ return parseInt(x.trim(), 10); }).filter(function(n){ return !isNaN(n); });
    const ptNow = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Los_Angeles' }));
    const DAYN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    if (!on){ window.__cronStatus = 'dk: skipped — NBA auto pull is OFF'; window.__cronDone = true; return; }
    if (!days.includes(ptNow.getDay())){ window.__cronStatus = 'dk: skipped — ' + DAYN[ptNow.getDay()] + ' not a scheduled day'; window.__cronDone = true; return; }
    const date = todayPT();
    window.__cronStatus = 'dk: building slate ' + date;
    let games = [];
    try { const sb = await fetch(ESPN.scoreboard(toESPN(date)), { cache: 'no-store' }); if (sb.ok) games = parseScoreboard(await sb.json()); } catch (e) {}
    if (!games.length){ window.__cronStatus = 'dk: no NBA games ' + date; window.__cronDone = true; return; }
    // Pull only games within 2h of tip that we don't already have — once per game.
    let existing = {};
    try { const cur = await fbRead(FB_DK, date); if (cur && cur.games) existing = cur.games; } catch (e) {}
    const now = Date.now(), WIN = 2 * 3600 * 1000;
    const eligibleKeys = new Set();
    for (const g of games){
      const gm = g.away.abbr + '@' + g.home.abbr;
      const st = g.iso ? new Date(g.iso).getTime() : 0;
      if (st > now && st <= now + WIN && !existing[gm]) eligibleKeys.add(gm);
    }
    if (!eligibleKeys.size){ window.__cronStatus = 'dk: skipped — no NBA games within 2h of tip that still need lines'; window.__cronDone = true; return; }
    window.__cronStatus = 'dk: pulling DK lines for ' + eligibleKeys.size + ' game(s)';
    const res = await fetch(ODDS.gameLines(ODDS_KEY_SHARED));
    if (!res.ok) throw new Error('odds API ' + res.status);
    let remaining = null; try { remaining = res.headers.get('x-requests-remaining'); } catch (e) {}
    const arr = await res.json();
    const snapGames = Object.assign({}, existing);
    let n = 0;
    for (const ev of (arr || [])){
      if (ptDateStr(new Date(ev.commence_time)) !== date) continue;
      const m = mapOddsEvent(ev, games);
      if (m && eligibleKeys.has(m.gm) && !snapGames[m.gm]){ snapGames[m.gm] = m; n++; }
    }
    await fbWrite(FB_DK, date, { date: date, fetched: new Date().toISOString(), games: snapGames });
    if (remaining != null){
      try {
        await fetch('https://firestore.googleapis.com/v1/projects/' + MLBCFG.p + '/databases/(default)/documents/app_settings/dk_status?key=' + MLBCFG.k + '&updateMask.fieldPaths=nbaCalls&updateMask.fieldPaths=nbaAt', {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fields: { nbaCalls: { integerValue: String(parseInt(remaining, 10)) }, nbaAt: { integerValue: String(Date.now()) } } }) });
      } catch (e) {}
    }
    window.__cronStatus = 'dk: done — ' + n + ' new game(s) stored (2h window) · ' + Object.keys(snapGames).length + ' total today (' + (remaining != null ? remaining : '?') + ' calls left)';
  } catch (e){ window.__cronStatus = 'dk: ERROR — ' + (e && e.message || e); }

async function runCronGrade(){
  window.__cronStatus = 'cron: starting';
  try { localStorage.setItem(PIN_OK_KEY, '1'); } catch (e) {}
  const clog = function(m){ window.__cronStatus = 'cron: ' + m; try { console.log('[nba] ' + m); } catch (e) {} };
  const countRecs = function(){ let n = 0; try { eachStoredRecord(function(){ n++; }); } catch (e) {} return n; };
  try {
    clog('seeding records from Firebase (nba_recs)');
    const seed = await pullRecsFB();
    clog('seed: ' + seed.dates + ' cloud dates, ' + seed.seeded + ' records loaded');

    // PROBE — ESPN blocks SOME GitHub runner IPs (each run draws a different
    // one; the NFL app hit ESPN fine from the same infrastructure). This tells
    // us which kind of run this is, and drives the skip/continue choice below.
    let espnOK = false;
    try {
      const probe = toESPN(addDays(SEASON.start, 90)); // ~mid-January, a day with games
      const r = await fetch(ESPN.scoreboard(probe), { cache: 'no-store' });
      let g = 0; if (r.ok){ try { g = (parseScoreboard(await r.json()) || []).length; } catch (e) {} }
      espnOK = r.ok;
      clog('ESPN probe ' + probe + ': HTTP ' + r.status + ' \u00b7 ' + g + ' games seen');
    } catch (e){ clog('ESPN probe FAILED (' + e.message + ') \u2014 this runner IP is blocked by ESPN'); }

    clog('building roster position map');
    try { await buildPosMap(false, function(m){ clog(String(m || '')); }); }
    catch (e){ clog('posMap warn: ' + e.message); }

    const before = countRecs();
    clog('building season ' + SEASON.start + ' \u2192 ' + todayPT() + ' (have ' + before + ' records)');
    await buildData(SEASON.start, todayPT());
    const after = countRecs();
    clog('build complete: ' + after + ' total records (' + (after - before) + ' new this run)');

    if (after === 0){
      if (!espnOK){
        // Blocked-IP run before the first successful build: nothing to grade
        // yet, and that's expected. The next scheduled run gets a fresh runner
        // (new IP) and retries; the first clean run does the one-time full
        // build and mirrors it, after which even blocked runs succeed.
        clog('SKIPPED \u2014 ESPN refused this runner IP and the cloud has no records yet. Retries automatically next run (each run gets a new IP).');
        window.__cronDone = true;
        return;
      }
      throw new Error('0 game records after build even though ESPN probe succeeded \u2014 something else is wrong (see log)');
    }

    clog('applying shared lock config');
    try { await pullSharedLockCfg(); } catch (e) {}
    clog('regrading season');
    await regradeAll();                 // saveGateSummary inside writes nba/allTime
    clog('pushing raw units to nba_accuracy (powers the Board’s lock-grade preview)');
    try { await pushSeasonFB(); } catch (e){ clog('units push warn: ' + e.message); }
    clog('mirroring new records to nba_recs');
    const pushed = await pushRecsFB();
    /* RETENTION: one rolling season — prune cloud docs dated before this
       season's start (nothing to prune until the SEASON const rolls over). */
    try {
      let pruned = 0;
      for (const col of [FB_RECS, FB_ACC]){
        const url = 'https://firestore.googleapis.com/v1/projects/' + FB.projectId +
          '/databases/(default)/documents/' + col + '?pageSize=300&key=' + FB.apiKey + '&mask.fieldPaths=t';
        const res = await fetch(url);
        if (!res.ok) continue;
        const j = await res.json();
        for (const d of (j.documents || [])){
          const id = d.name.split('/').pop();
          if (/^\d{4}-\d{2}-\d{2}$/.test(id) && id < SEASON.start){
            try { await fetch('https://firestore.googleapis.com/v1/projects/' + FB.projectId + '/databases/(default)/documents/' + col + '/' + id + '?key=' + FB.apiKey, { method: 'DELETE' }); pruned++; } catch (e) {}
            await sleep(50);
          }
        }
      }
      if (pruned) clog('retention: pruned ' + pruned + ' pre-season docs');
    } catch (e) {}
    const dates = Object.keys(state.seasonUnits || {}).length;
    const note = espnOK ? '' : ' (ESPN unreachable this run \u2014 graded from cloud records)';
    clog('done \u2014 ' + after + ' records, ' + dates + ' dates graded, ' + pushed + ' day(s) mirrored, nba/allTime updated' + note);
  } catch (e){ window.__cronStatus = 'cron: ERROR — ' + (e && e.message || e); }
  window.__cronDone = true;
}

function recToGame(rec){
  return {
    id: rec.id, stateCode: 'post', completed: true, iso: '',
    away: { id: rec.away.id, abbr: rec.away.ab, ab: rec.away.ab, name: rec.away.ab, score: rec.away.pts, record: '' },
    home: { id: rec.home.id, abbr: rec.home.ab, ab: rec.home.ab, name: rec.home.ab, score: rec.home.pts, record: '' },
    venue: '', statusText: 'Final'

function unitsFromRecord(rec, proj){
  const units = [];
  const gm = rec.away.ab + '@' + rec.home.ab;
  if (rec.home.pts == null || rec.away.pts == null) return units;
  const actW = rec.home.pts > rec.away.pts ? rec.home.ab : rec.away.ab;
  units.push({ cat: 'winner', metric: proj.winMetric, hit: actW === proj.winAb, game: gm,
    desc: 'Winner ' + proj.winAb + ' ' + proj.winMetric + '% \u2192 ' + actW });
  const aTot = rec.home.pts + rec.away.pts;
  units.push({ cat: 'total', metric: proj.confTotal, adelta: Math.abs(aTot - proj.total), game: gm,
    desc: 'Total ' + proj.total + ' \u2192 ' + aTot });
  units.push({ cat: 'teamPts', metric: proj.confTeam, adelta: Math.abs(rec.away.pts - proj.awayPts), game: gm,
    desc: rec.away.ab + ' pts ' + proj.awayPts + ' \u2192 ' + rec.away.pts });
  units.push({ cat: 'teamPts', metric: proj.confTeam, adelta: Math.abs(rec.home.pts - proj.homePts), game: gm,
    desc: rec.home.ab + ' pts ' + proj.homePts + ' \u2192 ' + rec.home.pts });
  for (const p of proj.props){
    const act = actualFor(rec, p.pid, p.stat);
    if (act == null) continue; // sat out — nothing to grade
    units.push({ cat: p.cat, metric: p.conf, adelta: Math.abs(act - p.proj), game: gm,
      desc: p.name + ' ' + p.stat + ' ' + p.proj + ' \u2192 ' + act });
  }
  return units;
}

// Bet AGAINST DraftKings: emit graded vs-DK units when a DK line snapshot exists
// for this game. ML value = we take our pick only when our win prob beats DK's
// implied price (a real edge). Total/Spread = our lean vs DK's posted line.
function dkUnitsFromRecord(rec, proj, snap){
  const units = [];
  if (!snap || !snap.games) return units;
  const gm = rec.away.ab + '@' + rec.home.ab;
  const e = snap.games[gm];
  if (!e || rec.home.pts == null || rec.away.pts == null) return units;
  const aTot = rec.home.pts + rec.away.pts;
  const actHomeMargin = rec.home.pts - rec.away.pts;
  const actW = rec.home.pts > rec.away.pts ? rec.home.ab : rec.away.ab;
  const imp = function(p){ return p < 0 ? (-p) / ((-p) + 100) : 100 / (p + 100); };
  if (e.mlHome != null && e.mlAway != null){
    const pickHome = proj.winAb === rec.home.ab;
    const dkP = imp(pickHome ? e.mlHome : e.mlAway);
    if ((proj.winMetric / 100) > dkP + 0.03){ // only bet where WE see value vs the book
      units.push({ cat: 'dkML', metric: proj.winMetric, hit: proj.winAb === actW, game: gm,
        desc: 'ML value ' + proj.winAb + ' (' + proj.winMetric + '% vs DK ' + Math.round(dkP * 100) + '%) \u2192 ' + actW });
    }
  }
  if (e.total != null && aTot !== e.total){
    const lean = proj.total > e.total ? 'OVER' : 'UNDER';
    const hit = lean === 'OVER' ? aTot > e.total : aTot < e.total;
    units.push({ cat: 'dkTotal', metric: proj.winMetric, hit: hit, game: gm,
      desc: lean + ' ' + e.total + ' (proj ' + proj.total + ') \u2192 ' + aTot });
  }
  if (e.spreadHome != null){
    const homeCovers = actHomeMargin > -e.spreadHome;
    const ourPickHome = proj.margin > -e.spreadHome;
    units.push({ cat: 'dkSpread', metric: proj.winMetric, hit: ourPickHome === homeCovers, game: gm,
      desc: 'ATS ' + (ourPickHome ? rec.home.ab : rec.away.ab) + ' (DK ' + e.spreadHome + ') \u2192 ' + (homeCovers ? rec.home.ab : rec.away.ab) });
  }
  return units;
}

async function regradeAll(){
  if (state.scan && state.scan.running) return;
  state.scan = { running: true, stop: false };
  const say = function(m){ const el = document.getElementById('gradeMsg'); if (el) el.textContent = m; };
  try {
    say('Hydrating\u2026');
    hydrateFromStore();
    const byDate = loadRecsByDate();
    const dates = Object.keys(byDate).sort();
    state.seasonUnits = {}; state.dkGrades = {};
    await seedDkFromFB();
    let graded = 0, unitCount = 0, early = 0;
    for (const d of dates){
      if (state.scan.stop){ say('Stopped at ' + d); break; }
      say('Grading ' + d + '\u2026');
      await sleep(0); // let the UI breathe
      const snap = state.dkByDate[d] || loadDkSnap(d);
      const units = [];
      const dkTally = { n: 0, usHit: 0, dkHit: 0 };
      for (const rec of byDate[d]){
        const proj = projectGame(recToGame(rec), {}, d); // walk-forward, ungated (post)
        if (!proj){ early++; continue; }
        const u = unitsFromRecord(rec, proj);
        units.push.apply(units, u);
        units.push.apply(units, dkUnitsFromRecord(rec, proj, snap));
        if (snap && snap.games){
          const e = snap.games[rec.away.ab + '@' + rec.home.ab];
          if (e && e.favAb && rec.home.pts != null && rec.away.pts != null){
            const actW = rec.home.pts > rec.away.pts ? rec.home.ab : rec.away.ab;
            dkTally.n++;
            if (proj.winAb === actW) dkTally.usHit++;
            if (e.favAb === actW) dkTally.dkHit++;
          }
        }
      }
      if (units.length){ state.seasonUnits[d] = units; graded++; unitCount += units.length; }
      if (dkTally.n) state.dkGrades[d] = dkTally;
    }
    saveGateSummary();
    say('Done \u00b7 ' + graded + ' dates \u00b7 ' + unitCount + ' raw units' +
      (early ? ' \u00b7 ' + early + ' early-season games skipped (insufficient prior history \u2014 correct, not a bug)' : ''));
    logEvent('info', 'grade', graded + ' dates, ' + unitCount + ' units');
  } catch (e){
    logEvent('err', 'grade', e.message);
    say('Regrade failed \u2014 ' + e.message);
  } finally {
    state.scan.running = false;
    renderFactsBody();
  }
}

/* ---- auto-tuner (blueprint port). Honest framing lives in the UI copy:
   this FITS THRESHOLDS TO PAST RESULTS and can overfit; trust big n. ---- */
function findThresholdForTarget(thKey, targetPct, unitsPool){
  const units = unitsPool.filter(function(u){ return CAT_META[u.cat] && CAT_META[u.cat].th === thKey; });
  if (!units.length) return null;
  const sorted = units.slice().sort(function(a, b){ return b.metric - a.metric; });
  let best = null;
  for (let t = 0; t <= 95; t++){
    const qualifying = sorted.filter(function(u){ return u.metric >= t; });
    const n = qualifying.length;
    if (!n) break;
    const hit = qualifying.filter(function(u){ return unitHit(u); }).length;
    const rate = 100 * hit / n, diff = Math.abs(rate - targetPct);
    if (!best || diff < best.diff - 1e-9 || (Math.abs(diff - best.diff) < 1e-9 && n > best.n)){
      best = { t: t, rate: rate, hit: hit, n: n, diff: diff };
    }
  }
  return best;
}
function findToleranceForTarget(tolKey, targetPct, unitsPool){
  const units = unitsPool.filter(function(u){
    return TOL_KEY_BY_CAT[u.cat] === tolKey && u.adelta != null && unitQualifies(u);
  });
  if (!units.length) return null;
  let best = null;
  for (let t = 0.5; t <= 15.0001; t += 0.5){
    const hit = units.filter(function(u){ return u.adelta <= t; }).length;
    const rate = 100 * hit / units.length, diff = Math.abs(rate - targetPct);
    if (!best || diff < best.diff - 1e-9 || (Math.abs(diff - best.diff) < 1e-9 && t < best.t)){
      best = { t: Math.round(t * 10) / 10, rate: rate, hit: hit, n: units.length, diff: diff };
    }
  }
  return best;
}

/* ---- DK odds (v0.5): game lines only, events-first, quota-aware.
   Player props from the-odds-api cost per game — with the key shared with
   Gridline we deliberately skip them; props come from our own model. ---- */
function lastWord(s){ const p = String(s || '').trim().split(' '); return p[p.length - 1]; }
function mapOddsEvent(ev, slateGames){
  let g = slateGames.find(function(x){ return x.home.name === ev.home_team && x.away.name === ev.away_team; });
  if (!g) g = slateGames.find(function(x){
    return String(ev.home_team).indexOf(lastWord(x.home.name)) !== -1 &&
           String(ev.away_team).indexOf(lastWord(x.away.name)) !== -1;
  });
  if (!g) return null;
  const bk = (ev.bookmakers || []).find(function(b){ return b.key === 'draftkings'; });
  if (!bk) return null;
  const mk = function(k){ return (bk.markets || []).find(function(m){ return m.key === k; }); };
  const h2h = mk('h2h'), sp = mk('spreads'), tot = mk('totals');
  const price = function(m, team){
    const o = m && (m.outcomes || []).find(function(x){ return x.name === team; });
    return o && o.price != null ? o.price : null;
  };
  const mlH = price(h2h, ev.home_team), mlA = price(h2h, ev.away_team);
  const spO = sp && (sp.outcomes || []).find(function(x){ return x.name === ev.home_team; });
  const tO = tot && (tot.outcomes || []).find(function(x){ return x.name === 'Over'; });
  let favAb = null, favPrice = null;
  if (mlH != null && mlA != null){
    if (mlH <= mlA){ favAb = g.home.abbr; favPrice = mlH; }
    else { favAb = g.away.abbr; favPrice = mlA; }
  }
  return {
    gm: g.away.abbr + '@' + g.home.abbr,
    mlHome: mlH, mlAway: mlA,
    spreadHome: spO && spO.point != null ? spO.point : null,
    total: tO && tO.point != null ? tO.point : null,
    favAb: favAb, favPrice: favPrice
  };
}

function ptDateStr(d){
  return new Intl.DateTimeFormat('en-CA', { timeZone: TZ, year: 'numeric', month: '2-digit', day: '2-digit' }).format(d);
}
function todayPT(){ return ptDateStr(new Date()); }
function addDays(dateStr, n){
  const p = dateStr.split('-').map(Number);
  return ptDateStr(new Date(Date.UTC(p[0], p[1] - 1, p[2], 12, 0, 0) + n * 86400000));

function fmtSlateLabel(dateStr){

function teamBits(c){
  const t = (c && c.team) || {};
  return {
    id: String(t.id || ''),
    abbr: t.abbreviation || t.shortDisplayName || '?',
    name: t.displayName || '',
    score: (c && c.score != null && c.score !== '') ? +c.score : null,
    record: (c && c.records && c.records[0] && c.records[0].summary) || ''
  };
}
function parseScoreboard(sb){
  const events = (sb && sb.events) || [];
  return events.map(function(ev){
    const comp = (ev.competitions && ev.competitions[0]) || {};
    const comps = comp.competitors || [];
    const home = comps.find(function(c){ return c.homeAway === 'home'; });
    const away = comps.find(function(c){ return c.homeAway === 'away'; });
    const st = (ev.status && ev.status.type) || {};
    return {
      id: String(ev.id),
      iso: ev.date || '',
      stateCode: st.state || 'pre',
      statusText: st.shortDetail || st.detail || '',
      completed: !!st.completed,
      home: teamBits(home),
      away: teamBits(away),
      venue: (comp.venue && comp.venue.fullName) || ''
    };
  });
}
async function loadSlate(){
  const dateStr = state.slateDate;
  const btn = document.getElementById('loadBtn');
  btn.disabled = true; btn.textContent = 'Loading\u2026';
  try {
    const url = ESPN.scoreboard(toESPN(dateStr));
    // Scoreboards are memory-only; per-day markers in the data layer make
    // re-scans cheap without hoarding 50KB payloads in shared localStorage.
    const sb = await cachedJSON(url, { persist: false });
    state.slate = { date: dateStr, games: parseScoreboard(sb) };
    state.projections = {}; state.defCache = null; state.lgCache = null;
    state.dkOdds = loadDkSnap(dateStr);
    closeGame();
    logEvent('info', 'data', 'slate ' + dateStr + ': ' + state.slate.games.length + ' games');
    renderGames();
  } catch (e){
    logEvent('err', 'data', 'slate load failed: ' + e.message);
    toast('Load failed \u2014 ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Load Slate';
  }
}

/* ============ 8. RENDER ============ */
function esc(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

function renderGames(){
  const dp = document.getElementById('dPick');
  if (dp && dp.value !== state.slateDate) dp.value = state.slateDate;
  const list = document.getElementById('gamesList');
  const q = (document.getElementById('gameSearch').value || '').trim().toLowerCase();
  if (!state.slate || state.slate.date !== state.slateDate){
    list.innerHTML = '<div class="card muted small">Nothing loads automatically. Tap <b>Load Slate</b> for this date.</div>';
    return;
  }
  // Bet search: once the slate is projected, the search box searches BETS.
  if (q && Object.keys(state.projections).length){
    const hits = betRowsForSearch(q);
    list.innerHTML = hits.length
      ? hits.map(function(h){
          return '<div class="game" data-gid="' + esc(h.gid) + '"><div class="grow small">' + esc(h.txt) +
            (h.inj === 'questionable' ? ' <span style="color:var(--amber)">Q</span>' : '') + '</div>' +
            '<div class="small ' + (h.lock ? 'lock' : 'muted') + '">' + h.conf + '%' + (h.lock ? ' \ud83d\udd12' : '') + '</div></div>';
        }).join('')
      : '<div class="card muted small">No matching bets.</div>';
    Array.prototype.forEach.call(list.querySelectorAll('.game'), function(el){
      el.addEventListener('click', function(){ openGame(el.getAttribute('data-gid')); });
    });
    return;
  }
  let games = state.slate.games;
  if (q){
    games = games.filter(function(g){
      return (g.home.abbr + ' ' + g.home.name + ' ' + g.away.abbr + ' ' + g.away.name).toLowerCase().indexOf(q) !== -1;
    });
  }
  // Once projected, highest-grade bets lead the list; unprojected games sink.
  if (Object.keys(state.projections).length){
    games = games.slice().sort(function(a, b){
      const pa = state.projections[a.id], pb = state.projections[b.id];
      return ((pb ? pb.winMetric : -1) - (pa ? pa.winMetric : -1));
    });
  }
  if (!games.length){
    list.innerHTML = '<div class="card muted small">' + (state.slate.games.length ? 'No matches.' : 'No NBA games on this date.') + '</div>';
    return;
  }
  list.innerHTML = games.map(function(g){
    const score = (g.stateCode !== 'pre' && g.away.score != null && g.home.score != null)
      ? '<b>' + g.away.score + '\u2013' + g.home.score + '</b> \u00b7 ' : '';
    const when = g.stateCode === 'pre' ? fmtTimePT(g.iso) : g.statusText;
    const recs = (g.away.record && g.home.record) ? esc(g.away.record) + ' \u00b7 ' + esc(g.home.record) : '';
    const proj = state.projections[g.id];
    // Finished + projected -> grade the pick right on the card.
    let mark = '';
    if (proj && g.stateCode === 'post' && g.away.score != null && g.home.score != null && +g.away.score !== +g.home.score){
      const actualWin = (+g.home.score > +g.away.score) ? g.home.abbr : g.away.abbr;
      const won = actualWin === proj.winAb;
      mark = won ? ' <span class="gmark y">\u2713</span>' : ' <span class="gmark n">\u2717</span>';
    }
    const pline = proj
      ? '<div class="small" style="margin-top:2px;color:var(--accent2)">' + proj.awayPts + '\u2013' + proj.homePts + ' \u00b7 ' + esc(proj.winAb) + ' ' + proj.winMetric + '%' + (proj.winMetric >= lockTh('winner') ? ' \ud83d\udd12' : '') + mark + '</div>'
      : '';
    return '<div class="game" data-gid="' + esc(g.id) + '">' +
      '<div><div class="teams">' + esc(g.away.abbr) + ' @ ' + esc(g.home.abbr) + '</div>' +
      '<div class="sub">' + esc(g.away.name) + ' at ' + esc(g.home.name) + '</div>' + pline + '</div>' +
      '<div style="text-align:right"><div class="status-' + esc(g.stateCode) + ' small">' + score + esc(when) + '</div>' +
      '<div class="sub">' + (recs || esc(g.venue)) + '</div></div></div>';
  }).join('');
  Array.prototype.forEach.call(list.querySelectorAll('.game'), function(el){
    el.addEventListener('click', function(){ openGame(el.getAttribute('data-gid')); });
  });
}
