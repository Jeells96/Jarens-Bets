function injTable(title, rows){
  if (!rows.length) return '';
  return '<div class="small" style="margin:8px 0 4px;font-weight:700">' + esc(title) + '</div>' +
    rows.map(function(r){
      return '<div class="small" style="padding:3px 0;border-bottom:1px solid var(--line)">' +
        esc(r.team) + ' \u00b7 ' + esc(r.name || 'Unknown') + ' \u2014 <span class="muted">' + esc(r.label) + '</span></div>';
    }).join('');
}

function renderGameDetail(id, summary){
  const el = document.getElementById('gameDetail');
  const g = (state.slate && state.slate.games.find(function(x){ return x.id === id; })) || null;
  if (!summary){
    el.innerHTML = '<div class="card"><b>Data integrity stop.</b>' +
      '<div class="muted small" style="margin-top:6px">ESPN returned a payload whose game id did not match this game, so it was discarded and evicted from cache (BUG-1 guard). Re-open the game to refetch.</div>' +
      backBtnHtml() + '</div>';
    bindBack();
    return;
  }
  const injMap = extractInjuries(summary);
  const injRows = Object.keys(injMap).map(function(k){ return injMap[k]; });
  const outs = injRows.filter(function(r){ return r.status === 'out'; });
  const qs = injRows.filter(function(r){ return r.status === 'questionable'; });
  const title = g ? esc(g.away.name) + ' @ ' + esc(g.home.name) : 'Game ' + esc(id);
  const status = g ? (g.stateCode === 'pre' ? fmtTimePT(g.iso) : g.statusText) : '';

  let html = '<div class="card"><h2>' + title + '</h2>' +
    '<div class="small muted">' + esc(status) + (g && g.venue ? ' \u00b7 ' + esc(g.venue) : '') + '</div>';
  if (g && g.stateCode !== 'pre' && g.away.score != null && g.home.score != null){
    html += '<div style="font-size:24px;font-weight:800;margin-top:6px">' + g.away.score + ' \u2013 ' + g.home.score + '</div>';
  }
  html += backBtnHtml() + '</div>';

  html += '<div class="card"><h2>Injuries (gate projections)</h2>';
  if (!injRows.length){
    html += '<div class="muted small">None listed in the ESPN summary for this game.</div>';
  } else {
    html += injTable('OUT \u2014 excluded from props', outs) + injTable('Questionable \u2014 damped + Q tag', qs);
  }
  html += '</div>';

  let recData = null;
  if (g && g.completed){
    try {
      if (hasRecord(id)) recData = JSON.parse(localStorage.getItem(recKey(id)));
      else {
        recData = parseGameRecord(summary, state.slate ? state.slate.date : todayPT());
        if (recData && recData.players.length && saveRecord(recData)) logEvent('info', 'data', 'recorded ' + id + ' from detail view');
      }
    } catch (e){ logEvent('warn', 'data', 'detail record: ' + e.message); }
    if (recData && recData.players.length){
      const top = recData.players.slice().sort(function(x, y){ return y.pts - x.pts; }).slice(0, 8);
      const ph = possessions(recData.home), pa = possessions(recData.away);
      html += '<div class="card"><h2>Box (parsed \u00b7 recorded \u2713)</h2>' +
        '<table class="tbl"><tr><th>Player</th><th>Min</th><th>Pts</th><th>Reb</th><th>Ast</th></tr>' +
        top.map(function(p){
          const ab = p.tm === recData.home.id ? recData.home.ab : recData.away.ab;
          return '<tr><td>' + esc(p.n) + ' <span class="muted small">' + esc(ab) + ' \u00b7 ' + esc(p.p) + '</span></td>' +
            '<td>' + p.min + '</td><td>' + p.pts + '</td><td>' + p.reb + '</td><td>' + p.ast + '</td></tr>';
        }).join('') +
        '</table><div class="small muted" style="margin-top:6px">Pace inputs \u2014 poss est: ' +
        (pa != null ? recData.away.ab + ' ' + pa.toFixed(1) : '\u2014') + ' \u00b7 ' +
        (ph != null ? recData.home.ab + ' ' + ph.toFixed(1) : '\u2014') + '</div></div>';
    }
  }

  const slateD = state.slate ? state.slate.date : todayPT();
  let proj = state.projections[id];
  if (!proj){
    proj = projectGame(g, injMap, slateD);
    if (proj){ proj.inj = injMap; state.projections[id] = proj; }
  }

  if (!proj){
    html += '<div class="card"><h2>Projection</h2><div class="muted small">Not enough history before ' + esc(slateD) +
      ' (needs \u226540 team-games). Cloud sync runs automatically on open \u2014 if this persists, the autopilot hasn\u2019t built the season yet (run it once), or tap <b>Facts \u2192 Update</b> to build here. Loading a slate alone doesn\u2019t store box scores.</div></div>';
  } else {
    const lockW = proj.winMetric >= lockTh('winner');
    const lockT = proj.confTotal >= lockTh('lines');
    html += '<div class="card"><h2>Projection \u00b7 walk-forward (only games before ' + esc(slateD) + ')</h2>' +
      '<div style="font-size:22px;font-weight:800;margin:4px 0">' + esc(g.away.abbr) + ' ' + proj.awayPts + ' \u2014 ' + proj.homePts + ' ' + esc(g.home.abbr) + '</div>' +
      '<div class="small">Winner: <b>' + esc(proj.winAb) + '</b> <span class="' + (lockW ? 'lock' : 'muted') + '">' + proj.winMetric + '%' + (lockW ? ' \ud83d\udd12' : '') + '</span>' +
      ' \u00b7 Total ' + proj.total + ' \u00b1' + hitTol('pts') + ' <span class="' + (lockT ? 'lock' : 'muted') + '">' + proj.confTotal + '%' + (lockT ? ' \ud83d\udd12' : '') + '</span></div>' +
      '<div class="small muted" style="margin-top:2px">Team pts \u00b1' + hitTol('pts') + ' conf ' + proj.confTeam + '% per side \u00b7 pace ' + proj.pace.toFixed(1) +
      (proj.A.b2b ? ' \u00b7 ' + esc(g.away.abbr) + ' B2B' : '') + (proj.H.b2b ? ' \u00b7 ' + esc(g.home.abbr) + ' B2B' : '') + '</div>';
    const dk = dkForGame(g, slateD);
    if (dk){
      html += '<div class="small" style="margin-top:4px">DK: ' + esc(dk.favAb || '?') + ' ML ' + (dk.favPrice != null ? dk.favPrice : '\u2014') +
        ' \u00b7 spread ' + esc(g.home.abbr) + ' ' + fmtSigned(dk.spreadHome) +
        ' \u00b7 total ' + (dk.total != null ? dk.total : '\u2014') +
        (dk.total != null ? ' <span class="muted">(us ' + proj.total + ', \u0394' + fmtSigned(Math.round((proj.total - dk.total) * 10) / 10) + ')</span>' : '') + '</div>';
    }
    if (recData && recData.home.pts != null && recData.away.pts != null){
      const aTot = recData.home.pts + recData.away.pts;
      const actW = recData.home.pts > recData.away.pts ? recData.home.ab : recData.away.ab;
      const wOK = actW === proj.winAb;
      const tOK = Math.abs(aTot - proj.total) <= hitTol('pts');
      html += '<div class="small" style="margin-top:6px">Actual ' + recData.away.pts + '\u2013' + recData.home.pts +
        ' \u00b7 winner <span class="' + (wOK ? 'rate-good' : 'rate-bad') + '">' + (wOK ? '\u2713' : '\u2717') + '</span>' +
        ' \u00b7 total \u0394' + Math.abs(aTot - proj.total).toFixed(1) + ' <span class="' + (tOK ? 'rate-good' : 'rate-bad') + '">' + (tOK ? '\u2713' : '\u2717') + '</span></div>';
    }
    html += '<div style="margin-top:8px"><button class="btn ghost" id="mathBtn">Show math</button></div>' +
      '<div id="mathBox" class="hidden small muted" style="margin-top:8px;white-space:pre-wrap;font-family:ui-monospace,Menlo,monospace">' + esc(mathBreakdown(g, proj)) + '</div></div>';

    html += propsHtml(proj, recData);
  }

  el.innerHTML = html;
  bindBack();
  const mb = document.getElementById('mathBtn');
  if (mb) mb.addEventListener('click', function(){ document.getElementById('mathBox').classList.toggle('hidden'); });
  bindPropRows(el);
}

function renderBets(){
  const el = document.getElementById('tab-bets');
  const s = state.settings;
  const th = '<div class="small muted" style="margin-top:4px">Thresholds: winner \u2265' + lockTh('winner') + '% \u00b7 lines \u2265' + lockTh('lines') + '% \u00b7 props \u2265' + lockTh('props') + '% \u00b7 tol \u00b1' + hitTol('pts') + ' pts / \u00b1' + hitTol('stat') + ' stat</div>';
  if (!state.slate || state.slate.date !== state.slateDate){
    el.innerHTML = '<div class="card"><h2>Locks</h2><div class="muted small">Load a slate on Games, then tap Project Slate.</div>' + th + '</div>';
    return;
  }
  const projected = state.slate.games.filter(function(g){ return state.projections[g.id]; });
  if (!projected.length){
    el.innerHTML = '<div class="card"><h2>Locks \u00b7 ' + esc(state.slate.date) + '</h2><div class="muted small">Tap Project Slate on Games to compute this date\u2019s bets.</div>' + th + '</div>';
    return;
  }
  let hitN = 0, gradedN = 0;
  const bets = []; // { conf, html } — flattened across games, sorted by confidence below
  for (const g of projected){
    const proj = state.projections[g.id];
    let recD = null;
    if (g.completed){
      try { recD = hasRecord(g.id) ? JSON.parse(localStorage.getItem(recKey(g.id))) : null; } catch (e) {}
    }
    const gTag = '<span class="muted">' + esc(g.away.abbr) + '@' + esc(g.home.abbr) + '</span> ';
    const mark = function(ok, extra){
      gradedN++; if (ok) hitN++;
      return ' <span class="' + (ok ? 'rate-good' : 'rate-bad') + '">' + (extra != null ? extra + ' ' : '') + (ok ? '\u2713' : '\u2717') + '</span>';
    };
    if (s.markets.winner !== false && proj.winMetric >= lockTh('winner')){
      let m = '';
      if (recD && recD.home.pts != null && recD.away.pts != null){
        const actW = recD.home.pts > recD.away.pts ? recD.home.ab : recD.away.ab;
        m = mark(actW === proj.winAb, null);
      }
      bets.push({ conf: proj.winMetric, html: '<div class="row small" style="padding:4px 0"><div class="grow">' + gTag + 'Winner: <b>' + esc(proj.winAb) + '</b>' + m + '</div><div class="lock">' + proj.winMetric + '% \ud83d\udd12</div></div>' });
    }
    if (s.markets.total !== false && proj.confTotal >= lockTh('lines')){
      let m = '';
      if (recD && recD.home.pts != null && recD.away.pts != null){
        const aTot = recD.home.pts + recD.away.pts;
        m = mark(Math.abs(aTot - proj.total) <= hitTol('pts'), aTot);
      }
      bets.push({ conf: proj.confTotal, html: '<div class="row small" style="padding:4px 0"><div class="grow">' + gTag + 'Total ' + proj.total + ' \u00b1' + hitTol('pts') + m + '</div><div class="lock">' + proj.confTotal + '% \ud83d\udd12</div></div>' });
    }
    if (s.markets.teamPts !== false && proj.confTeam >= lockTh('lines')){
      const sides = [[g.away.abbr, proj.awayPts, recD ? recD.away.pts : null], [g.home.abbr, proj.homePts, recD ? recD.home.pts : null]];
      for (const sd of sides){
        let m = '';
        if (sd[2] != null) m = mark(Math.abs(sd[2] - sd[1]) <= hitTol('pts'), sd[2]);
        bets.push({ conf: proj.confTeam, html: '<div class="row small" style="padding:4px 0"><div class="grow">' + gTag + esc(sd[0]) + ' pts ' + sd[1] + ' \u00b1' + hitTol('pts') + m + '</div><div class="lock">' + proj.confTeam + '% \ud83d\udd12</div></div>' });
      }
    }
    for (const p of proj.props){
      if (s.markets[p.cat] === false) continue;
      if (p.conf < lockTh('props')) continue;
      let m = '';
      const act = actualFor(recD, p.pid, p.stat);
      if (act != null) m = mark(Math.abs(act - p.proj) <= hitTol('stat'), act);
      bets.push({ conf: p.conf, html: '<div class="row small" style="padding:4px 0"><div class="grow">' + gTag + esc(p.name) + ' ' + p.stat + ' ' + p.proj + ' \u00b1' + hitTol('stat') +
        (p.inj === 'questionable' ? ' <span style="color:var(--amber)">Q</span>' : '') + m + '</div><div class="lock">' + p.conf + '% \ud83d\udd12</div></div>' });
    }
  }
  bets.sort(function(a, b){ return b.conf - a.conf; }); // strongest bets first, across all games
  const total = bets.length;
  const html = total ? '<div class="card"><h2>All bets \u00b7 highest confidence first</h2>' + bets.map(function(b){ return b.html; }).join('') + '</div>' : '';
  const head = '<div class="card"><h2>Locks \u00b7 ' + esc(state.slate.date) + '</h2><div class="small">' + total + ' qualifying bets' +
    (gradedN ? ' \u00b7 completed so far: <b>' + hitN + '/' + gradedN + '</b> <span class="muted">(view-only \u2014 stored units land in v0.4)</span>' : '') +
    '</div>' + th + '</div>';
  el.innerHTML = total
    ? head + html
    : head + '<div class="card muted small">Nothing clears the current thresholds. That is the system working \u2014 lower thresholds in Settings if you want more (weaker) bets.</div>';
}

function coverageLine(){

  return c.games + ' games \u00b7 ' + c.players + ' players \u00b7 ' + c.from + ' \u2192 ' + c.to + ' \u00b7 ~' + c.kb + 'KB';

function renderFactsDataCard(){
  const el = document.getElementById('dataCard');
  if (!el) return;
  const env = loadPosMapEnvelope();
  const rosterLine = env
    ? Object.keys(env.map).length + ' players mapped \u00b7 ' + Math.round((Date.now() - env.t) / 3600000) + 'h old'
    : 'not built (Update builds it first)';
  el.innerHTML = '<h2>Data layer (walk-forward history)</h2>' +
    '<div class="small">' + esc(coverageLine()) + '</div>' +
    '<div class="small muted" style="margin-top:2px">Rosters (BUG-2): ' + esc(rosterLine) + '</div>' +
    '<div class="row" style="margin-top:10px">' +
      '<button class="btn" id="updBtn">Update</button>' +
      '<button class="btn ghost" id="rosterBtn">Refresh rosters</button>' +
      '<button class="btn ghost hidden" id="stopBtn">Stop</button></div>' +
    '<div class="row" style="margin-top:8px">' +
      '<input type="text" id="fromD" inputmode="numeric" placeholder="YYYY-MM-DD" value="' + esc(SEASON.start) + '" style="width:0;flex:1">' +
      '<input type="text" id="toD" inputmode="numeric" placeholder="YYYY-MM-DD" value="' + esc(addDays(todayPT(), -1)) + '" style="width:0;flex:1">' +
      '<button class="btn ghost" id="rangeBtn">Build</button></div>' +
    '<div id="scanMsg" class="small muted" style="margin-top:8px;min-height:16px"></div>' +
    '<div class="small muted" style="margin-top:4px">Only completed games are stored, stamped with their slate date. The model reads strictly before-date rows \u2014 walk-forward, no same-day leaks.</div>';

  document.getElementById('updBtn').addEventListener('click', function(){
    buildData(SEASON.start, addDays(todayPT(), -1)); // day markers skip covered dates instantly
  });
  document.getElementById('rangeBtn').addEventListener('click', function(){
    const f = document.getElementById('fromD').value.trim();
    const t = document.getElementById('toD').value.trim();
    if (!/^\d{4}-\d{2}-\d{2}$/.test(f) || !/^\d{4}-\d{2}-\d{2}$/.test(t) || f > t){
      toast('Dates must be YYYY-MM-DD, from \u2264 to');
      return;
    }
    buildData(f, t);
  });
  document.getElementById('stopBtn').addEventListener('click', function(){
    if (state.scan) state.scan.stop = true;
  });
  document.getElementById('rosterBtn').addEventListener('click', async function(){
    if (state.scan && state.scan.running) return;
    state.scan = { running: true, stop: false };
    const say = function(m){ const x = document.getElementById('scanMsg'); if (x) x.textContent = m; };
    document.getElementById('rosterBtn').disabled = true;
    try { await buildPosMap(true, say); say('Roster map rebuilt.'); }
    catch (e){ say('Roster refresh failed \u2014 ' + e.message); }
    finally { state.scan.running = false; renderFactsDataCard(); }
  });
  if (state.scan && state.scan.running){
    ['updBtn', 'rangeBtn', 'rosterBtn'].forEach(function(id){ document.getElementById(id).disabled = true; });
    document.getElementById('stopBtn').classList.remove('hidden');
  }

function renderFactsBody(){
  const el = document.getElementById('factsBody');
  if (!el) return;
  const pool = flatUnits();
  if (!pool.length){
    el.innerHTML = '<div class="card muted small">No graded units yet \u2014 build data, then Regrade all. The gate ad, All-Time record, by-date drilldown and auto-tuner all feed off it.</div>';
    return;
  }
  const cats = aggregateUnits(pool);
  const rows = sortedCatEntries(cats).map(function(e){
    const c = e[1];
    const pct = c.n ? Math.round(100 * c.hit / c.n) : null;
    return '<tr><td>' + esc(c.label) + '</td><td>' + (pct == null ? '\u2014' : '<b>' + pct + '%</b>') + '</td><td class="muted">' + c.hit + '/' + c.n + '</td></tr>';
  }).join('');
  let html = '<div class="card"><h2>All-Time \u00b7 current thresholds/tolerances</h2>' +
    '<table class="tbl"><tr><th>Category</th><th>Hit rate</th><th>n</th></tr>' + rows + '</table>' +
    '<div class="small muted" style="margin-top:6px">Change any threshold or tolerance in Settings and this whole table re-grades instantly \u2014 no refetch.</div></div>';

  // vs DraftKings — honest by construction: only dates with a stored snapshot.
  const dkDates = Object.keys(state.dkGrades).sort();
  if (dkDates.length){
    let n = 0, us = 0, dk = 0;
    for (const d of dkDates){ const t = state.dkGrades[d]; n += t.n; us += t.usHit; dk += t.dkHit; }
    html += '<div class="card"><h2>vs DraftKings (ML picks)</h2>' +
      '<div class="small">Us <b>' + us + '/' + n + '</b> (' + Math.round(100 * us / n) + '%) \u00b7 DK <b>' + dk + '/' + n + '</b> (' + Math.round(100 * dk / n) + '%) \u00b7 ' + dkDates.length + ' dated snapshots</div>' +
      '<div class="small muted" style="margin-top:4px">DK prices injuries, lineup news and sharp money we do not have \u2014 expect DK ahead overall. The edge is category-specific spots where our confidence disagrees with their price and our track record is strong.</div></div>';
  } else {
    html += '<div class="card"><h2>vs DraftKings</h2><div class="muted small">Accrues from the first DK snapshot forward: pull lines on a game day (or let the Action do it), then regrade after those games finish.</div></div>';
  }

  // Category chips + by-date bars with tap-to-drill
  const chips = [['allLocks', 'All Locks']].concat(Object.keys(CAT_META).map(function(k){ return [k, CAT_META[k].short]; }));
  html += '<div class="card"><h2>By date</h2><div>' +
    chips.map(function(c){
      return '<span class="chip' + (state.factsCat === c[0] ? ' on' : '') + '" data-cat="' + c[0] + '">' + esc(c[1]) + '</span>';
    }).join('') + '</div><div id="dateList" style="margin-top:6px"></div></div>';

  el.innerHTML = html;

  Array.prototype.forEach.call(el.querySelectorAll('.chip'), function(ch){
    ch.addEventListener('click', function(){
      state.factsCat = ch.getAttribute('data-cat');
      renderFactsBody();
    });
  });

  const dl = document.getElementById('dateList');
  const dates = Object.keys(state.seasonUnits).sort().reverse();
  const pick = function(d, cat){
    const us = state.seasonUnits[d];
    return us.filter(function(u){
      if (!unitQualifies(u)) return false;
      return cat === 'allLocks' ? true : u.cat === cat;
    });
  };
  // Daily view: one dropdown per date. Summary shows the selected category's
  // day record; open it for the full per-category table + every graded lock.
  dl.innerHTML = dates.map(function(d){
    const q = pick(d, state.factsCat);
    if (!q.length) return '';
    const hit = q.filter(unitHit).length;
    const pct = Math.round(100 * hit / q.length);
    const catRows = Object.keys(CAT_META).map(function(k){
      const cq = pick(d, k);
      if (!cq.length) return '';
      const ch = cq.filter(unitHit).length;
      return '<tr><td>' + esc(CAT_META[k].label) + '</td><td><b>' + Math.round(100 * ch / cq.length) + '%</b></td><td class="muted">' + ch + '/' + cq.length + '</td></tr>';
    }).join('');
    const units = q.slice().sort(function(a, b){ return b.metric - a.metric; }).map(function(u){
      const h = unitHit(u);
      return '<div class="small" style="padding:3px 0"><span class="gmark ' + (h ? 'y' : 'n') + '">' + (h ? '\u2713' : '\u2717') + '</span> ' +
        '<b>' + esc(u.game) + '</b> ' + esc(u.desc) + ' <span class="muted">' + u.metric + '%</span></div>';
    }).join('');
    return '<details class="dday"><summary><span>' + d + '</span>' +
      '<span class="small"><b>' + pct + '%</b> <span class="muted">' + hit + '/' + q.length + '</span></span></summary>' +
      '<div class="ddaybody"><table class="tbl">' +
      '<tr><th>Category</th><th>Hit</th><th>n</th></tr>' + catRows + '</table>' +
      '<div style="margin-top:6px">' + units + '</div></div></details>';
  }).join('') || '<div class="muted small">No qualifying locks for this category at current thresholds.</div>';
}

function bindSettings(){
  const el = document.getElementById('tab-settings');
  Array.prototype.forEach.call(el.querySelectorAll('input[data-mkt]'), function(inp){
    inp.addEventListener('change', function(){
      state.settings.markets[inp.getAttribute('data-mkt')] = inp.checked;
      saveSettings();
    });
  });
  Array.prototype.forEach.call(el.querySelectorAll('input[data-th]'), function(inp){
    inp.addEventListener('change', function(){
      state.settings.lockThresholds[inp.getAttribute('data-th')] = inp.value;
      saveSettings();
    });
  });
  Array.prototype.forEach.call(el.querySelectorAll('input[data-tol]'), function(inp){
    inp.addEventListener('change', function(){
      state.settings.hitTol[inp.getAttribute('data-tol')] = inp.value;
      saveSettings();
    });
  });
  const ok = document.getElementById('oddsKey');
  ok.addEventListener('change', function(){
    state.settings.oddsApiKey = ok.value.trim();
    saveSettings();
    toast('Key saved on this device');
  });
  document.getElementById('autoPull').addEventListener('change', function(e){
    state.settings.autoPull = e.target.checked;
    saveSettings();
    toast(e.target.checked ? 'Auto-pull ON \u2014 now Push settings so the Action sees it' : 'Auto-pull off \u2014 Push settings to sync');
  });
  document.getElementById('dkPullBtn').addEventListener('click', pullDkToday);
  document.getElementById('dkBgBtn').addEventListener('click', loadBackgroundOdds);

  document.getElementById('fbCheckBtn').addEventListener('click', async function(){
    const line = document.getElementById('fbLine');
    line.textContent = 'Checking\u2026';
    try {
      const hb = await fbRead(FB_NS, 'heartbeat');
      const q = await fbRead(FB_NS, 'dkQuota');
      const pull = await fbRead(FB_NS, 'dkPull');
      if (!state.fbConfig){ try { state.fbConfig = await fbRead(FB_NS, 'config'); } catch (e) {} }
      const hbTxt = hb && hb.t ? 'alive ' + Math.round((Date.now() - new Date(hb.t).getTime()) / 3600000) + 'h ago' : 'no heartbeat yet';
      const qTxt = q && (q.used != null || q.remaining != null) ? ' \u00b7 quota ' + (q.used != null ? q.used : '?') + ' used / ' + (q.remaining != null ? q.remaining : '?') + ' left' : '';
      const pTxt = pull && pull.date ? ' \u00b7 last pull ' + pull.date + ' ' + (pull.window || '') : '';
      const cTxt = state.fbConfig ? ' \u00b7 PIN synced \u2713' : ' \u00b7 no config doc yet';
      line.textContent = 'Automation: ' + hbTxt + qTxt + pTxt + cTxt;
    } catch (e){ line.textContent = 'Check failed \u2014 ' + e.message; }
  });
  document.getElementById('fbPushBtn').addEventListener('click', async function(){
    const line = document.getElementById('fbLine');
    try {
      line.textContent = 'Pushing\u2026';
      const pinField = document.getElementById('pinNew').value.trim();
      const pin = pinField || (state.fbConfig && state.fbConfig.pin) || PLACEHOLDER_PIN;
      const cfg = {
        pin: pin,
        settings: {
          lockThresholds: state.settings.lockThresholds,
          hitTol: state.settings.hitTol,
          markets: state.settings.markets,
          autoPull: !!state.settings.autoPull
        }
      };
      await fbWrite(FB_NS, 'config', cfg);
      state.fbConfig = cfg;
      line.textContent = 'Config pushed \u00b7 PIN + settings + autoPull synced.';
      toast('Settings pushed to Firebase');
    } catch (e){ line.textContent = 'Push failed \u2014 ' + e.message; }
  });
  document.getElementById('fbPullBtn').addEventListener('click', async function(){
    const line = document.getElementById('fbLine');
    try {
      line.textContent = 'Pulling\u2026';
      const cfg = await fbRead(FB_NS, 'config');
      if (!cfg){ line.textContent = 'No config doc yet \u2014 Push first.'; return; }
      state.fbConfig = cfg;
      if (cfg.settings){
        state.settings.lockThresholds = cfg.settings.lockThresholds || {};
        state.settings.hitTol = cfg.settings.hitTol || {};
        if (cfg.settings.markets) state.settings.markets = cfg.settings.markets;
        state.settings.autoPull = !!cfg.settings.autoPull;
        saveSettings();
      }
      toast('Settings pulled from Firebase');
      renderSettings();
    } catch (e){ line.textContent = 'Pull failed \u2014 ' + e.message; }
  });

  document.getElementById('tuneFindBtn').addEventListener('click', function(){
    const out = document.getElementById('tuneOut');
    const applyBtn = document.getElementById('tuneApplyBtn');
    const pool = flatUnits();
    if (!pool.length){ out.textContent = 'No graded units \u2014 run Regrade all on Facts first.'; applyBtn.classList.add('hidden'); return; }
    const knob = document.getElementById('tuneKnob').value.split(':');
    const target = clamp(+document.getElementById('tuneTarget').value || 85, 30, 99);
    const best = knob[0] === 'th'
      ? findThresholdForTarget(knob[1], target, pool)
      : findToleranceForTarget(knob[1], target, pool);
    if (!best){ out.textContent = 'No units in that category yet.'; applyBtn.classList.add('hidden'); return; }
    const warn = best.n < 20 ? ' \u26a0\ufe0f n<20 \u2014 too small to trust.' : '';
    out.innerHTML = (knob[0] === 'th' ? 'Threshold <b>' + best.t + '%</b>' : 'Tolerance <b>\u00b1' + best.t + '</b>') +
      ' \u2192 <b>' + best.rate.toFixed(1) + '%</b> on n=' + best.n + warn +
      '<div class="muted" style="margin-top:2px">Fitted to past results \u2014 forward performance will regress toward the honest base rate.</div>';
    applyBtn.classList.remove('hidden');
    applyBtn.onclick = function(){
      if (knob[0] === 'th') state.settings.lockThresholds[knob[1]] = String(best.t);
      else state.settings.hitTol[knob[1]] = String(best.t);
      saveSettings();
      toast('Applied \u2014 everything re-graded at the new value');
      renderSettings();
    };
  });
  document.getElementById('lockAppBtn').addEventListener('click', function(){
    try { localStorage.removeItem(PIN_OK_KEY); } catch (e) {}
    showGate();
  });
  document.getElementById('clearUrlBtn').addEventListener('click', function(){
    const n = clearUrlCache();
    toast('Cleared ' + n + ' URL cache entries');
    renderSettings();
  });
  document.getElementById('delDataBtn').addEventListener('click', function(){
    if (state.scan && state.scan.running){ toast('Stop the scan first'); return; }
    if (!confirm('Delete ALL built records, day markers and the roster map? Rebuilding takes a full re-scan.')) return;
    const n = deleteBuiltData();
    state.priorPlayer = {}; state.teamLog = {}; state.coverage = null; state.posMap = null;
    toast('Deleted ' + n + ' entries');
    renderSettings();
  });
  document.getElementById('logBtn').addEventListener('click', function(){
    const v = document.getElementById('logView');
    v.classList.toggle('hidden');
    v.innerHTML = state.log.slice().reverse().map(function(l){
      return '<div>' + esc(l.t) + ' [' + esc(l.level) + '/' + esc(l.area) + '] ' + esc(l.msg) + '</div>';
    }).join('') || '<div class="muted">empty</div>';
  });
}

const PIN_OK_KEY = 'hiq_pin_ok'; // outside hiq_v*_ pattern -> purge-safe
function currentPIN(){
  return (state.fbConfig && state.fbConfig.pin) ? String(state.fbConfig.pin) : PLACEHOLDER_PIN;
}
function isUnlocked(){
  try { return localStorage.getItem(PIN_OK_KEY) === '1'; } catch (e){ return false; }
}
function showGate(){
  document.getElementById('pinGate').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  renderGateAd();
}
function hideGate(){
  document.getElementById('pinGate').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
}
function renderGateAd(){
  // Top-3 best-record categories with sample sizes, from the cached All-Time
  // summary. Real graded numbers only — nothing made up.
  let s = null;
  try { const raw = localStorage.getItem('hiq_gate'); if (raw) s = JSON.parse(raw); } catch (e) {}
  let inner = '<h2>Track record</h2>';
  if (s && s.all && s.all.n){
    inner += '<div class="small">All Locks: <b>' + Math.round(100 * s.all.hit / s.all.n) + '%</b> (' + s.all.hit + '/' + s.all.n + ')</div>';
    for (const t of (s.top || [])){
      inner += '<div class="small muted">' + esc(t.label) + ': ' + t.pct + '% \u00b7 n=' + t.n + '</div>';
    }
    inner += '<div class="small muted" style="margin-top:4px">Graded walk-forward vs real results \u00b7 as of ' + esc(String(s.t || '').slice(0, 10)) + '</div>';
  } else {
    inner += '<div class="muted small">Best-performing bet categories (with sample sizes) show here after the first season regrade.</div>';
  }
  document.getElementById('gateAd').innerHTML = inner;
}
async function tryUnlock(){
  const inp = document.getElementById('pinInput');
  const msg = document.getElementById('pinMsg');
  // Best-effort synced-PIN read (once per session); placeholder if unreachable.
  if (fbReady() && !state.fbConfig){
    msg.textContent = 'Checking\u2026';
    try { state.fbConfig = await fbRead(FB_NS, 'config'); } catch (e){ /* offline -> placeholder */ }
  }
  if (inp.value === currentPIN()){
    try { localStorage.setItem(PIN_OK_KEY, '1'); } catch (e) {}
    inp.value = '';
    msg.textContent = '';
    hideGate();
  } else {
    msg.textContent = 'Wrong PIN';
    inp.value = '';
  }
}

function switchTab(name){

  });
  ['games', 'bets', 'facts', 'settings'].forEach(function(t){
    document.getElementById('tab-' + t).classList.toggle('hidden', t !== name);

  if (name === 'bets') renderBets();
  if (name === 'facts') renderFacts();
  if (name === 'settings') renderSettings();
}

function toast(msg, ms){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(toast._h);
  toast._h = setTimeout(function(){ t.classList.add('hidden'); }, ms || 2600);
}

function boot(){
  /* CRON MODE (?cron=1): headless grading for the GitHub Action — no UI. */
  if (new URLSearchParams(location.search).get('cron') === '1'){
    state.settings = loadSettings();
    runCronGrade();
    return;
  }
  /* CRON MODE (?cron=dk): scheduled DK line pull, gated by the Board. */
  if (new URLSearchParams(location.search).get('cron') === 'dk'){
    state.settings = loadSettings();
    runCronDkPull();
    return;
  }
  document.getElementById('verBadge').textContent = 'v' + APP.version;
  document.getElementById('fbPill').textContent = fbReady() ? 'FB: ' + FB.projectId : 'Firebase: not set';
  purgeStaleCache(); // quota hygiene only — no data fetches on boot
  state.settings = loadSettings();
  // League-wide lock config from the Board overrides device settings on open.
  pullSharedLockCfg().then(function(got){ if (got){ try { renderFactsBody(); } catch (e) {} } }).catch(function(){});
  state.slateDate = todayPT();

  document.getElementById('dPrev').addEventListener('click', function(){
    state.slateDate = addDays(state.slateDate, -1); closeGame(); renderGames();
  });
  document.getElementById('dNext').addEventListener('click', function(){
    state.slateDate = addDays(state.slateDate, 1); closeGame(); renderGames();
  });
  document.getElementById('dPick').addEventListener('change', function(e){
    const v = (e.target.value || '').trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(v)){ state.slateDate = v; closeGame(); renderGames(); }
  });
  document.getElementById('todayBtn').addEventListener('click', function(){
    state.slateDate = todayPT(); closeGame(); renderGames();
  });
  document.getElementById('loadBtn').addEventListener('click', loadSlate);
  document.getElementById('projBtn').addEventListener('click', projectSlate);
  document.getElementById('gameSearch').addEventListener('input', renderGames);
  Array.prototype.forEach.call(document.querySelectorAll('#tabbar button'), function(b){
    b.addEventListener('click', function(){ switchTab(b.getAttribute('data-tab')); });
  });
  document.getElementById('pinBtn').addEventListener('click', tryUnlock);
  document.getElementById('pinInput').addEventListener('keydown', function(e){
    if (e.key === 'Enter') tryUnlock();
  });

  renderGames();
  try{localStorage.setItem(PIN_OK_KEY,'1');}catch(e){} hideGate();
  logEvent('info', 'boot', APP.name + ' v' + APP.version + ' ready \u2014 cloud sync starting');
  setTimeout(function(){ autoCloudSync(); }, 60); // mandatory, non-blocking, quiet when in sync
}
document.addEventListener('DOMContentLoaded', boot);
</script>

<script>window.__APPKEY='nba';</script>
<script>
/* ═══ UNIFIED BOARD GATE ═══════════════════════════════════════════════════
   Single source of truth for access: the Board's member list
   (app_settings/board_access in mlb-bets-d196c). Every app validates the
   device's saved identity against the live list + that member's granted apps
   and active flag, so removing someone (or an app from them) locks them out on
   their next open. Admin PIN (2325) and any ?cron= run always bypass, so the
   owner and the automation can never be locked out. The free app (mlbfree)
   only needs a name. Also carries the global DK-visibility switch. */
(function(){
  if (new URLSearchParams(location.search).get('cron')) return; // never gate automation
  var APPKEY = window.__APPKEY, FREE = APPKEY === 'mlbfree';
  var MP = 'mlb-bets-d196c', MK = 'AIzaSyAm8TgK3Hl5ndWmqpYlBJs-u64JbeIg2W0';
  var DOC = 'https://firestore.googleapis.com/v1/projects/' + MP + '/databases/(default)/documents/';
  var LS = 'board_member_v3';
  var norm = function(v){ return String(v == null ? '' : v).trim().toLowerCase(); };
  var pinOk = function(v){ try { return String(v).trim() === atob('MjMyNQ=='); } catch (e){ return false; } };
  var esc = function(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); };
  function saved(){ try { return JSON.parse(localStorage.getItem(LS) || 'null'); } catch (e){ return null; } }
  function parseMembers(f){ if (f && f.members && f.members.stringValue){ try { return JSON.parse(f.members.stringValue) || []; } catch (e){ return []; } } return []; }
  function grantOf(s, list){
    if (!s) return { ok: false };
    if (s.free) return { ok: true, apps: ['mlbfree'], dk: false };
    if (s.code && pinOk(s.code)) return { ok: true, apps: null, dk: true };
    for (var i = 0; i < list.length; i++){ var m = list[i];
      if (norm(m.code) !== norm(s.code)) continue;              // must match THEIR personal code
      if (m.name != null && norm(m.name) !== norm(s.name)) continue; // AND their name
      return { ok: true, apps: (m.apps && m.apps.length) ? m.apps : null, dk: m.dk !== false };
    }
    return { ok: false };
  }
  function okApp(g){ return g.ok && (!g.apps || g.apps.indexOf(APPKEY) >= 0); }
  var ov, dkVisG = true;
  function setDk(v){ window.__DK_OK = v; if (!v) document.documentElement.classList.add('dk-off'); else document.documentElement.classList.remove('dk-off'); try { if (typeof window.__onDkVisibility === 'function') window.__onDkVisibility(v); } catch (e) {} }
  function cover(html){
    if (ov) ov.remove();
    ov = document.createElement('div');
    ov.style.cssText = 'position:fixed;inset:0;z-index:2147483000;background:#0a0d12;color:#e8edf4;display:flex;align-items:center;justify-content:center;padding:24px;font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif';
    ov.innerHTML = html;
    document.body.appendChild(ov);
    document.documentElement.style.overflow = 'hidden';
  }
  function pass(){ if (ov){ ov.remove(); ov = null; } document.documentElement.style.overflow = ''; }
  function inp(id, ph, cap){ return '<input id="' + id + '" placeholder="' + ph + '" autocomplete="off" autocapitalize="' + cap + '" style="width:100%;box-sizing:border-box;background:#182231;border:1px solid #243146;border-radius:9px;color:#e8edf4;padding:12px;font-size:16px;margin-bottom:10px">'; }
  function logFree(name){
    try {
      fetch(DOC + 'app_settings/free_log?key=' + MK).then(function(r){ return r.ok ? r.json() : null; }).then(function(j){
        var arr = []; try { arr = JSON.parse((((j || {}).fields || {}).list || {}).stringValue || '[]'); } catch (e) {}
        if (!arr.some(function(x){ return norm(x.n) === norm(name); })) arr.unshift({ n: name, t: Date.now() });
        arr = arr.slice(0, 200);
        fetch(DOC + 'app_settings/free_log?key=' + MK + '&updateMask.fieldPaths=list', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fields: { list: { stringValue: JSON.stringify(arr) } } }) });
      }).catch(function(){});
    } catch (e) {}
  }
  function showGate(list){
    var fields = FREE
      ? inp('bg-name', 'Your name', 'words')
      : inp('bg-name', 'Your name', 'words') + inp('bg-code', 'Access code', 'none');
    cover('<div style="width:100%;max-width:340px;text-align:center">' +
      '<div style="font-size:26px;font-weight:800;margin-bottom:6px">Members only</div>' +
      '<div style="color:#8fa0b5;font-size:14px;line-height:1.5;margin-bottom:16px">' + (FREE ? 'Enter your first and last name to use the free app.' : 'Enter your first and last name, and your access code.') + '</div>' +
      fields +
      '<div id="bg-err" style="color:#ff7a7a;font-size:12.5px;min-height:16px;margin:6px 0"></div>' +
      '<button id="bg-go" style="width:100%;border:0;border-radius:9px;padding:13px;font-weight:800;background:#e8edf4;color:#0b0d12;font-size:15px">Enter</button></div>');
    var err = function(t){ document.getElementById('bg-err').textContent = t; };
    var twoNames = function(n){ return String(n||'').trim().split(/\s+/).filter(Boolean).length >= 2; };
    var go = function(){
      var name = ((document.getElementById('bg-name') || {}).value || '').trim();
      var code = (document.getElementById('bg-code') || {}).value || '';
      if (pinOk(code) || pinOk(name)){ // admin PIN accepted from EITHER field
        try { localStorage.setItem(LS, JSON.stringify({ name: 'admin', code: atob('MjMyNQ==') })); } catch (e) {}
        pass(); return;
      }
      if (!twoNames(name)){ err('Enter your first and last name.'); return; }
      if (FREE){
        try { localStorage.setItem(LS, JSON.stringify({ free: true, name: name })); } catch (e) {}
        logFree(name); pass(); return;
      }
      var g = grantOf({ name: name, code: code }, list);
      if (okApp(g)){ try { localStorage.setItem(LS, JSON.stringify({ name: name, code: String(code).trim() })); } catch (e) {} setDk(dkVisG && (g.dk !== false)); pass(); }
      else if (g.ok){ err('Your access doesn’t include this app. Ask the owner.'); }
      else { err('No match — check your name and code, or your access was turned off.'); }
    };
    document.getElementById('bg-go').addEventListener('click', go);
    ov.querySelectorAll('input').forEach(function(i){ i.addEventListener('keydown', function(e){ if (e.key === 'Enter') go(); }); });
    setTimeout(function(){ var i = document.getElementById('bg-name'); if (i) i.focus(); }, 200);
  }
  cover('<div style="color:#5c6b80;font:600 12px/1 ui-monospace,Menlo,monospace;letter-spacing:.16em;text-transform:uppercase">Checking access…</div>');
  (async function(){
    var list = null, dkVis = true;
    try { var r = await fetch(DOC + 'app_settings/board_access?key=' + MK, { cache: 'no-store' }); if (r.ok) list = parseMembers((await r.json()).fields || {}); } catch (e) {}
    try { var r2 = await fetch(DOC + 'app_settings/dk_auto?key=' + MK, { cache: 'no-store' }); if (r2.ok){ var f = (await r2.json()).fields || {}; if (f.dkVisible && f.dkVisible.booleanValue === false) dkVis = false; } } catch (e) {}
    dkVisG = dkVis;
    var s = saved();
    if (list === null){ // offline: trust a known device rather than lock it out on a network blip
      if (s && (s.free || s.name || (s.code && pinOk(s.code)))){ setDk(dkVis); pass(); return; }
      list = [];
    }
    var g = grantOf(s, list);
    setDk(dkVis && (g.ok ? (g.dk !== false) : true)); // effective DK = global switch AND this member's DK toggle
    if (okApp(g)){ pass(); return; }
    showGate(list);
  })();
})();
</script>
