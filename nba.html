      const actW = recData.home.pts > recData.away.pts ? recData.home.ab : recData.away.ab;
      const wOK = actW === proj.winAb;
      const tOK = Math.abs(aTot - proj.total) <= hitTol('pts');
      html += '<div class="small" style="margin-top:6px">Actual ' + recData.away.pts + '\u2013' + recData.home.pts +
        ' \u00b7 winner <span class="' + (wOK ? 'rate-good' : 'rate-bad') + '">' + (wOK ? '\u2713' : '\u2717') + '</span>' +
        ' \u00b7 total \u0394' + Math.abs(aTot - proj.total).toFixed(1) + ' <span class="' + (tOK ? 'rate-good' : 'rate-bad') + '">' + (tOK ? '\u2713' : '\u2717') + '</span></div>';
    }
    html += '<div style="margin-top:8px"><button class="btn ghost" id="mathBtn">Show math</button></div>' +
      '<div id="mathBox" class="hidden small muted" style="margin-top:8px;white-space:pre-wrap;font-family:ui-monospace,Menlo,monospace">' + esc(mathBreakdown(g, proj)) + '</div></div>';

    html += propsHtml(proj, recData);
  }

  el.innerHTML = html;
  bindBack();
  const mb = document.getElementById('mathBtn');
  if (mb) mb.addEventListener('click', function(){ document.getElementById('mathBox').classList.toggle('hidden'); });
  bindPropRows(el);
}

  const th = '<div class="small muted" style="margin-top:4px">Thresholds: winner \u2265' + lockTh('winner') + '% \u00b7 lines \u2265' + lockTh('lines') + '% \u00b7 props \u2265' + lockTh('props') + '% \u00b7 tol \u00b1' + hitTol('pts') + ' pts / \u00b1' + hitTol('stat') + ' stat</div>';
  if (!state.slate || state.slate.date !== state.slateDate){
    el.innerHTML = '<div class="card"><h2>Locks</h2><div class="muted small">Load a slate on Games, then tap Project Slate.</div>' + th + '</div>';
    return;
  }
  const projected = state.slate.games.filter(function(g){ return state.projections[g.id]; });
  if (!projected.length){
    el.innerHTML = '<div class="card"><h2>Locks \u00b7 ' + esc(state.slate.date) + '</h2><div class="muted small">Tap Project Slate on Games to compute this date\u2019s bets.</div>' + th + '</div>';
    return;
  }
  let total = 0, hitN = 0, gradedN = 0, html = '';
  for (const g of projected){
    const proj = state.projections[g.id];
    let recD = null;
    if (g.completed){
      try { recD = hasRecord(g.id) ? JSON.parse(localStorage.getItem(recKey(g.id))) : null; } catch (e) {}
    }
    const rows = [];
    const mark = function(ok, extra){
      gradedN++; if (ok) hitN++;
      return ' <span class="' + (ok ? 'rate-good' : 'rate-bad') + '">' + (extra != null ? extra + ' ' : '') + (ok ? '\u2713' : '\u2717') + '</span>';
    };
    if (s.markets.winner !== false && proj.winMetric >= lockTh('winner')){
      let m = '';
      if (recD && recD.home.pts != null && recD.away.pts != null){
        const actW = recD.home.pts > recD.away.pts ? recD.home.ab : recD.away.ab;
        m = mark(actW === proj.winAb, null);
      }
      rows.push('<div class="row small" style="padding:4px 0"><div class="grow">Winner: <b>' + esc(proj.winAb) + '</b>' + m + '</div><div class="lock">' + proj.winMetric + '% \ud83d\udd12</div></div>');
    }
    if (s.markets.total !== false && proj.confTotal >= lockTh('lines')){
      let m = '';
      if (recD && recD.home.pts != null && recD.away.pts != null){
        const aTot = recD.home.pts + recD.away.pts;
        m = mark(Math.abs(aTot - proj.total) <= hitTol('pts'), aTot);
      }
      rows.push('<div class="row small" style="padding:4px 0"><div class="grow">Total ' + proj.total + ' \u00b1' + hitTol('pts') + m + '</div><div class="lock">' + proj.confTotal + '% \ud83d\udd12</div></div>');
    }
    if (s.markets.teamPts !== false && proj.confTeam >= lockTh('lines')){
      const sides = [[g.away.abbr, proj.awayPts, recD ? recD.away.pts : null], [g.home.abbr, proj.homePts, recD ? recD.home.pts : null]];
      for (const sd of sides){
        let m = '';
        if (sd[2] != null) m = mark(Math.abs(sd[2] - sd[1]) <= hitTol('pts'), sd[2]);
        rows.push('<div class="row small" style="padding:4px 0"><div class="grow">' + esc(sd[0]) + ' pts ' + sd[1] + ' \u00b1' + hitTol('pts') + m + '</div><div class="lock">' + proj.confTeam + '% \ud83d\udd12</div></div>');
      }
    }
    for (const p of proj.props){
      if (s.markets[p.cat] === false) continue;
      if (p.conf < lockTh('props')) continue;
      let m = '';
      const act = actualFor(recD, p.pid, p.stat);
      if (act != null) m = mark(Math.abs(act - p.proj) <= hitTol('stat'), act);
      rows.push('<div class="row small" style="padding:4px 0"><div class="grow">' + esc(p.name) + ' ' + p.stat + ' ' + p.proj + ' \u00b1' + hitTol('stat') +
        (p.inj === 'questionable' ? ' <span style="color:var(--amber)">Q</span>' : '') + m + '</div><div class="lock">' + p.conf + '% \ud83d\udd12</div></div>');
    }
    if (rows.length){
      total += rows.length;
      html += '<div class="card"><h2>' + esc(g.away.abbr) + ' @ ' + esc(g.home.abbr) + '</h2>' + rows.join('') + '</div>';
    }
  }
  const head = '<div class="card"><h2>Locks \u00b7 ' + esc(state.slate.date) + '</h2><div class="small">' + total + ' qualifying bets' +
    (gradedN ? ' \u00b7 completed so far: <b>' + hitN + '/' + gradedN + '</b> <span class="muted">(view-only \u2014 stored units land in v0.4)</span>' : '') +
    '</div>' + th + '</div>';
  el.innerHTML = total
    ? head + html
    : head + '<div class="card muted small">Nothing clears the current thresholds. That is the system working \u2014 lower thresholds in Settings if you want more (weaker) bets.</div>';
}

function renderFactsBody(){
  const el = document.getElementById('factsBody');
  if (!el) return;
  const pool = flatUnits();
  if (!pool.length){
    el.innerHTML = '<div class="card muted small">No graded units yet \u2014 build data, then Regrade all. The gate ad, All-Time record, by-date drilldown and auto-tuner all feed off it.</div>';
    return;
  }
  const cats = aggregateUnits(pool);
  const rows = sortedCatEntries(cats).map(function(e){
    const c = e[1];
    const pct = c.n ? Math.round(100 * c.hit / c.n) : null;
    return '<tr><td>' + esc(c.label) + '</td><td>' + (pct == null ? '\u2014' : '<b>' + pct + '%</b>') + '</td><td class="muted">' + c.hit + '/' + c.n + '</td></tr>';
  }).join('');
  let html = '<div class="card"><h2>All-Time \u00b7 current thresholds/tolerances</h2>' +
    '<table class="tbl"><tr><th>Category</th><th>Hit rate</th><th>n</th></tr>' + rows + '</table>' +
    '<div class="small muted" style="margin-top:6px">Change any threshold or tolerance in Settings and this whole table re-grades instantly \u2014 no refetch.</div></div>';

  // vs DraftKings — honest by construction: only dates with a stored snapshot.
  const dkDates = Object.keys(state.dkGrades).sort();
  if (dkDates.length){
    let n = 0, us = 0, dk = 0;
    for (const d of dkDates){ const t = state.dkGrades[d]; n += t.n; us += t.usHit; dk += t.dkHit; }
    html += '<div class="card"><h2>vs DraftKings (ML picks)</h2>' +
      '<div class="small">Us <b>' + us + '/' + n + '</b> (' + Math.round(100 * us / n) + '%) \u00b7 DK <b>' + dk + '/' + n + '</b> (' + Math.round(100 * dk / n) + '%) \u00b7 ' + dkDates.length + ' dated snapshots</div>' +
      '<div class="small muted" style="margin-top:4px">DK prices injuries, lineup news and sharp money we do not have \u2014 expect DK ahead overall. The edge is category-specific spots where our confidence disagrees with their price and our track record is strong.</div></div>';
  } else {
    html += '<div class="card"><h2>vs DraftKings</h2><div class="muted small">Accrues from the first DK snapshot forward: pull lines on a game day (or let the Action do it), then regrade after those games finish.</div></div>';
  }

  // Category chips + by-date bars with tap-to-drill
  const chips = [['allLocks', 'All Locks']].concat(Object.keys(CAT_META).map(function(k){ return [k, CAT_META[k].short]; }));
  html += '<div class="card"><h2>By date</h2><div>' +
    chips.map(function(c){
      return '<span class="chip' + (state.factsCat === c[0] ? ' on' : '') + '" data-cat="' + c[0] + '">' + esc(c[1]) + '</span>';
    }).join('') + '</div><div id="dateList" style="margin-top:6px"></div></div>';

  el.innerHTML = html;

  Array.prototype.forEach.call(el.querySelectorAll('.chip'), function(ch){
    ch.addEventListener('click', function(){
      state.factsCat = ch.getAttribute('data-cat');
      renderFactsBody();
    });
  });

  const dl = document.getElementById('dateList');
  const dates = Object.keys(state.seasonUnits).sort().reverse();
  const pick = function(d){
    const us = state.seasonUnits[d];
    return us.filter(function(u){
      if (!unitQualifies(u)) return false;
      return state.factsCat === 'allLocks' ? true : u.cat === state.factsCat;
    });
  };
  dl.innerHTML = dates.map(function(d){
    const q = pick(d);
    if (!q.length) return '';
    const hit = q.filter(unitHit).length;
    const pct = Math.round(100 * hit / q.length);
    return '<div class="daterow" data-d="' + d + '"><div>' + d + '</div>' +
      '<div class="small"><b>' + pct + '%</b> <span class="muted">' + hit + '/' + q.length + '</span></div></div>';
  }).join('') || '<div class="muted small">No qualifying locks for this category at current thresholds.</div>';
  Array.prototype.forEach.call(dl.querySelectorAll('.daterow'), function(row){
    row.addEventListener('click', function(){
      const existing = row.nextElementSibling;
      if (existing && existing.classList.contains('drill')){ existing.remove(); return; }
      const d = row.getAttribute('data-d');
      const q = pick(d).slice().sort(function(a, b){ return (a.game < b.game ? -1 : a.game > b.game ? 1 : 0) || (b.metric - a.metric); });
      const inner = q.map(function(u){
        const h = unitHit(u);
        return '<div class="small" style="padding:3px 0"><span class="' + (h ? 'rate-good' : 'rate-bad') + '">' + (h ? '\u2713' : '\u2717') + '</span> ' +
          '<b>' + esc(u.game) + '</b> ' + esc(u.desc) + ' <span class="muted">' + u.metric + '%</span></div>';
      }).join('');
      row.insertAdjacentHTML('afterend', '<div class="drill" style="padding:6px 0 8px;border-bottom:1px solid var(--line)">' + inner + '</div>');
    });
  });
}

      if (!state.fbConfig){ try { state.fbConfig = await fbRead(FB_NS, 'config'); } catch (e) {} }
      const hbTxt = hb && hb.t ? 'alive ' + Math.round((Date.now() - new Date(hb.t).getTime()) / 3600000) + 'h ago' : 'no heartbeat yet';
      const qTxt = q && (q.used != null || q.remaining != null) ? ' \u00b7 quota ' + (q.used != null ? q.used : '?') + ' used / ' + (q.remaining != null ? q.remaining : '?') + ' left' : '';
      const pTxt = pull && pull.date ? ' \u00b7 last pull ' + pull.date + ' ' + (pull.window || '') : '';
      const cTxt = state.fbConfig ? ' \u00b7 PIN synced \u2713' : ' \u00b7 no config doc yet';
      line.textContent = 'Automation: ' + hbTxt + qTxt + pTxt + cTxt;
    } catch (e){ line.textContent = 'Check failed \u2014 ' + e.message; }
  });
  document.getElementById('fbPushBtn').addEventListener('click', async function(){
    const line = document.getElementById('fbLine');
    try {
      line.textContent = 'Pushing\u2026';
      const pinField = document.getElementById('pinNew').value.trim();
      const pin = pinField || (state.fbConfig && state.fbConfig.pin) || PLACEHOLDER_PIN;
      const cfg = {
        pin: pin,
        settings: {
          lockThresholds: state.settings.lockThresholds,
          hitTol: state.settings.hitTol,
          markets: state.settings.markets,
          autoPull: !!state.settings.autoPull
        }
      };
      await fbWrite(FB_NS, 'config', cfg);
      state.fbConfig = cfg;
      line.textContent = 'Config pushed \u00b7 PIN + settings + autoPull synced.';
      toast('Settings pushed to Firebase');
    } catch (e){ line.textContent = 'Push failed \u2014 ' + e.message; }
  });
  document.getElementById('fbPullBtn').addEventListener('click', async function(){
    const line = document.getElementById('fbLine');
    try {
      line.textContent = 'Pulling\u2026';
      const cfg = await fbRead(FB_NS, 'config');
      if (!cfg){ line.textContent = 'No config doc yet \u2014 Push first.'; return; }
      state.fbConfig = cfg;
      if (cfg.settings){
        state.settings.lockThresholds = cfg.settings.lockThresholds || {};
        state.settings.hitTol = cfg.settings.hitTol || {};
        if (cfg.settings.markets) state.settings.markets = cfg.settings.markets;
        state.settings.autoPull = !!cfg.settings.autoPull;
        saveSettings();
      }
      toast('Settings pulled from Firebase');
      renderSettings();
    } catch (e){ line.textContent = 'Pull failed \u2014 ' + e.message; }
  });

  document.getElementById('tuneFindBtn').addEventListener('click', function(){
    const out = document.getElementById('tuneOut');
    const applyBtn = document.getElementById('tuneApplyBtn');
    const pool = flatUnits();
    if (!pool.length){ out.textContent = 'No graded units \u2014 run Regrade all on Facts first.'; applyBtn.classList.add('hidden'); return; }
    const knob = document.getElementById('tuneKnob').value.split(':');
    const target = clamp(+document.getElementById('tuneTarget').value || 85, 30, 99);
    const best = knob[0] === 'th'
      ? findThresholdForTarget(knob[1], target, pool)
      : findToleranceForTarget(knob[1], target, pool);
    if (!best){ out.textContent = 'No units in that category yet.'; applyBtn.classList.add('hidden'); return; }
    const warn = best.n < 20 ? ' \u26a0\ufe0f n<20 \u2014 too small to trust.' : '';
    out.innerHTML = (knob[0] === 'th' ? 'Threshold <b>' + best.t + '%</b>' : 'Tolerance <b>\u00b1' + best.t + '</b>') +
      ' \u2192 <b>' + best.rate.toFixed(1) + '%</b> on n=' + best.n + warn +
      '<div class="muted" style="margin-top:2px">Fitted to past results \u2014 forward performance will regress toward the honest base rate.</div>';
    applyBtn.classList.remove('hidden');
    applyBtn.onclick = function(){
      if (knob[0] === 'th') state.settings.lockThresholds[knob[1]] = String(best.t);
      else state.settings.hitTol[knob[1]] = String(best.t);
      saveSettings();
      toast('Applied \u2014 everything re-graded at the new value');
      renderSettings();
    };
  });
  document.getElementById('lockAppBtn').addEventListener('click', function(){
    try { localStorage.removeItem(PIN_OK_KEY); } catch (e) {}
    showGate();
  });
  document.getElementById('clearUrlBtn').addEventListener('click', function(){
    const n = clearUrlCache();
    toast('Cleared ' + n + ' URL cache entries');
    renderSettings();
  });
  document.getElementById('delDataBtn').addEventListener('click', function(){
    if (state.scan && state.scan.running){ toast('Stop the scan first'); return; }
    if (!confirm('Delete ALL built records, day markers and the roster map? Rebuilding takes a full re-scan.')) return;
    const n = deleteBuiltData();
    state.priorPlayer = {}; state.teamLog = {}; state.coverage = null; state.posMap = null;
    toast('Deleted ' + n + ' entries');
    renderSettings();
  });
  document.getElementById('logBtn').addEventListener('click', function(){
    const v = document.getElementById('logView');
    v.classList.toggle('hidden');
    v.innerHTML = state.log.slice().reverse().map(function(l){
      return '<div>' + esc(l.t) + ' [' + esc(l.level) + '/' + esc(l.area) + '] ' + esc(l.msg) + '</div>';
    }).join('') || '<div class="muted">empty</div>';
  });
}

/* ============ 9. PIN GATE (member paywall) ============ */
const PIN_OK_KEY = 'hiq_pin_ok'; // outside hiq_v*_ pattern -> purge-safe
function currentPIN(){
  return (state.fbConfig && state.fbConfig.pin) ? String(state.fbConfig.pin) : PLACEHOLDER_PIN;
}
function isUnlocked(){
  try { return localStorage.getItem(PIN_OK_KEY) === '1'; } catch (e){ return false; }
}
function showGate(){
  document.getElementById('pinGate').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  renderGateAd();
}
function hideGate(){
  document.getElementById('pinGate').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
}
function renderGateAd(){
  // Top-3 best-record categories with sample sizes, from the cached All-Time
  // summary. Real graded numbers only — nothing made up.
  let s = null;
  try { const raw = localStorage.getItem('hiq_gate'); if (raw) s = JSON.parse(raw); } catch (e) {}
  let inner = '<h2>Track record</h2>';
  if (s && s.all && s.all.n){
    inner += '<div class="small">All Locks: <b>' + Math.round(100 * s.all.hit / s.all.n) + '%</b> (' + s.all.hit + '/' + s.all.n + ')</div>';
    for (const t of (s.top || [])){
      inner += '<div class="small muted">' + esc(t.label) + ': ' + t.pct + '% \u00b7 n=' + t.n + '</div>';
    }
    inner += '<div class="small muted" style="margin-top:4px">Graded walk-forward vs real results \u00b7 as of ' + esc(String(s.t || '').slice(0, 10)) + '</div>';
  } else {
    inner += '<div class="muted small">Best-performing bet categories (with sample sizes) show here after the first season regrade.</div>';
  }
  document.getElementById('gateAd').innerHTML = inner;
}
async function tryUnlock(){
  const inp = document.getElementById('pinInput');
  const msg = document.getElementById('pinMsg');
  // Best-effort synced-PIN read (once per session); placeholder if unreachable.
  if (fbReady() && !state.fbConfig){
    msg.textContent = 'Checking\u2026';
    try { state.fbConfig = await fbRead(FB_NS, 'config'); } catch (e){ /* offline -> placeholder */ }
  }
  if (inp.value === currentPIN()){
    try { localStorage.setItem(PIN_OK_KEY, '1'); } catch (e) {}
    inp.value = '';
    msg.textContent = '';
    hideGate();
  } else {
    msg.textContent = 'Wrong PIN';
    inp.value = '';
  }
}

/* ============ 10. TABS & BOOT (nothing auto-loads, ever) ============ */
function switchTab(name){
  Array.prototype.forEach.call(document.querySelectorAll('#tabbar button'), function(b){
    b.classList.toggle('active', b.getAttribute('data-tab') === name);
  });
  ['games', 'bets', 'facts', 'settings'].forEach(function(t){
    document.getElementById('tab-' + t).classList.toggle('hidden', t !== name);
  });
  if (name === 'bets') renderBets();
  if (name === 'facts') renderFacts();
  if (name === 'settings') renderSettings();
}

function toast(msg, ms){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(toast._h);
  toast._h = setTimeout(function(){ t.classList.add('hidden'); }, ms || 2600);
}

function boot(){
  /* CRON MODE (?cron=1): headless grading for the GitHub Action — no UI. */
  if (new URLSearchParams(location.search).get('cron') === '1'){
    state.settings = loadSettings();
    runCronGrade();
    return;
  }
  document.getElementById('verBadge').textContent = 'v' + APP.version;
  document.getElementById('fbPill').textContent = fbReady() ? 'FB: ' + FB.projectId : 'Firebase: not set';
  purgeStaleCache(); // quota hygiene only — no data fetches on boot
  state.settings = loadSettings();
  state.slateDate = todayPT();

  document.getElementById('dPrev').addEventListener('click', function(){
    state.slateDate = addDays(state.slateDate, -1); closeGame(); renderGames();
  });
  document.getElementById('dNext').addEventListener('click', function(){
    state.slateDate = addDays(state.slateDate, 1); closeGame(); renderGames();
  });
  document.getElementById('dPick').addEventListener('change', function(e){
    const v = (e.target.value || '').trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(v)){ state.slateDate = v; closeGame(); renderGames(); }
  });
  document.getElementById('todayBtn').addEventListener('click', function(){
    state.slateDate = todayPT(); closeGame(); renderGames();
  });
  document.getElementById('loadBtn').addEventListener('click', loadSlate);
  document.getElementById('projBtn').addEventListener('click', projectSlate);
  document.getElementById('gameSearch').addEventListener('input', renderGames);
  Array.prototype.forEach.call(document.querySelectorAll('#tabbar button'), function(b){
    b.addEventListener('click', function(){ switchTab(b.getAttribute('data-tab')); });
  });
  document.getElementById('pinBtn').addEventListener('click', tryUnlock);
  document.getElementById('pinInput').addEventListener('keydown', function(e){
    if (e.key === 'Enter') tryUnlock();
  });

  renderGames();
  if (isUnlocked()) hideGate(); else showGate();
  logEvent('info', 'boot', APP.name + ' v' + APP.version + ' ready \u2014 no data auto-loaded');
}
document.addEventListener('DOMContentLoaded', boot);
</script>
