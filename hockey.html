<style>

<main>

</main>
<nav>

  <button data-tab="bets"><span class="ico">&#128274;</span>Bets</button>

  <button data-tab="settings"><span class="ico">&#9881;&#65039;</span>Settings</button>

<div id="toast" class="hidden"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   Icing v0.3 — NHL projections, built to the repo STANDARDS.md.
   Walk-forward like The Key: every projection uses ONLY games completed
   before the projected date, records are stored locally + mirrored to
   Firestore, raw graded units power the Facts explorer and the Board's
   lock-grade preview, and ?cron=1 self-grades headlessly.
   Markets: winner · game total O/U (±tol) · 1st-period total O/U (±tol) ·
   anytime goal scorer · point scorer.
   ═══════════════════════════════════════════════════════════════════════════ */

/* ═══ SECTION: CONFIG ═══ */
const APP = { version: '0.3' };
const SEASON = { start: '2025-10-07', end: '2026-06-30' }; // 2025-26 incl. playoffs
const ESPN = {
  scoreboard: d => 'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/scoreboard?dates=' + d.replace(/-/g, ''),
  summary: id => 'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/summary?event=' + id
};
const CAT_META = {
  winner: { label: 'Winner',              th: 'winner', short: 'Winner' },
  total:  { label: 'Game Total ±T',       th: 'lines',  short: 'Total' },
  p1:     { label: '1st Period Total ±T', th: 'lines',  short: '1st per.' },
  goal:   { label: 'Goal Scorers',        th: 'props',  short: 'Goal' },
  point:  { label: 'Point Scorers',       th: 'props',  short: 'Point' },
  dkML:   { label: 'vs DK · ML value',    th: 'dk',     short: 'DK ML' },
  dkTotal:{ label: 'vs DK · Total O/U',   th: 'dk',     short: 'DK Tot' }
};
const TOL_KEY_BY_CAT = { total: 'goals', p1: 'p1' };
const LOCK_DEFAULTS = { winner: 58, lines: 0, props: 40, dk: 0 };
const TOL_DEFAULTS = { goals: 1, p1: 1 };
const HOME_BUMP = 0.12;   // home-ice goals bump
const PYTH_EX = 2.2;      // hockey Pythagorean exponent
const REGRESS_GP = 12;    // player-rate regression games
const state = {
  tab: 'games', slateDate: null, slate: null, projections: {},
  seasonUnits: {}, settings: { lockThresholds: {}, hitTol: {} },
  scan: { running: false, stop: false }, factsCat: 'allLocks', factsOpen: null, dkByDate: {}
};

/* ═══ SECTION: STORE (localStorage + Firestore mirror) ═══ */
const FB = { projectId: 'nflbets-45561', apiKey: 'AIzaSyAznP57admgAtnJqnMu7uJ6WZYpYjrIP3g' };
const FB_NS = 'nhl';            // singleton docs: nhl/allTime, nhl/lockcfg
const FB_RECS = 'nhl_recs';     // per-date compact game records
const FB_ACC = 'nhl_accuracy';  // per-date raw graded units
const FB_DK = 'nhl_dk';         // per-date DK line snapshots
const ODDS_KEY_SHARED = '370bfb0e8958dcfc4e4880fedfb548b1'; // the-odds-api (shared)
const MLBCFG = { p: 'mlb-bets-d196c', k: 'AIzaSyAm8TgK3Hl5ndWmqpYlBJs-u64JbeIg2W0' }; // Board settings project
const DK_ODDS_URL = 'https://api.the-odds-api.com/v4/sports/icehockey_nhl/odds/?regions=us&markets=h2h,totals&oddsFormat=american&bookmakers=draftkings&apiKey=';
function fbReady(){ return FB.projectId.length > 0; }
function fbDocUrl(col, doc){
  return 'https://firestore.googleapis.com/v1/projects/' + FB.projectId +
    '/databases/(default)/documents/' + col + '/' + doc + '?key=' + FB.apiKey;
}
async function fbRead(col, doc){
  if (!fbReady()) return null;
  const res = await fetch(fbDocUrl(col, doc));
  if (res.status === 404) return null;
  if (!res.ok) throw new Error('FB read ' + res.status);
  const j = await res.json();
  const s = j.fields && j.fields.data && j.fields.data.stringValue;
  return s ? JSON.parse(s) : null;
}
async function fbWrite(col, doc, obj){
  if (!fbReady()) return false;
  const body = { fields: { data: { stringValue: JSON.stringify(obj) }, t: { stringValue: new Date().toISOString() } } };
  const res = await fetch(fbDocUrl(col, doc) + '&updateMask.fieldPaths=data&updateMask.fieldPaths=t', {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('FB write ' + res.status);
  return true;
}
async function fbListCol(col){
  if (!fbReady()) return {};
  const out = {};
  let tok = '';
  for (let page = 0; page < 4; page++){
    const url = 'https://firestore.googleapis.com/v1/projects/' + FB.projectId +
      '/databases/(default)/documents/' + col + '?pageSize=300&key=' + FB.apiKey + (tok ? '&pageToken=' + tok : '');
    const res = await fetch(url);
    if (!res.ok) throw new Error('FB list ' + res.status);
    const j = await res.json();
    for (const d of (j.documents || [])){
      const id = d.name.split('/').pop();
      const s = d.fields && d.fields.data && d.fields.data.stringValue;
      if (s){ try { out[id] = JSON.parse(s); } catch (e) {} }
    }
    tok = j.nextPageToken || '';
    if (!tok) break;
  }
  return out;
}
const REC_PREFIX = 'ice_recs_';   // one localStorage key per date
function loadRecs(date){
  try { return JSON.parse(localStorage.getItem(REC_PREFIX + date) || 'null'); } catch (e){ return null; }
}
function saveRecs(date, recs){
  try { localStorage.setItem(REC_PREFIX + date, JSON.stringify(recs)); return true; } catch (e){ return false; }
}
function allRecDates(){
  const out = [];
  for (let i = 0; i < localStorage.length; i++){
    const k = localStorage.key(i);
    if (k && k.indexOf(REC_PREFIX) === 0) out.push(k.slice(REC_PREFIX.length));
  }
  return out.sort();
}
/* Shared lock config — the Board writes nhl/lockcfg; devices + cron merge it
   over local settings so lock grades are league-wide. */
async function pullSharedLockCfg(){
  try {
    const cfg = await fbRead(FB_NS, 'lockcfg');
    if (!cfg) return false;
    state.settings.lockThresholds = Object.assign({}, state.settings.lockThresholds, cfg.lockThresholds || {});
    state.settings.hitTol = Object.assign({}, state.settings.hitTol, cfg.hitTol || {});
    return true;
  } catch (e){ return false; }
}

/* ═══ SECTION: DATA (ESPN — CORS-safe, every fetch non-fatal) ═══ */
async function fetchJSON(url){
  const r = await fetch(url, { cache: 'no-store' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
function parseScoreboard(j){
  return (j.events || []).map(ev => {
    const c = (ev.competitions || [])[0] || {};
    const side = ha => (c.competitors || []).find(t => t.homeAway === ha) || {};
    const mk = t => ({
      id: t.team && t.team.id, ab: (t.team && t.team.abbreviation) || '?',
      g: t.score != null ? +t.score : null,
      p1: (t.linescores && t.linescores[0] && t.linescores[0].value != null) ? +t.linescores[0].value : null
    });
    return {
      id: ev.id, state: ev.status && ev.status.type && ev.status.type.state,
      completed: !!(ev.status && ev.status.type && ev.status.type.completed),
      home: mk(side('home')), away: mk(side('away'))
    };
  });
}
function toiMin(s){
  if (!s || s.indexOf(':') < 0) return 0;
  const p = s.split(':');
  return (+p[0] || 0) + (+p[1] || 0) / 60;
}
async function fetchGameRecord(game, date){
  // Compact record: skaters as [pid, name, teamAb, goals, assists, toiMin]
  const j = await fetchJSON(ESPN.summary(game.id));
  const players = [];
  for (const blk of ((j.boxscore || {}).players || [])){
    const ab = blk.team && blk.team.abbreviation;
    for (const grp of (blk.statistics || [])){
      if (grp.name !== 'forwards' && grp.name !== 'defenses') continue;
      const keys = grp.keys || [];
      const gi = keys.indexOf('goals'), ai = keys.indexOf('assists'), ti = keys.indexOf('timeOnIce');
      for (const a of (grp.athletes || [])){
        const st = a.stats || [];
        if (!st.length) continue;
        players.push([a.athlete.id, a.athlete.displayName, ab, +(st[gi] || 0), +(st[ai] || 0), Math.round(toiMin(st[ti]) * 10) / 10]);
      }
    }
  }
  return { id: game.id, date: date, home: game.home, away: game.away, players: players };
}
async function buildData(from, to, onProg){
  // Fetch + store every completed date in [from, to] that isn't stored yet.
  let d = from, built = 0, failed = 0;
  while (d <= to){
    if (state.scan.stop) break;
    if (!loadRecs(d)){
      if (onProg) onProg('Fetching ' + d + '…');
      try {
        const sb = parseScoreboard(await fetchJSON(ESPN.scoreboard(d)));
        const done = sb.filter(g => g.completed && g.home.g != null);
        const recs = [];
        for (const g of done){
          try { recs.push(await fetchGameRecord(g, d)); }
          catch (e){ failed++; }
        }
        // store even empty days (off days) so we never refetch them
        if (recs.length === done.length) { saveRecs(d, recs); built += recs.length; }
      } catch (e){ failed++; }
    }
    d = addDays(d, 1);
  }
  return { built, failed };
}

/* ═══ SECTION: MODEL (walk-forward — strictly before-date records) ═══ */
function priorRecords(beforeDate){
  const out = [];
  for (const d of allRecDates()){
    if (d >= beforeDate) break;
    const recs = loadRecs(d);
    if (recs) for (const r of recs) out.push(r);
  }
  return out;
}
function teamRates(prior){
  // Per team: goals for/against per game (recent 20 games weighted 60/40),
  // 1st-period for/against per game.
  const T = {};
  const touch = ab => T[ab] || (T[ab] = { games: [], p1f: 0, p1a: 0, p1n: 0 });
  for (const r of prior){
    const h = touch(r.home.ab), a = touch(r.away.ab);
    h.games.push([r.home.g, r.away.g]); a.games.push([r.away.g, r.home.g]);
    if (r.home.p1 != null && r.away.p1 != null){
      h.p1f += r.home.p1; h.p1a += r.away.p1; h.p1n++;
      a.p1f += r.away.p1; a.p1a += r.home.p1; a.p1n++;
    }
  }
  let lgG = 0, lgN = 0, lgP1 = 0, lgP1n = 0;
  Object.values(T).forEach(t => {
    t.games.forEach(g => { lgG += g[0]; lgN++; });
    lgP1 += t.p1f; lgP1n += t.p1n;
  });
  const lgGpg = lgN ? lgG / lgN : 3.0;          // league goals per team-game
  const lgP1pg = lgP1n ? lgP1 / lgP1n : 0.9;    // league 1st-period goals per team-game
  Object.keys(T).forEach(ab => {
    const t = T[ab], n = t.games.length;
    if (!n){ T[ab] = null; return; }
    const rec = t.games.slice(-20);
    const avg = arr => {
      let f = 0, a2 = 0;
      arr.forEach(g => { f += g[0]; a2 += g[1]; });
      return [f / arr.length, a2 / arr.length];
    };
    const [fAll, aAll] = avg(t.games), [fRec, aRec] = avg(rec);
    const w = Math.min(0.6, rec.length / 33);   // recent weight grows with sample
    T[ab] = {
      n: n,
      gf: fRec * w + fAll * (1 - w), ga: aRec * w + aAll * (1 - w),
      p1f: t.p1n ? t.p1f / t.p1n : lgP1pg, p1a: t.p1n ? t.p1a / t.p1n : lgP1pg
    };
  });
  return { T, lgGpg, lgP1pg };
}
function playerRates(prior){
  // Per skater: games, goals, points, avg TOI, team, name — plus the id set
  // from each team's LAST game (tonight's lineup proxy, same as The Key).
  const P = {}, lastLineup = {};
  for (const r of prior){
    for (const pl of (r.players || [])){
      const [pid, name, ab, g, a, toi] = pl;
      const p = P[pid] || (P[pid] = { name, ab, gp: 0, g: 0, pts: 0, toi: 0 });
      p.name = name; p.ab = ab; p.gp++; p.g += g; p.pts += g + a; p.toi += toi;
    }
  }
  for (const d of allRecDates().slice().reverse()){
    const recs = loadRecs(d); if (!recs) continue;
    for (const r of recs){
      for (const side of ['home', 'away']){
        const ab = r[side].ab;
        if (!lastLineup[ab]) lastLineup[ab] = r.players.filter(pl => pl[2] === ab).map(pl => pl[0]);
      }
    }
    if (Object.keys(lastLineup).length >= 32) break;
  }
  return { P, lastLineup };
}
function projectGame(game, ctx){
  // ctx = { rates, players } computed once per slate (walk-forward for its date)
  const { T, lgGpg, lgP1pg } = ctx.rates;
  const h = T[game.home.ab], a = T[game.away.ab];
  if (!h || !a || h.n < 8 || a.n < 8) return null; // insufficient history — skip honestly
  const eH = lgGpg * (h.gf / lgGpg) * (a.ga / lgGpg) + HOME_BUMP / 2;
  const eA = lgGpg * (a.gf / lgGpg) * (h.ga / lgGpg) - HOME_BUMP / 2;
  const pH = Math.pow(eH, PYTH_EX) / (Math.pow(eH, PYTH_EX) + Math.pow(eA, PYTH_EX));
  const winAb = pH >= 0.5 ? game.home.ab : game.away.ab;
  const winMetric = Math.round(Math.max(pH, 1 - pH) * 100);
  const total = Math.round((eH + eA) * 10) / 10;
  const p1 = Math.round((h.p1f * (a.p1a / lgP1pg) + a.p1f * (h.p1a / lgP1pg)) * 10) / 10;
  // players: everyone in each team's last-game lineup with enough history
  const props = [];
  for (const side of ['home', 'away']){
    const ab = game[side].ab, oppAb = side === 'home' ? game.away.ab : game.home.ab;
    const opp = T[oppAb];
    const oppF = opp ? Math.max(0.7, Math.min(1.3, opp.ga / lgGpg)) : 1;
    for (const pid of (ctx.players.lastLineup[ab] || [])){
      const p = ctx.players.P[pid];
      if (!p || p.gp < 8) continue;
      const gRate = (p.g + 0.10 * REGRESS_GP) / (p.gp + REGRESS_GP);   // regressed goals/game
      const ptRate = (p.pts + 0.28 * REGRESS_GP) / (p.gp + REGRESS_GP); // regressed points/game
      const pGoal = 1 - Math.exp(-gRate * oppF);
      const pPoint = 1 - Math.exp(-ptRate * oppF);
      props.push({ pid, name: p.name, ab,
        goalConf: Math.round(pGoal * 100), pointConf: Math.round(pPoint * 100),
        why: p.g + 'G ' + p.pts + 'P in ' + p.gp + ' GP · ' + (p.toi / p.gp).toFixed(1) + ' min · opp defense ×' + oppF.toFixed(2) });
    }
  }
  props.sort((x, y) => y.goalConf - x.goalConf);
  return { winAb, winMetric, pHome: pH, eH: Math.round(eH * 10) / 10, eA: Math.round(eA * 10) / 10, total, p1, props };
}

/* ═══ SECTION: GRADE (stored picks vs real results — read-time thresholds) ═══ */
function lockTh(key){
  const lt = state.settings.lockThresholds || {};
  const v = +lt[key];
  return isFinite(v) && lt[key] !== '' && lt[key] != null ? Math.max(0, Math.min(99, v)) : LOCK_DEFAULTS[key];
}
function hitTol(key){
  const ht = state.settings.hitTol || {};
  const v = +ht[key];
  return isFinite(v) && ht[key] !== '' && ht[key] != null && v > 0 ? Math.min(10, v) : TOL_DEFAULTS[key];
}
function unitsFromRecord(rec, proj){
  const units = [];
  const gm = rec.away.ab + '@' + rec.home.ab;
  if (rec.home.g == null || rec.away.g == null) return units;
  const actW = rec.home.g > rec.away.g ? rec.home.ab : rec.away.ab;
  units.push({ cat: 'winner', metric: proj.winMetric, hit: actW === proj.winAb, game: gm,
    desc: 'Winner ' + proj.winAb + ' ' + proj.winMetric + '% → ' + actW });
  const aTot = rec.home.g + rec.away.g;
  units.push({ cat: 'total', metric: proj.winMetric, adelta: Math.abs(aTot - proj.total), game: gm,
    desc: 'Total ' + proj.total + ' → ' + aTot });
  if (rec.home.p1 != null && rec.away.p1 != null){
    const aP1 = rec.home.p1 + rec.away.p1;
    units.push({ cat: 'p1', metric: proj.winMetric, adelta: Math.abs(aP1 - proj.p1), game: gm,
      desc: '1st period ' + proj.p1 + ' → ' + aP1 });
  }
  const byPid = {};
  for (const pl of (rec.players || [])) byPid[pl[0]] = pl;
  for (const pr of proj.props){
    const pl = byPid[pr.pid];
    if (!pl) continue; // scratched — nothing to grade
    units.push({ cat: 'goal', metric: pr.goalConf, hit: pl[3] >= 1, game: gm,
      desc: pr.name + ' anytime goal ' + pr.goalConf + '% → ' + pl[3] + 'G' });
    units.push({ cat: 'point', metric: pr.pointConf, hit: (pl[3] + pl[4]) >= 1, game: gm,
      desc: pr.name + ' 1+ point ' + pr.pointConf + '% → ' + (pl[3] + pl[4]) + 'P' });
  }
  return units;
}
// Bet AGAINST DraftKings when a line snapshot exists: ML value (we take our pick
// only when our win prob beats DK's implied price) + goal total O/U lean.
function dkUnitsFromRecord(rec, proj, snap){
  const units = [];
  if (!snap || !snap.games) return units;
  const e = snap.games[rec.away.ab + '@' + rec.home.ab];
  if (!e || rec.home.g == null || rec.away.g == null) return units;
  const gm = rec.away.ab + '@' + rec.home.ab;
  const aTot = rec.home.g + rec.away.g;
  const actW = rec.home.g > rec.away.g ? rec.home.ab : rec.away.ab;
  const imp = function(p){ return p < 0 ? (-p) / ((-p) + 100) : 100 / (p + 100); };
  if (e.mlHome != null && e.mlAway != null){
    const pickHome = proj.winAb === rec.home.ab;
    const dkP = imp(pickHome ? e.mlHome : e.mlAway);
    if ((proj.winMetric / 100) > dkP + 0.03){
      units.push({ cat: 'dkML', metric: proj.winMetric, hit: proj.winAb === actW, game: gm,
        desc: 'ML value ' + proj.winAb + ' (' + proj.winMetric + '% vs DK ' + Math.round(dkP * 100) + '%) → ' + actW });
    }
  }
  if (e.total != null && aTot !== e.total){
    const lean = proj.total > e.total ? 'OVER' : 'UNDER';
    const hit = lean === 'OVER' ? aTot > e.total : aTot < e.total;
    units.push({ cat: 'dkTotal', metric: proj.winMetric, hit: hit, game: gm,
      desc: lean + ' ' + e.total + ' (proj ' + proj.total + ') → ' + aTot });
  }
  return units;
}
async function seedDkFromFB(){ try { state.dkByDate = await fbListCol(FB_DK); } catch (e) { state.dkByDate = state.dkByDate || {}; } return Object.keys(state.dkByDate || {}).length; }
function unitQualifies(u){ return u.metric >= lockTh(CAT_META[u.cat].th); }
function unitHit(u){
  const tk = TOL_KEY_BY_CAT[u.cat];
  if (tk && u.adelta != null) return u.adelta <= hitTol(tk);
  return !!u.hit;
}
function aggregateUnits(units){
  const cats = {};
  for (const k in CAT_META){ if (typeof window!=='undefined' && window.__DK_OK===false && /^dk/.test(k)) continue; cats[k] = { hit: 0, n: 0, label: CAT_META[k].label.replace('±T', '±' + hitTol(TOL_KEY_BY_CAT[k] || 'goals')) }; }
  const all = { hit: 0, n: 0, label: 'All Locks' };
  for (const u of units){
    if (typeof window!=='undefined' && window.__DK_OK===false && /^dk/.test(u.cat)) continue; 
    if (!cats[u.cat] || !unitQualifies(u)) continue;
    const h = unitHit(u);
    cats[u.cat].n++; if (h) cats[u.cat].hit++;
    all.n++; if (h) all.hit++;
  }
  return Object.assign({ allLocks: all }, cats);
}
async function regradeAll(onProg){
  state.seasonUnits = {};
  await seedDkFromFB();
  const dates = allRecDates();
  let graded = 0, unitCount = 0, early = 0;
  for (let i = 0; i < dates.length; i++){
    const d = dates[i];
    const recs = loadRecs(d);
    if (!recs || !recs.length) continue;
    if (onProg && i % 10 === 0) onProg('Grading ' + d + '…');
    await new Promise(r => setTimeout(r, 0));
    const ctx = { rates: teamRates(priorRecords(d)), players: playerRates(priorRecords(d)) };
    const units = [];
    const snap = state.dkByDate[d];
    for (const rec of recs){
      const proj = projectGame(rec, ctx);
      if (!proj){ early++; continue; }
      units.push.apply(units, unitsFromRecord(rec, proj));
      units.push.apply(units, dkUnitsFromRecord(rec, proj, snap));
    }
    if (units.length){ state.seasonUnits[d] = units; graded++; unitCount += units.length; }
  }
  return { graded, unitCount, early };
}
function flatUnits(){
  let out = [];
  for (const d of Object.keys(state.seasonUnits).sort()) out = out.concat(state.seasonUnits[d]);
  return out;
}
function saveGateSummary(){
  const agg = aggregateUnits(flatUnits());
  const entries = Object.keys(agg).filter(k => k !== 'allLocks' && agg[k].n >= 20)
    .map(k => ({ label: agg[k].label, pct: Math.round(100 * agg[k].hit / Math.max(1, agg[k].n)), n: agg[k].n }))
    .sort((a, b) => b.pct - a.pct).slice(0, 3);
  const summary = { t: new Date().toISOString(), all: { hit: agg.allLocks.hit, n: agg.allLocks.n }, top: entries };
  if (fbReady()) fbWrite(FB_NS, 'allTime', summary).catch(() => {});
  return summary;
}
async function pushUnitsFB(onProg){
  // Serialized (await each + small delay) — Firestore queued-write cap.
  const dates = Object.keys(state.seasonUnits).sort();
  let ok = 0;
  for (let i = 0; i < dates.length; i++){
    if (onProg && i % 10 === 0) onProg('Pushing units ' + (i + 1) + '/' + dates.length + '…');
    try { await fbWrite(FB_ACC, dates[i], state.seasonUnits[dates[i]]); ok++; } catch (e) {}
    await new Promise(r => setTimeout(r, 50));
  }
  return ok;
}
async function pushRecsFB(onProg){
  const dates = allRecDates();
  let ok = 0;
  const have = await fbListColIds(FB_RECS);
  for (let i = 0; i < dates.length; i++){
    if (have.has(dates[i])) continue;
    const recs = loadRecs(dates[i]);
    if (!recs || !recs.length) continue;
    if (onProg) onProg('Mirroring ' + dates[i] + '…');
    try { await fbWrite(FB_RECS, dates[i], recs); ok++; } catch (e) {}
    await new Promise(r => setTimeout(r, 50));
  }
  return ok;
}
async function fbListColIds(col){
  const ids = new Set();
  try {
    let tok = '';
    for (let page = 0; page < 4; page++){
      const url = 'https://firestore.googleapis.com/v1/projects/' + FB.projectId +
        '/databases/(default)/documents/' + col + '?pageSize=300&key=' + FB.apiKey +
        '&mask.fieldPaths=t' + (tok ? '&pageToken=' + tok : '');
      const res = await fetch(url);
      if (!res.ok) break;
      const j = await res.json();
      (j.documents || []).forEach(d => ids.add(d.name.split('/').pop()));
      tok = j.nextPageToken || '';
      if (!tok) break;
    }
  } catch (e) {}
  return ids;
}
async function seedFromFB(onProg){
  if (onProg) onProg('Seeding records from the cloud…');
  let seeded = 0;
  try {
    const docs = await fbListCol(FB_RECS);
    for (const d in docs){
      if (!loadRecs(d)){ if (saveRecs(d, docs[d])) seeded++; }
    }
  } catch (e) {}
  return seeded;
}

/* ═══ SECTION: CRON (?cron=1 — headless self-grading for GitHub Actions) ═══ */
/* Scheduled DK pull (?cron=dk): gated by the Board's app_settings/dk_auto
   (hockeyOn/hockeyDays/hockeyHours, Pacific). Fetches today's ESPN slate for
   team full names, pulls DK h2h+totals, maps by name, stores nhl_dk/{date}. */
async function runCronDkPull(){
  window.__cronStatus = 'dk: starting';
  try {
    let c = {};
    try {
      const r = await fetch('https://firestore.googleapis.com/v1/projects/' + MLBCFG.p + '/databases/(default)/documents/app_settings/dk_auto?key=' + MLBCFG.k, { cache: 'no-store' });
      if (r.ok){ const f = (await r.json()).fields || {};
        c = { on: f.hockeyOn ? f.hockeyOn.booleanValue !== false : true }; }
    } catch (e) {}
    const on = c.on !== false;
    // No day/hour schedule: only games within 2h of puck drop are pulled, once each.
    if (!on){ window.__cronStatus = 'dk: skipped — NHL auto pull is OFF'; window.__cronDone = true; return; }
    const date = todayPT();
    // Build fullName -> abbr from ESPN so DK's full team names map to our abbreviations
    window.__cronStatus = 'dk: building slate ' + date;
    const nameToAb = {}; const pairs = [];
    try {
      const sb = await fetchJSON(ESPN.scoreboard(date));
      for (const ev of (sb.events || [])){
        const c2 = (ev.competitions || [])[0] || {};
        const h = (c2.competitors || []).find(function(x){ return x.homeAway === 'home'; });
        const a = (c2.competitors || []).find(function(x){ return x.homeAway === 'away'; });
        if (!h || !a) continue;
        const hAb = h.team.abbreviation, aAb = a.team.abbreviation;
        nameToAb[h.team.displayName] = hAb; nameToAb[a.team.displayName] = aAb;
        pairs.push({ hAb: hAb, aAb: aAb, start: ev.date ? new Date(ev.date).getTime() : 0 });
      }
    } catch (e) {}
    if (!pairs.length){ window.__cronStatus = 'dk: no NHL games ' + date; window.__cronDone = true; return; }
    const lastWord = function(x){ const p = String(x || '').trim().split(' '); return p[p.length - 1]; };
    const toAb = function(name){
      if (nameToAb[name]) return nameToAb[name];
      const lw = lastWord(name);
      const hit = Object.keys(nameToAb).find(function(k){ return lastWord(k) === lw; });
      return hit ? nameToAb[hit] : null;
    };
    // Pull only games within 2h of puck drop we don't already have — once each.
    let existing = {};
    try { const cur = await fbRead(FB_DK, date); if (cur && cur.games) existing = cur.games; } catch (e) {}
    const now = Date.now(), WIN = 2 * 3600 * 1000;
    const eligibleKeys = new Set();
    for (const pr of pairs){ const gm = pr.aAb + '@' + pr.hAb; if (pr.start > now && pr.start <= now + WIN && !existing[gm]) eligibleKeys.add(gm); }
    if (!eligibleKeys.size){ window.__cronStatus = 'dk: skipped — no NHL games within 2h of puck drop that still need lines'; window.__cronDone = true; return; }
    window.__cronStatus = 'dk: pulling DK lines for ' + eligibleKeys.size + ' game(s)';
    const res = await fetch(DK_ODDS_URL + ODDS_KEY_SHARED);
    if (!res.ok) throw new Error('odds API ' + res.status);
    let remaining = null; try { remaining = res.headers.get('x-requests-remaining'); } catch (e) {}
    const arr = await res.json();
    const games = Object.assign({}, existing); let n = 0;
    for (const ev of (arr || [])){
      if (String(ev.commence_time).slice(0, 10) < date) continue;
      const hAb = toAb(ev.home_team), aAb = toAb(ev.away_team);
      if (!hAb || !aAb) continue;
      const gm = aAb + '@' + hAb;
      if (!eligibleKeys.has(gm) || games[gm]) continue;
      const bk = (ev.bookmakers || []).find(function(b){ return b.key === 'draftkings'; });
      if (!bk) continue;
      const mk = function(k){ return (bk.markets || []).find(function(m){ return m.key === k; }); };
      const h2h = mk('h2h'), tot = mk('totals');
      const price = function(m, team){ const o = m && (m.outcomes || []).find(function(x){ return x.name === team; }); return o && o.price != null ? o.price : null; };
      const tO = tot && (tot.outcomes || []).find(function(x){ return x.name === 'Over'; });
      games[gm] = { gm: gm, mlHome: price(h2h, ev.home_team), mlAway: price(h2h, ev.away_team), total: tO && tO.point != null ? tO.point : null };
      n++;
    }
    await fbWrite(FB_DK, date, { date: date, fetched: new Date().toISOString(), games: games });
    if (remaining != null){
      try {
        await fetch('https://firestore.googleapis.com/v1/projects/' + MLBCFG.p + '/databases/(default)/documents/app_settings/dk_status?key=' + MLBCFG.k + '&updateMask.fieldPaths=hockeyCalls&updateMask.fieldPaths=hockeyAt', {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fields: { hockeyCalls: { integerValue: String(parseInt(remaining, 10)) }, hockeyAt: { integerValue: String(Date.now()) } } }) });
      } catch (e) {}
    }
    window.__cronStatus = 'dk: done — ' + n + ' DK lines stored for ' + date + ' (' + (remaining != null ? remaining : '?') + ' calls left)';
  } catch (e){ window.__cronStatus = 'dk: ERROR — ' + (e && e.message || e); }
  window.__cronDone = true;
}

async function runCronGrade(){
  const clog = m => { window.__cronStatus = 'cron: ' + m; try { console.log('[ice] ' + m); } catch (e) {} };
  window.__cronStatus = 'cron: starting';
  try {
    clog('applying shared lock config');
    try { await pullSharedLockCfg(); } catch (e) {}
    const seeded = await seedFromFB(clog);
    clog('seeded ' + seeded + ' dates from nhl_recs');
    let espnOK = false;
    try {
      const probe = await fetch(ESPN.scoreboard('2026-01-10'), { cache: 'no-store' });
      espnOK = probe.ok;
      clog('ESPN probe: HTTP ' + probe.status);
    } catch (e){ clog('ESPN probe FAILED — runner IP likely blocked (retries next run)'); }
    const before = allRecDates().length;
    if (espnOK){
      clog('building season ' + SEASON.start + ' → ' + minDate(todayPT(), SEASON.end));
      const b = await buildData(SEASON.start, minDate(todayPT(), SEASON.end), clog);
      clog('build: +' + b.built + ' games (' + b.failed + ' fetch failures)');
    }
    const after = allRecDates().length;
    if (!after){
      if (!espnOK){
        clog('SKIPPED — ESPN refused this runner and the cloud has no records yet. Next run gets a fresh IP.');
        window.__cronDone = true;
        return;
      }
      throw new Error('0 stored dates after build despite ESPN probe OK');
    }
    clog('regrading season (walk-forward)');
    const g = await regradeAll(clog);
    clog('graded ' + g.graded + ' dates · ' + g.unitCount + ' units · ' + g.early + ' early games skipped');
    if (!g.unitCount) throw new Error('0 graded units after regrade — see log');
    clog('pushing units to nhl_accuracy');
    const pushed = await pushUnitsFB(clog);
    clog('mirroring records to nhl_recs');
    const mirrored = await pushRecsFB(clog);
    /* RETENTION: one rolling season — prune cloud docs dated before this
       season's start (nothing to prune until the SEASON const rolls over). */
    try {
      let pruned = 0;
      for (const col of [FB_RECS, FB_ACC]){
        const ids = await fbListColIds(col);
        for (const id of ids){
          if (/^\d{4}-\d{2}-\d{2}$/.test(id) && id < SEASON.start){
            try { await fetch(fbDocUrl(col, id), { method: 'DELETE' }); pruned++; } catch (e) {}
            await new Promise(r => setTimeout(r, 50));
          }
        }
      }
      if (pruned) clog('retention: pruned ' + pruned + ' pre-season docs');
    } catch (e) {}
    const agg = aggregateUnits(flatUnits());
    const entries = Object.keys(agg).filter(k => k !== 'allLocks' && agg[k].n >= 20)
      .map(k => ({ label: agg[k].label, pct: Math.round(100 * agg[k].hit / Math.max(1, agg[k].n)), n: agg[k].n }))
      .sort((a, b) => b.pct - a.pct).slice(0, 3);
    const summary = { t: new Date().toISOString(), all: { hit: agg.allLocks.hit, n: agg.allLocks.n }, top: entries };
    await fbWrite(FB_NS, 'allTime', summary); // awaited — the verify below must see THIS write
    // verify-don't-trust: read the summary back before claiming success
    const check = await fbRead(FB_NS, 'allTime');
    if (!check || !check.all || check.all.n !== summary.all.n) throw new Error('summary verify failed — wrote n=' + summary.all.n + ' but read back ' + JSON.stringify(check && check.all));
    /* SUPER LOCKS: publish TODAY'S locks (nhl/today) for the Board's quick bet
       finder — same walk-forward projections + thresholds the app uses. Wrapped
       so a failure here can never break grading. */
    try {
      const tdate = todayPT();
      let tgames = [];
      try { tgames = parseScoreboard(await fetchJSON(ESPN.scoreboard(tdate))); } catch (e) {}
      const tlocks = [];
      const prior = priorRecords(tdate);
      if (tgames.length && prior.length >= 100){
        const tctx = { rates: teamRates(prior), players: playerRates(prior) };
        for (const gg of tgames){
          if (gg.completed) continue;
          const proj = projectGame(gg, tctx);
          if (!proj) continue;
          const gm = gg.away.ab + '@' + gg.home.ab;
          if (proj.winMetric >= lockTh('winner')) tlocks.push({ cat: 'winner', desc: gm + ' — winner ' + proj.winAb, metric: proj.winMetric });
          if (proj.winMetric >= lockTh('lines')){
            tlocks.push({ cat: 'total', desc: gm + ' — total ' + proj.total + ' ±' + hitTol('goals'), metric: proj.winMetric });
            tlocks.push({ cat: 'p1', desc: gm + ' — 1st period ' + proj.p1 + ' ±' + hitTol('p1'), metric: proj.winMetric });
          }
          for (const pr of (proj.props || [])){
            if (pr.goalConf >= lockTh('props')) tlocks.push({ cat: 'goal', desc: pr.name + ' (' + pr.ab + ') — anytime goal', metric: pr.goalConf });
            if (pr.pointConf >= lockTh('props')) tlocks.push({ cat: 'point', desc: pr.name + ' (' + pr.ab + ') — 1+ point', metric: pr.pointConf });
          }
        }
      }
      await fbWrite(FB_NS, 'today', { date: tdate, locks: tlocks });
      clog('published ' + tlocks.length + ' lock(s) to nhl/today for the Board');
    } catch (e){ clog('today-locks publish warn: ' + (e && e.message || e)); }
    clog('done — ' + after + ' dates stored, ' + g.unitCount + ' units, ' + pushed + ' unit docs pushed, ' + mirrored + ' rec docs mirrored, nhl/allTime verified (' + summary.all.hit + '/' + summary.all.n + ' locks)');
  } catch (e){ window.__cronStatus = 'cron: ERROR — ' + (e && e.message || e); }
  window.__cronDone = true;
}

/* ═══ SECTION: BOOT ═══ */
(function boot(){
  $id('verBadge').textContent = 'v' + APP.version + ' · walk-forward';
  document.querySelectorAll('nav button').forEach(b => b.onclick = () => switchTab(b.getAttribute('data-tab')));
  if (new URLSearchParams(location.search).get('cron') === '1'){ runCronGrade(); return; }
  if (new URLSearchParams(location.search).get('cron') === 'dk'){ runCronDkPull(); return; }
  pullSharedLockCfg().then(got => { if (got && state.tab === 'facts') renderFacts(); }).catch(() => {});
  renderGames();
  // auto-load today's slate if we already have history; otherwise Facts builds it
  if (allRecDates().length > 50) loadSlate(todayPT());
  // background: keep the record fresh + graded on open (seed → build → grade)
  setTimeout(() => { buildFactsBackground(); }, 1200);
})();
</script>

<script>window.__APPKEY='hockey';</script>
<script>
/* ═══ UNIFIED BOARD GATE ═══════════════════════════════════════════════════
   Single source of truth for access: the Board's member list
   (app_settings/board_access in mlb-bets-d196c). Every app validates the
   device's saved identity against the live list + that member's granted apps
   and active flag, so removing someone (or an app from them) locks them out on
   their next open. Admin PIN (2325) and any ?cron= run always bypass, so the
   owner and the automation can never be locked out. The free app (mlbfree)
   only needs a name. Also carries the global DK-visibility switch. */
(function(){
  if (new URLSearchParams(location.search).get('cron')) return; // never gate automation
  var APPKEY = window.__APPKEY, FREE = APPKEY === 'mlbfree';
  var MP = 'mlb-bets-d196c', MK = 'AIzaSyAm8TgK3Hl5ndWmqpYlBJs-u64JbeIg2W0';
  var DOC = 'https://firestore.googleapis.com/v1/projects/' + MP + '/databases/(default)/documents/';
  var LS = 'board_member_v3';
  var norm = function(v){ return String(v == null ? '' : v).trim().toLowerCase(); };
  var pinOk = function(v){ try { return String(v).trim() === atob('MjMyNQ=='); } catch (e){ return false; } };
  var esc = function(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); };
  function saved(){ try { return JSON.parse(localStorage.getItem(LS) || 'null'); } catch (e){ return null; } }
  function parseMembers(f){ if (f && f.members && f.members.stringValue){ try { return JSON.parse(f.members.stringValue) || []; } catch (e){ return []; } } return []; }
  function grantOf(s, list){
    if (!s) return { ok: false };
    if (s.free) return { ok: true, apps: ['mlbfree'], dk: false, dkMode: 'off' };
    if (s.code && pinOk(s.code)) return { ok: true, apps: null, dk: true, dkMode: 'unlimited' };
    for (var i = 0; i < list.length; i++){ var m = list[i];
      if (norm(m.code) !== norm(s.code)) continue;              // must match THEIR personal code
      if (m.name != null && norm(m.name) !== norm(s.name)) continue; // AND their name
      return { ok: true, apps: (m.apps && m.apps.length) ? m.apps : null, dk: m.dk !== false, dkMode: m.dkMode || (m.dk === false ? 'off' : 'unlimited') };
    }
    return { ok: false };
  }
  function okApp(g){ return g.ok && (!g.apps || g.apps.indexOf(APPKEY) >= 0); }
  var ov, dkVisG = true;
  function setDk(v){ window.__DK_OK = v; if (!v) document.documentElement.classList.add('dk-off'); else document.documentElement.classList.remove('dk-off'); try { if (typeof window.__onDkVisibility === 'function') window.__onDkVisibility(v); } catch (e) {} }
  // DK 'limited' tiers see DraftKings odds only on calendar days 1–15 each month;
  // from the 16th on it's off until the 1st rolls around again.
  function dkEff(g, dkVis, code){
    var base = dkVis && g && (g.dk !== false);
    if (!base) return false;
    var mode = (g && g.dkMode) || 'unlimited';
    if (mode === 'off') return false;
    if (mode === 'limited') return (new Date()).getDate() <= 15;
    return true; // unlimited
  }
  function cover(html){
    if (ov) ov.remove();
    ov = document.createElement('div');
    ov.style.cssText = 'position:fixed;inset:0;z-index:2147483000;background:#0a0d12;color:#e8edf4;display:flex;align-items:center;justify-content:center;padding:24px;font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif';
    ov.innerHTML = html;
    document.body.appendChild(ov);
    document.documentElement.style.overflow = 'hidden';
  }
  function pass(){ if (ov){ ov.remove(); ov = null; } document.documentElement.style.overflow = ''; }
  function inp(id, ph, cap){ return '<input id="' + id + '" placeholder="' + ph + '" autocomplete="off" autocapitalize="' + cap + '" style="width:100%;box-sizing:border-box;background:#182231;border:1px solid #243146;border-radius:9px;color:#e8edf4;padding:12px;font-size:16px;margin-bottom:10px">'; }
  function logFree(name){
    try {
      fetch(DOC + 'app_settings/free_log?key=' + MK).then(function(r){ return r.ok ? r.json() : null; }).then(function(j){
        var arr = []; try { arr = JSON.parse((((j || {}).fields || {}).list || {}).stringValue || '[]'); } catch (e) {}
        if (!arr.some(function(x){ return norm(x.n) === norm(name); })) arr.unshift({ n: name, t: Date.now() });
        arr = arr.slice(0, 200);
        fetch(DOC + 'app_settings/free_log?key=' + MK + '&updateMask.fieldPaths=list', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fields: { list: { stringValue: JSON.stringify(arr) } } }) });
      }).catch(function(){});
    } catch (e) {}
  }
  function showGate(list){
    var fields = FREE
      ? inp('bg-name', 'Your name', 'words')
      : inp('bg-name', 'Your name', 'words') + inp('bg-code', 'Access code', 'none');
    cover('<div style="width:100%;max-width:340px;text-align:center">' +
      '<div style="font-size:26px;font-weight:800;margin-bottom:6px">Members only</div>' +
      '<div style="color:#8fa0b5;font-size:14px;line-height:1.5;margin-bottom:16px">' + (FREE ? 'Enter your first and last name to use the free app.' : 'Enter your first and last name, and your access code.') + '</div>' +
      fields +
      '<div id="bg-err" style="color:#ff7a7a;font-size:12.5px;min-height:16px;margin:6px 0"></div>' +
      '<button id="bg-go" style="width:100%;border:0;border-radius:9px;padding:13px;font-weight:800;background:#e8edf4;color:#0b0d12;font-size:15px">Enter</button></div>');
    var err = function(t){ document.getElementById('bg-err').textContent = t; };
    var twoNames = function(n){ return String(n||'').trim().split(/\s+/).filter(Boolean).length >= 2; };
    var go = function(){
      var name = ((document.getElementById('bg-name') || {}).value || '').trim();
      var code = (document.getElementById('bg-code') || {}).value || '';
      if (pinOk(code) || pinOk(name)){ // admin PIN accepted from EITHER field
        try { localStorage.setItem(LS, JSON.stringify({ name: 'admin', code: atob('MjMyNQ==') })); } catch (e) {}
        pass(); return;
      }
      if (!twoNames(name)){ err('Enter your first and last name.'); return; }
      if (FREE){
        try { localStorage.setItem(LS, JSON.stringify({ free: true, name: name })); } catch (e) {}
        logFree(name); pass(); return;
      }
      var g = grantOf({ name: name, code: code }, list);
      if (okApp(g)){ try { localStorage.setItem(LS, JSON.stringify({ name: name, code: String(code).trim() })); } catch (e) {} setDk(dkEff(g, dkVisG, String(code).trim())); pass(); }
      else if (g.ok){ err('Your access doesn’t include this app. Ask the owner.'); }
      else { err('No match — check your name and code, or your access was turned off.'); }
    };
    document.getElementById('bg-go').addEventListener('click', go);
    ov.querySelectorAll('input').forEach(function(i){ i.addEventListener('keydown', function(e){ if (e.key === 'Enter') go(); }); });
    setTimeout(function(){ var i = document.getElementById('bg-name'); if (i) i.focus(); }, 200);
  }
  cover('<div style="color:#5c6b80;font:600 12px/1 ui-monospace,Menlo,monospace;letter-spacing:.16em;text-transform:uppercase">Checking access…</div>');
  (async function(){
    var list = null, dkVis = true;
    try { var r = await fetch(DOC + 'app_settings/board_access?key=' + MK, { cache: 'no-store' }); if (r.ok) list = parseMembers((await r.json()).fields || {}); } catch (e) {}
    try { var r2 = await fetch(DOC + 'app_settings/dk_auto?key=' + MK, { cache: 'no-store' }); if (r2.ok){ var f = (await r2.json()).fields || {}; if (f.dkVisible && f.dkVisible.booleanValue === false) dkVis = false; } } catch (e) {}
    dkVisG = dkVis;
    var s = saved();
    if (list === null){ // offline: trust a known device rather than lock it out on a network blip
      if (s && (s.free || s.name || (s.code && pinOk(s.code)))){ setDk(dkVis); pass(); return; }
      list = [];
    }
    var g = grantOf(s, list);
    setDk(g.ok ? dkEff(g, dkVis, (s && s.code) || '') : dkVis); // effective DK = global switch AND this member's DK mode (unlimited / 15-day pass / off)
    if (okApp(g)){ pass(); return; }
    showGate(list);
  })();
})();
</script>
