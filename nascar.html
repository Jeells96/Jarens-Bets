<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Pete's Picks — NASCAR</title>
<style>
:root{
  --bg:#0b0c10; --panel:#14161d; --face:#1c1f28; --hair:#2a2f3c; --hair2:#20242f;
  --tx:#eef1f6; --mt:#9aa4b5; --mt2:#616b7d; --speed:#ff4d4f; --good:#3ddc84; --bad:#ff5d73;
  --amber:#ffb454; --green:#3ddc84; --lock:#ff4d4f;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--tx);font:16px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding-bottom:calc(66px + env(safe-area-inset-bottom))}
header{position:sticky;top:0;z-index:20;background:rgba(11,12,16,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--hair2);padding:calc(10px + env(safe-area-inset-top)) 14px 10px;display:flex;align-items:center;gap:10px}
header h1{font-size:17px;margin:0;letter-spacing:-.01em}
header h1 span{color:var(--speed)}
.pill{font-size:10.5px;color:var(--mt2);border:1px solid var(--hair);border-radius:99px;padding:2px 8px;margin-left:auto;white-space:nowrap}
main{padding:12px;max-width:660px;margin:0 auto}
.card{background:var(--panel);border:1px solid var(--hair2);border-radius:13px;padding:13px;margin-bottom:11px}
.card h2{font-size:13px;margin:0 0 8px;color:var(--mt);text-transform:uppercase;letter-spacing:.09em}
.row{display:flex;align-items:center;gap:8px}
.grow{flex:1;min-width:0}
.small{font-size:12.8px}
.muted{color:var(--mt)}
.dim{color:var(--mt2)}
.btn{background:var(--speed);color:#160404;border:0;border-radius:9px;padding:11px 15px;font-weight:800;font-size:14px}
.btn.ghost{background:none;border:1px solid var(--hair);color:var(--tx);font-weight:600}
.btn:disabled{opacity:.5}
input[type=text]{background:var(--face);border:1px solid var(--hair);border-radius:9px;color:var(--tx);padding:9px 11px;font-size:15px}
nav{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;background:rgba(14,16,22,.97);backdrop-filter:blur(10px);border-top:1px solid var(--hair2);padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;border:0;color:var(--mt2);font-size:12px;padding:10px 0 9px;display:flex;flex-direction:column;gap:3px;align-items:center;font-weight:600}
nav button.on{color:var(--speed)}

</head>
<body>
<header>
  <img src="./logo-nascar.png" alt="Pete's Picks" style="height:42px;width:42px;border-radius:9px;object-fit:cover">
  <h1>Pete's Picks <span>NASCAR</span></h1>
  <span class="pill" id="verBadge"></span>
</header>
<main>
  <section id="tab-race" class="hidden"></section>
  <section id="tab-bets"></section>
  <section id="tab-facts" class="hidden"></section>
  <section id="tab-settings" class="hidden"></section>
</main>
<nav>
  <button data-tab="bets" class="on"><span class="ico">&#128274;</span>Bets</button>
  <button data-tab="race"><span class="ico">&#127937;</span>Next race</button>
  <button data-tab="facts"><span class="ico">&#128202;</span>Results</button>
  <button data-tab="settings"><span class="ico">&#9881;&#65039;</span>Settings</button>
</nav>
<div id="toast" class="hidden"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   Pete's Picks — NASCAR Edition. Walk-forward like The Key / Icing: every race
   projection uses ONLY races completed before it (no leakage). Projection-only
   (no DraftKings — our odds provider carries no motorsport). Model is a
   deterministic Poisson-binomial over driver strength → P(win), P(top 5/10/15),
   and head-to-head, graded against the real finishing order. ?cron=1 self-grades.
   ═══════════════════════════════════════════════════════════════════════════ */

/* ═══ SECTION: CONFIG ═══ */
const APP = { version: '0.1' };
const YEARS = (function(){ const y = (new Date()).getFullYear(); return [y - 1, y]; })(); // prior + current season for track history
const SEASON = { start: (YEARS[0]) + '-01-01' }; // retention floor = keep both seasons
const ESPN = {
  season: y => 'https://site.api.espn.com/apis/site/v2/sports/racing/nascar-premier/scoreboard?dates=' + y,
  next: () => 'https://site.api.espn.com/apis/site/v2/sports/racing/nascar-premier/scoreboard'
};
const CAT_META = {
  winner: { label: 'Race Winner', th: 'winner', short: 'Winner' },
  top5:   { label: 'Top 5 Finish', th: 'top5', short: 'Top 5' },
  top10:  { label: 'Top 10 Finish', th: 'top10', short: 'Top 10' },
  top15:  { label: 'Top 15 Finish', th: 'top15', short: 'Top 15' },
  h2h:    { label: 'Head-to-Head', th: 'h2h', short: 'H2H' }
};
const LOCK_DEFAULTS = { winner: 0, top5: 45, top10: 58, top15: 68, h2h: 60 };
// Recalibration: the raw Thurstonian model is well-calibrated up to ~55%, but
// over-optimistic in the tail (NASCAR's wreck/strategy chaos caps real top-10
// rates around 60% even for the best). Compress everything above 0.55 so the
// probabilities we DISPLAY and GRADE match reality. Fit on 2024→2025 walk-forward.
const recal = p => p <= 0.55 ? p : 0.55 + (p - 0.55) * 0.55;
const SIGMA = { super: 11, inter: 6.5, short: 6, road: 6 }; // finishing-position noise by track type
const MIN_RACES = 3;        // driver needs this many prior finishes for a real rating
const MIN_PRIOR_RACES = 8;  // races of history before we grade/project at all
/* ═══ MODEL LAB — tunable stat weights ═══════════════════════════════════════
   The model's stat weightings, exposed as knobs. Defaults reproduce today's
   behavior EXACTLY. The Board's Model Lab replays the whole stored season
   walk-forward under alternative weightings and reports what each does to the
   real success rate; applying a tuned set per bet category stores it in
   nascar/lab_cfg, which this app reads on open (one tiny doc — no slowdown).
     decay      — how fast old races fade (lower = recent races count more)
     typeW      — how much this track type's history counts vs overall form
     thinPen    — how far below field average a thin-history driver starts
     sigmaScale — race chaos: lower = model more decisive, higher = more cautious */
const MODEL_DEFAULTS = { decay: 0.94, typeW: 0.55, thinPen: 2, sigmaScale: 1 };
let MODEL_W = Object.assign({}, MODEL_DEFAULTS);
let LAB_CFG = null; // { cats: { top10: {decay,typeW,sigmaScale}, ... }, t }
const LAB_CATS = ['winner', 'top5', 'top10', 'top15', 'h2h'];
async function pullLabCfg(){
  try { const d = await fbRead(FB_NS, 'lab_cfg'); LAB_CFG = (d && d.cats && Object.keys(d.cats).length) ? d : null; return !!LAB_CFG; }
  catch (e){ return false; }
}
const state = {
  tab: 'bets', projections: {}, nextRace: null,
  seasonUnits: {}, settings: { lockThresholds: {}, hitTol: {} }, building: false, fieldExpanded: false, fieldDetailed: false, h2hExpanded: false, betsOpen: {}, whyOpen: null, betsDate: null
};

/* ═══ SECTION: STORE (localStorage + Firestore mirror) ═══ */
const FB = { projectId: 'nflbets-45561', apiKey: 'AIzaSyAznP57admgAtnJqnMu7uJ6WZYpYjrIP3g' };
const FB_NS = 'nascar';           // singleton docs: nascar/allTime, nascar/lockcfg, nascar/today
const FB_RECS = 'nascar_recs';    // per-date race records (finishing order)
const FB_ACC = 'nascar_accuracy'; // per-date raw graded units
function fbReady(){ return FB.projectId.length > 0; }
function fbDocUrl(col, doc){
  return 'https://firestore.googleapis.com/v1/projects/' + FB.projectId +
    '/databases/(default)/documents/' + col + '/' + doc + '?key=' + FB.apiKey;
}
async function fbRead(col, doc){
  if (!fbReady()) return null;
  const res = await fetch(fbDocUrl(col, doc));
  if (res.status === 404) return null;
  if (!res.ok) throw new Error('FB read ' + res.status);
  const j = await res.json();
  const s = j.fields && j.fields.data && j.fields.data.stringValue;
  return s ? JSON.parse(s) : null;
}
async function fbWrite(col, doc, obj){
  if (!fbReady()) return false;
  const body = { fields: { data: { stringValue: JSON.stringify(obj) }, t: { stringValue: new Date().toISOString() } } };
  const res = await fetch(fbDocUrl(col, doc) + '&updateMask.fieldPaths=data&updateMask.fieldPaths=t', {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('FB write ' + res.status);
  return true;
}
async function fbListCol(col){
  if (!fbReady()) return {};
  const out = {}; let tok = '';
  for (let page = 0; page < 4; page++){
    const url = 'https://firestore.googleapis.com/v1/projects/' + FB.projectId +
      '/databases/(default)/documents/' + col + '?pageSize=300&key=' + FB.apiKey + (tok ? '&pageToken=' + tok : '');
    const res = await fetch(url);
    if (!res.ok) throw new Error('FB list ' + res.status);
    const j = await res.json();
    for (const d of (j.documents || [])){
      const id = d.name.split('/').pop();
      const s = d.fields && d.fields.data && d.fields.data.stringValue;
      if (s){ try { out[id] = JSON.parse(s); } catch (e) {} }
    }
    tok = j.nextPageToken || '';
    if (!tok) break;
  }
  return out;
}
async function fbListColIds(col){ const o = await fbListCol(col); return Object.keys(o); }
const REC_PREFIX = 'nascar_recs_'; // one localStorage key per race date
function loadRecs(date){ try { return JSON.parse(localStorage.getItem(REC_PREFIX + date) || 'null'); } catch (e){ return null; } }
function saveRecs(date, recs){ try { localStorage.setItem(REC_PREFIX + date, JSON.stringify(recs)); return true; } catch (e){ return false; } }
function allRecDates(){
  const out = [];
  for (let i = 0; i < localStorage.length; i++){
    const k = localStorage.key(i);
    if (k && k.indexOf(REC_PREFIX) === 0) out.push(k.slice(REC_PREFIX.length));
  }
  return out.sort();
}
async function pullSharedLockCfg(){
  try {
    const cfg = await fbRead(FB_NS, 'lockcfg');
    if (!cfg) return false;
    state.settings.lockThresholds = Object.assign({}, state.settings.lockThresholds, cfg.lockThresholds || {});
    return true;
  } catch (e){ return false; }
}

/* ═══ SECTION: DATA (ESPN NASCAR Cup Series — public, one fetch per season) ═══ */
async function fetchJSON(url){
  const r = await fetch(url, { cache: 'no-store' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
function trackTypeOf(name){
  const s = String(name || '').toLowerCase();
  const has = arr => arr.some(k => s.indexOf(k) >= 0);
  if (has(['daytona', 'talladega', 'atlanta'])) return 'super';       // pack racing / drafting
  if (has(['watkins glen', 'sonoma', 'cota', 'circuit of', 'road america', 'roval', 'chicago', 'mexico', 'road course', 'grand prix'])) return 'road';
  if (has(['martinsville', 'bristol', 'richmond', 'phoenix', 'wilkesboro', 'iowa', 'loudon', 'new hampshire'])) return 'short';
  return 'inter'; // 1.5-mile intermediates + the rest
}
function parseEventRace(ev){
  const comp = (ev.competitions || [])[0] || {};
  const st = (ev.status || {}).type || {};
  if (!st.completed) return null;
  const drivers = [];
  for (const c of (comp.competitors || [])){
    if (c.order == null) continue; // non-starter / not classified
    const a = c.athlete || {};
    drivers.push({ id: String(a.id || c.id), name: a.displayName || a.shortName || '?', finish: +c.order, winner: !!c.winner });
  }
  if (drivers.length < 10) return null; // not a full race result
  const date = (ev.date || '').slice(0, 10);
  if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) return null;
  return { id: ev.id, date, race: ev.name || ev.shortName || 'Race', trackType: trackTypeOf((ev.name || '') + ' ' + (ev.shortName || '')), drivers };
}
async function buildData(onProg){
  // Frugal: each season file is ~4MB. Skip a PRIOR season already fully stored
  // (30+ race dates), and refetch the CURRENT season at most every 6 hours —
  // races are weekly, so anything fresher is wasted phone data. The cron runs
  // in a fresh browser (empty store), so it always does the full build.
  let built = 0, failed = 0;
  const curYear = (new Date()).getFullYear();
  const stampKey = 'nascar_lastbuild';
  let lastBuild = 0; try { lastBuild = +localStorage.getItem(stampKey) || 0; } catch (e) {}
  for (const y of YEARS){
    const haveY = allRecDates().filter(d => d.slice(0, 4) === String(y)).length;
    if (y < curYear && haveY >= 30) continue;                       // prior season complete
    if (y === curYear && haveY > 0 && Date.now() - lastBuild < 6 * 3600 * 1000) continue; // checked recently
    if (onProg) onProg('Fetching ' + y + ' season…');
    try {
      const j = await fetchJSON(ESPN.season(y));
      const byDate = {};
      for (const ev of (j.events || [])){
        const rec = parseEventRace(ev);
        if (!rec) continue;
        (byDate[rec.date] = byDate[rec.date] || []).push(rec);
      }
      for (const d in byDate){ saveRecs(d, byDate[d]); built += byDate[d].length; }
      if (y === curYear){ try { localStorage.setItem(stampKey, String(Date.now())); } catch (e) {} }
    } catch (e){ failed++; }
  }
  return { built, failed };
}
/* ESPN often titles races generically ('NASCAR Cup Series at Indianapolis').
   Map the CLASSIC, stable race names by venue + month — never sponsored names
   that change yearly (a wrong name would be worse than a generic one). */
function officialRaceName(name, dateStr){
  const m = +String(dateStr || '').slice(5, 7);
  const t = String(name || '').toLowerCase();
  if (/indianapolis/.test(t) && (m === 7 || m === 8)) return 'Brickyard 400';
  if (/charlotte/.test(t) && !/road/.test(t) && m === 5) return 'Coca-Cola 600';
  if (/darlington/.test(t) && (m === 8 || m === 9)) return 'Southern 500';
  if (/phoenix/.test(t) && m === 11) return 'Cup Series Championship';
  return null;
}
function raceTitle(){
  const nr = state.nextRace;
  if (!nr) return 'Next race';
  return nr.official || nr.name;
}
async function loadNextRace(){
  try {
    const j = await fetchJSON(ESPN.next());
    const ev = (j.events || [])[0];
    if (ev){
      const name = ev.name || ev.shortName || 'Next race';
      const date = (ev.date || '').slice(0, 10);
      state.nextRace = { name: name, date: date, official: officialRaceName(name, date), trackType: trackTypeOf((ev.name || '') + ' ' + (ev.shortName || '')) };
    }
  } catch (e) {}
  return state.nextRace;
}

/* ═══ SECTION: MODEL (deterministic — walk-forward driver ratings + Poisson-binomial) ═══ */
function priorRaces(beforeDate){
  const out = [];
  for (const d of allRecDates()){
    if (d >= beforeDate) break;
    const races = loadRecs(d);
    if (races) for (const r of races) out.push(r);
  }
  return out;
}
function recentRaces(n){
  const out = [];
  const dates = allRecDates().slice().reverse();
  for (const d of dates){
    const races = loadRecs(d);
    if (races) for (const r of races){ out.push(r); if (out.length >= n) return out; }
  }
  return out;
}
function inferField(){
  const seen = {};
  for (const race of recentRaces(3)) for (const d of race.drivers){ if (!seen[d.id]) seen[d.id] = { id: d.id, name: d.name }; }
  return Object.values(seen);
}
function driverRatings(prior, trackType){
  const hist = {}; let sumF = 0, nF = 0;
  for (const rec of prior){
    for (const d of rec.drivers){
      const h = hist[d.id] || (hist[d.id] = { finishes: [], typeFin: [], name: d.name });
      h.name = d.name; h.finishes.push(d.finish);
      if (rec.trackType === trackType) h.typeFin.push(d.finish);
      sumF += d.finish; nF++;
    }
  }
  const lgAvg = nF ? sumF / nF : 20;
  const decay = MODEL_W.decay;
  const wmean = arr => { if (!arr.length) return null; let s = 0, w = 0; const N = arr.length; for (let k = 0; k < N; k++){ const wt = Math.pow(decay, N - 1 - k); s += arr[k] * wt; w += wt; } return s / w; };
  const rating = {}, count = {}, names = {}, detail = {};
  for (const id in hist){
    const h = hist[id]; count[id] = h.finishes.length; names[id] = h.name;
    if (h.finishes.length < MIN_RACES){
      rating[id] = lgAvg + MODEL_W.thinPen;
      detail[id] = { n: h.finishes.length, overall: null, typeAvg: null, typeN: h.typeFin.length };
      continue; // thin history → just below field average
    }
    const overall = wmean(h.finishes);
    const typ = h.typeFin.length >= 2 ? wmean(h.typeFin) : null;
    rating[id] = typ != null ? MODEL_W.typeW * typ + (1 - MODEL_W.typeW) * overall : overall; // track-type-weighted
    detail[id] = { n: h.finishes.length, overall: overall, typeAvg: typ, typeN: h.typeFin.length };
  }
  return { rating, lgAvg, count, names, detail };
}
function erf(x){
  const s = x < 0 ? -1 : 1; x = Math.abs(x);
  const t = 1 / (1 + 0.3275911 * x);
  const y = 1 - (((((1.061405429 * t - 1.453152027) * t) + 1.421413741) * t - 0.284496736) * t + 0.254829592) * t * Math.exp(-x * x);
  return s * y;
}
function normCdf(z){ return 0.5 * (1 + erf(z / Math.SQRT2)); }
// P(driver i finishes top-K / wins) via a Thurstonian model: each driver's race
// pace ~ Normal(rating, sigma), lower finishes ahead. We integrate over driver
// i's own pace x; GIVEN x, the others' "finish ahead of i" events ARE independent,
// so their count is an exact Poisson-binomial. Deterministic → grades never drift.
// (A raw pairwise product would ignore that all pair events share i's pace and
// bias the win probability badly low.)
function finishProbs(ratings, i, sigma){
  const ri = ratings[i], K = 16, GN = 41, span = 4;
  let pWin = 0, pT5 = 0, pT10 = 0, pT15 = 0, wsum = 0;
  for (let g = 0; g < GN; g++){
    const z = -span + 2 * span * g / (GN - 1);
    const x = ri + sigma * z;            // a candidate pace for driver i
    const wpdf = Math.exp(-0.5 * z * z); // ∝ Normal(ri, sigma) density at x
    const pmf = new Array(K).fill(0); pmf[0] = 1;
    for (let j = 0; j < ratings.length; j++){
      if (j === i) continue;
      const q = normCdf((x - ratings[j]) / sigma); // P(j's pace < x) = P(j finishes ahead of i)
      for (let k = K - 1; k >= 1; k--) pmf[k] = pmf[k] * (1 - q) + pmf[k - 1] * q;
      pmf[0] = pmf[0] * (1 - q);
    }
    const cum = k => { let s = 0; for (let m = 0; m <= k && m < K; m++) s += pmf[m]; return s; };
    pWin += wpdf * pmf[0]; pT5 += wpdf * cum(4); pT10 += wpdf * cum(9); pT15 += wpdf * cum(14); wsum += wpdf;
  }
  return { pWin: recal(pWin / wsum), pTop5: recal(pT5 / wsum), pTop10: recal(pT10 / wsum), pTop15: recal(pT15 / wsum) };
}
function projectRaceBase(fieldDrivers, prior, trackType){
  const R = driverRatings(prior, trackType);
  const ids = fieldDrivers.map(d => d.id);
  const names = {}; fieldDrivers.forEach(d => names[d.id] = d.name);
  const ratings = ids.map(id => R.rating[id] != null ? R.rating[id] : R.lgAvg + MODEL_W.thinPen + 1);
  const sigma = (SIGMA[trackType] || SIGMA.inter) * MODEL_W.sigmaScale;
  const byId = {}; let favId = null, favP = -1;
  ids.forEach((id, i) => {
    const pr = finishProbs(ratings, i, sigma);
    byId[id] = { pWin: pr.pWin, pTop5: pr.pTop5, pTop10: pr.pTop10, pTop15: pr.pTop15, name: names[id], rating: ratings[i],
      why: Object.assign({ rating: ratings[i], field: ids.length }, R.detail[id] || { n: 0, overall: null, typeAvg: null, typeN: 0 }) };
    if (pr.pWin > favP){ favP = pr.pWin; favId = id; }
  });
  // Field rank for each driver (1 = strongest projected pace) — powers the why.
  ids.map(function(id){ return [id, byId[id].rating]; }).sort(function(a, b){ return a[1] - b[1]; })
    .forEach(function(pair, idx){ byId[pair[0]].why.rank = idx + 1; });
  // Head-to-head among the projected top 16 by rating (both tight + lopsided pairs).
  const ordered = ids.map((id, i) => [id, ratings[i]]).sort((a, b) => a[1] - b[1]).slice(0, 16);
  const sd = sigma * Math.SQRT2, h2h = [];
  for (let x = 0; x < ordered.length; x++) for (let y = x + 1; y < ordered.length; y++){
    const aId = ordered[x][0], ra = ordered[x][1], bId = ordered[y][0], rb = ordered[y][1];
    h2h.push({ aId, bId, aName: names[aId], bName: names[bId], p: normCdf((rb - ra) / sd) }); // P(a beats b)
  }
  return { byId, favId, h2h };
}
/* Per-category weight application: compute the default projection, then for
   each bet category the Board switched to tuned weights, recompute with those
   weights and take ONLY that category's numbers from the tuned run. Grading,
   the cron, and every screen all flow through here — the record you see is
   always the record of the weights that made the picks. */
function projectRace(fieldDrivers, prior, trackType){
  const base = projectRaceBase(fieldDrivers, prior, trackType);
  const cfg = LAB_CFG && LAB_CFG.cats;
  if (!cfg) return base;
  const groups = {};
  for (const cat of LAB_CATS){
    const w = cfg[cat];
    if (!w || !Object.keys(w).length) continue;
    const key = JSON.stringify(w);
    (groups[key] = groups[key] || { w: w, cats: [] }).cats.push(cat);
  }
  for (const key in groups){
    const g = groups[key];
    const old = MODEL_W; MODEL_W = Object.assign({}, MODEL_DEFAULTS, g.w);
    let tuned;
    try { tuned = projectRaceBase(fieldDrivers, prior, trackType); }
    finally { MODEL_W = old; }
    for (const cat of g.cats){
      if (cat === 'h2h') base.h2h = tuned.h2h;
      else if (cat === 'winner'){ base.favId = tuned.favId; for (const id in base.byId) if (tuned.byId[id]) base.byId[id].pWin = tuned.byId[id].pWin; }
      else { const pk = { top5: 'pTop5', top10: 'pTop10', top15: 'pTop15' }[cat]; for (const id in base.byId) if (tuned.byId[id]) base.byId[id][pk] = tuned.byId[id][pk]; }
    }
  }
  return base;
}

/* ═══ SECTION: GRADE (stored races vs projections — read-time thresholds) ═══ */
function lockTh(key){
  const lt = state.settings.lockThresholds || {};
  const v = +lt[key];
  return isFinite(v) && lt[key] !== '' && lt[key] != null ? Math.max(0, Math.min(99, v)) : LOCK_DEFAULTS[key];
}
function unitsFromRace(rec, proj){
  const units = [];
  const finById = {}; for (const d of rec.drivers) finById[d.id] = d.finish;
  const r = rec.race;
  // Winner — one unit per race: our single favorite. hit = they won.
  if (proj.favId && finById[proj.favId] != null){
    const f = proj.byId[proj.favId];
    units.push({ cat: 'winner', metric: Math.round(f.pWin * 100), hit: finById[proj.favId] === 1, race: r,
      desc: r + ' — pick ' + f.name + ' to win (' + Math.round(f.pWin * 100) + '%) → P' + finById[proj.favId] });
  }
  // Finish-position — one unit per driver per bucket; the lock threshold surfaces the strong calls.
  for (const id in proj.byId){
    const f = proj.byId[id]; const fin = finById[id];
    if (fin == null) continue;
    units.push({ cat: 'top5', metric: Math.round(f.pTop5 * 100), hit: fin <= 5, race: r, desc: f.name + ' top 5 ' + Math.round(f.pTop5 * 100) + '% → P' + fin });
    units.push({ cat: 'top10', metric: Math.round(f.pTop10 * 100), hit: fin <= 10, race: r, desc: f.name + ' top 10 ' + Math.round(f.pTop10 * 100) + '% → P' + fin });
    units.push({ cat: 'top15', metric: Math.round(f.pTop15 * 100), hit: fin <= 15, race: r, desc: f.name + ' top 15 ' + Math.round(f.pTop15 * 100) + '% → P' + fin });
  }
  // Head-to-head — hit = stronger driver actually finished ahead.
  for (const m of proj.h2h){
    const fa = finById[m.aId], fb = finById[m.bId];
    if (fa == null || fb == null) continue;
    units.push({ cat: 'h2h', metric: Math.round(m.p * 100), hit: fa < fb, race: r, desc: m.aName + ' beats ' + m.bName + ' ' + Math.round(m.p * 100) + '% → P' + fa + ' vs P' + fb });
  }
  return units;
}
function unitQualifies(u){ return u.metric >= lockTh(CAT_META[u.cat].th); }
function aggregateUnits(units){
  const cats = {};
  for (const k in CAT_META) cats[k] = { hit: 0, n: 0, label: CAT_META[k].label };
  const all = { hit: 0, n: 0, label: 'All Locks' };
  for (const u of units){
    if (!cats[u.cat] || !unitQualifies(u)) continue;
    cats[u.cat].n++; if (u.hit) cats[u.cat].hit++;
    all.n++; if (u.hit) all.hit++;
  }
  return Object.assign({ allLocks: all }, cats);
}
async function regradeAll(onProg){
  state.seasonUnits = {};
  const dates = allRecDates();
  let graded = 0, unitCount = 0, skipped = 0;
  for (let i = 0; i < dates.length; i++){
    const d = dates[i];
    const races = loadRecs(d);
    if (!races || !races.length) continue;
    const prior = priorRaces(d);
    if (prior.length < MIN_PRIOR_RACES){ skipped++; continue; } // not enough history yet — honest
    if (onProg && i % 4 === 0) onProg('Grading ' + d + '…');
    await new Promise(r => setTimeout(r, 0));
    for (const rec of races){
      const proj = projectRace(rec.drivers, prior, rec.trackType);
      const units = unitsFromRace(rec, proj);
      if (units.length){ (state.seasonUnits[d] = state.seasonUnits[d] || []).push.apply(state.seasonUnits[d], units); unitCount += units.length; }
    }
    graded++;
  }
  return { graded, unitCount, skipped };
}
function flatUnits(){ let out = []; for (const d of Object.keys(state.seasonUnits).sort()) out = out.concat(state.seasonUnits[d]); return out; }

/* Plain-English bet copy — one idea per row, ONE number per row (that pick's

const CAT_PLAIN = {
  winner: { tag: 'WINNER', what: 'wins the race' },
  top5:   { tag: 'TOP 5',  what: 'finishes 5th or better' },
  top10:  { tag: 'TOP 10', what: 'finishes 10th or better' },

function bestBetsList(up, cap){
  // Every qualifying lock across all bet types, strongest first. A driver can
  // appear under EVERY bucket they clear (Top 5 AND Top 10 AND Top 15) — each
  // is a separate real bet, and Top 15 is our most accurate one.
  const P = up.proj, bets = [];
  const fav = P.favId && P.byId[P.favId];
  if (fav && fav.pWin * 100 >= lockTh('winner')) bets.push({ conf: fav.pWin * 100, drv: fav.name, aId: P.favId, txt: tapName(fav.name, whyToken('winner', P.favId)) + ' wins the race', cat: 'Winner', catKey: 'winner' });
  for (const id in P.byId){
    const d = P.byId[id];
    if (d.pTop5 * 100 >= lockTh('top5')) bets.push({ conf: d.pTop5 * 100, drv: d.name, aId: id, txt: tapName(d.name, whyToken('top5', id)) + ' finishes 5th or better', cat: 'Top 5', catKey: 'top5' });
    if (d.pTop10 * 100 >= lockTh('top10')) bets.push({ conf: d.pTop10 * 100, drv: d.name, aId: id, txt: tapName(d.name, whyToken('top10', id)) + ' finishes 10th or better', cat: 'Top 10', catKey: 'top10' });
    if (d.pTop15 * 100 >= lockTh('top15')) bets.push({ conf: d.pTop15 * 100, drv: d.name, aId: id, txt: tapName(d.name, whyToken('top15', id)) + ' finishes 15th or better', cat: 'Top 15', catKey: 'top15' });
  }
  for (const m of P.h2h){ if (m.p * 100 >= lockTh('h2h')) bets.push({ conf: m.p * 100, drv: m.aName, aId: m.aId, bId: m.bId, txt: tapName(m.aName, whyToken('h2h', m.aId, m.bId)) + ' finishes ahead of ' + esc(m.bName), cat: 'Matchup', catKey: 'h2h' }); }
  // Rank by what has actually CASHED: the bet type's all-time success rate
  // leads, the pick's own confidence breaks ties within a type.
  bets.forEach(function(b){ const r = catRate(b.catKey); b.catPct = r ? r.pct : 0; });
  bets.sort((a, b) => (b.catPct - a.catPct) || (b.conf - a.conf));
  if (!cap) return bets;
  // Capped summary view: one bet per driver (their strongest) for variety.
  const seen = {}, out = [];
  for (const b of bets){ if (seen[b.drv]) continue; seen[b.drv] = 1; out.push(b); if (out.length >= cap) break; }
  return out;
}
// ── WHY a grade is what it is — shown when a driver row is tapped ──────────

    parts.push('<b>' + esc(d.name) + '</b> projects a P' + w.rating.toFixed(1) + ' pace vs <b>' + esc(e.name) + '</b> at P' + e.why.rating.toFixed(1) +

/* ═══ SECTION: CRON (?cron=1 — headless grading, same model the app uses) ═══ */
async function runCronGrade(){
  const clog = m => { window.__cronStatus = 'cron: ' + m; try { console.log('[nascar] ' + m); } catch (e) {} };
  window.__cronStatus = 'cron: starting';
  try {
    clog('applying shared lock config');
    try { await pullSharedLockCfg(); } catch (e) {}
    try { if (await pullLabCfg()) clog('Model Lab weights active for: ' + Object.keys(LAB_CFG.cats).join(', ')); } catch (e) {}
    const seeded = await seedFromFB(clog);
    clog('seeded ' + seeded + ' race dates from ' + FB_RECS);
    let espnOK = false;
    try { const j = await fetchJSON(ESPN.season(YEARS[YEARS.length - 1])); espnOK = !!(j && j.events); clog('ESPN probe ' + YEARS[YEARS.length - 1] + ': ' + ((j.events || []).length) + ' events'); }
    catch (e){ clog('ESPN probe FAILED — runner IP likely blocked (retries next run)'); }
    if (espnOK){ const b = await buildData(clog); clog('build: +' + b.built + ' races (' + b.failed + ' season fetch failures)'); }
    const after = allRecDates().length;
    if (!after){
      if (!espnOK){ clog('SKIPPED — ESPN refused this runner and the cloud has no records yet. Next run gets a fresh IP.'); window.__cronDone = true; return; }
      throw new Error('0 race dates after build despite ESPN probe OK');
    }
    clog('regrading (walk-forward)');
    const g = await regradeAll(clog);
    clog('graded ' + g.graded + ' races · ' + g.unitCount + ' units · ' + g.skipped + ' early races skipped');
    if (!g.unitCount) throw new Error('0 graded units after regrade — see log');
    clog('pushing units to ' + FB_ACC);
    const pushed = await pushUnitsFB(clog);
    clog('mirroring race records to ' + FB_RECS);
    const mirrored = await pushRecsFB(clog);
    /* RETENTION: keep the last two seasons — prune older docs. */
    try {
      let pruned = 0;
      for (const col of [FB_RECS, FB_ACC]){
        const ids = await fbListColIds(col);
        for (const id of ids){
          if (/^\d{4}-\d{2}-\d{2}$/.test(id) && id < SEASON.start){
            try { await fetch(fbDocUrl(col, id), { method: 'DELETE' }); pruned++; } catch (e) {}
            await new Promise(r => setTimeout(r, 45));
          }
        }
      }
      if (pruned) clog('retention: pruned ' + pruned + ' old docs');
    } catch (e) {}
    const agg = aggregateUnits(flatUnits());
    const entries = Object.keys(agg).filter(k => k !== 'allLocks' && agg[k].n >= 15)
      .map(k => ({ label: agg[k].label, pct: Math.round(100 * agg[k].hit / Math.max(1, agg[k].n)), n: agg[k].n }))
      .sort((a, b) => b.pct - a.pct).slice(0, 3);
    const catsOut = {};
    for (const k in CAT_META){ const c = agg[k]; if (c && c.n) catsOut[k] = { hit: c.hit, n: c.n, label: c.label }; }
    const summary = { t: new Date().toISOString(), all: { hit: agg.allLocks.hit, n: agg.allLocks.n }, top: entries, cats: catsOut };
    await fbWrite(FB_NS, 'allTime', summary);
    const check = await fbRead(FB_NS, 'allTime');
    if (!check || !check.all || check.all.n !== summary.all.n) throw new Error('summary verify failed — wrote n=' + summary.all.n + ' but read back ' + JSON.stringify(check && check.all));
    /* SUPER LOCKS: publish the next race's qualifying locks for the Board. */
    try {
      await loadNextRace();
      const up = projectUpcoming();
      const tlocks = [];
      if (up){
        const P = up.proj, fav = P.favId && P.byId[P.favId];
        if (fav && fav.pWin * 100 >= lockTh('winner')) tlocks.push({ cat: 'winner', desc: fav.name + ' wins the race', metric: Math.round(fav.pWin * 100) });
        for (const id in P.byId){
          const d = P.byId[id];
          if (d.pTop5 * 100 >= lockTh('top5')) tlocks.push({ cat: 'top5', desc: d.name + ' finishes 5th or better', metric: Math.round(d.pTop5 * 100) });
          if (d.pTop10 * 100 >= lockTh('top10')) tlocks.push({ cat: 'top10', desc: d.name + ' finishes 10th or better', metric: Math.round(d.pTop10 * 100) });
          if (d.pTop15 * 100 >= lockTh('top15')) tlocks.push({ cat: 'top15', desc: d.name + ' finishes 15th or better', metric: Math.round(d.pTop15 * 100) });
        }
        for (const m of P.h2h){ if (m.p * 100 >= lockTh('h2h')) tlocks.push({ cat: 'h2h', desc: m.aName + ' finishes ahead of ' + m.bName, metric: Math.round(m.p * 100) }); }
      }
      await fbWrite(FB_NS, 'today', { date: todayPT(), locks: tlocks });
      clog('published ' + tlocks.length + ' lock(s) to nascar/today');
    } catch (e){ clog('today-locks publish warn: ' + (e && e.message || e)); }
    clog('done — ' + after + ' race dates, ' + g.unitCount + ' units, ' + pushed + ' unit docs, ' + mirrored + ' race docs, nascar/allTime verified (' + summary.all.hit + '/' + summary.all.n + ' locks)');
  } catch (e){ window.__cronStatus = 'cron: ERROR — ' + (e && e.message || e); }
  window.__cronDone = true;
}

/* ═══ SECTION: MODEL LAB (?lab=1 — on-demand weight search, run from the Board) ═══ */
async function runLab(){
  const say = m => { window.__labStatus = 'lab: ' + m; try { console.log('[nascar lab] ' + m); } catch (e) {} };
  say('starting');
  try {
    try { await pullSharedLockCfg(); } catch (e) {}
    await seedFromFB();
    try { await buildData(); } catch (e) {}
    const dates = allRecDates();
    if (dates.length < 8) throw new Error('only ' + dates.length + ' stored race dates — need 8+ to learn from');
    const evalW = async w => {
      const old = MODEL_W; MODEL_W = Object.assign({}, MODEL_DEFAULTS, w);
      const cats = {}; LAB_CATS.forEach(c => { cats[c] = { hit: 0, n: 0 }; });
      try {
        for (const d of dates){
          const races = loadRecs(d); if (!races) continue;
          const prior = priorRaces(d);
          if (prior.length < MIN_PRIOR_RACES) continue;
          await new Promise(r => setTimeout(r, 0));
          for (const rec of races){
            const proj = projectRaceBase(rec.drivers, prior, rec.trackType);
            for (const u of unitsFromRace(rec, proj)){
              if (!cats[u.cat] || !unitQualifies(u)) continue;
              cats[u.cat].n++; if (u.hit) cats[u.cat].hit++;
            }
          }
        }
      } finally { MODEL_W = old; }
      for (const c in cats) cats[c].pct = cats[c].n ? Math.round(1000 * cats[c].hit / cats[c].n) / 10 : null;
      return cats;
    };
    const GRID = [];
    for (const decay of [0.88, 0.94, 0.985])
      for (const typeW of [0.3, 0.55, 0.8])
        for (const sigmaScale of [0.85, 1, 1.2]) GRID.push({ decay, typeW, sigmaScale });
    const results = [];
    for (let i = 0; i < GRID.length; i++){
      say('testing weight set ' + (i + 1) + '/' + GRID.length);
      results.push({ w: GRID[i], cats: await evalW(GRID[i]) });
    }
    const base = results.find(r => r.w.decay === MODEL_DEFAULTS.decay && r.w.typeW === MODEL_DEFAULTS.typeW && r.w.sigmaScale === MODEL_DEFAULTS.sigmaScale);
    const MIN_N = { winner: 10, top5: 20, top10: 20, top15: 20, h2h: 40 };
    const best = {};
    for (const cat of LAB_CATS){
      let b = null;
      for (const r of results){
        const c = r.cats[cat];
        if (!c || c.pct == null || c.n < (MIN_N[cat] || 20)) continue;
        if (!b || c.pct > b.pct || (c.pct === b.pct && c.n > b.n)) b = { pct: c.pct, hit: c.hit, n: c.n, weights: r.w };
      }
      if (b) best[cat] = b;
    }
    const th = {}; LAB_CATS.forEach(c => { th[c] = lockTh(c); });
    const report = { t: new Date().toISOString(), app: 'nascar', races: dates.length, tried: GRID.length,
      thresholds: th, defaults: MODEL_DEFAULTS, base: base ? base.cats : null, best: best };
    await fbWrite(FB_NS, 'labReport', report);
    say('done — report published to nascar/labReport');
    window.__labDone = true;
    try { parent.postMessage({ type: 'lab-done', app: 'nascar' }, '*'); } catch (e) {}
  } catch (e){
    window.__labStatus = 'lab: ERROR — ' + (e && e.message || e);
    window.__labDone = true;
    try { parent.postMessage({ type: 'lab-error', app: 'nascar', msg: String(e && e.message || e) }, '*'); } catch (e2) {}
  }
}

/* ═══ SECTION: BOOT ═══ */
(function boot(){
  $id('verBadge').textContent = 'v' + APP.version + ' · walk-forward';
  document.querySelectorAll('nav button').forEach(b => b.onclick = () => switchTab(b.getAttribute('data-tab')));

  loadNextRace().then(() => rerenderCurrent());
  switchTab(state.tab); // Bets is the front page
  setTimeout(() => { buildFactsBackground(); }, 1000);
})();

    var mode = (g && g.dkMode) || 'unlimited';
    if (mode === 'off') return false;
    if (mode === 'limited') return (new Date()).getDate() <= 15;
    return true;
  }
  function cover(html){
    if (ov) ov.remove();
    ov = document.createElement('div');
    ov.style.cssText = 'position:fixed;inset:0;z-index:2147483000;background:#0a0d12;color:#e8edf4;display:flex;align-items:center;justify-content:center;padding:24px;font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif';
    ov.innerHTML = html;
    document.body.appendChild(ov);
    document.documentElement.style.overflow = 'hidden';
  }
  function pass(){ if (ov){ ov.remove(); ov = null; } document.documentElement.style.overflow = ''; }
  function inp(id, ph, cap){ return '<input id="' + id + '" placeholder="' + ph + '" autocomplete="off" autocapitalize="' + cap + '" style="width:100%;box-sizing:border-box;background:#182231;border:1px solid #243146;border-radius:9px;color:#e8edf4;padding:12px;font-size:16px;margin-bottom:10px">'; }
  function logFree(name){
    try {
      fetch(DOC + 'app_settings/free_log?key=' + MK).then(function(r){ return r.ok ? r.json() : null; }).then(function(j){
        var arr = []; try { arr = JSON.parse((((j || {}).fields || {}).list || {}).stringValue || '[]'); } catch (e) {}
        if (!arr.some(function(x){ return norm(x.n) === norm(name); })) arr.unshift({ n: name, t: Date.now() });
        arr = arr.slice(0, 200);
        fetch(DOC + 'app_settings/free_log?key=' + MK + '&updateMask.fieldPaths=list', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fields: { list: { stringValue: JSON.stringify(arr) } } }) });
      }).catch(function(){});
    } catch (e) {}
  }
  function showGate(list){
    var fields = FREE
      ? inp('bg-name', 'Your name', 'words')
      : inp('bg-name', 'Your name', 'words') + inp('bg-code', 'Access code', 'none');
    cover('<div style="width:100%;max-width:340px;text-align:center">' +
      '<div style="font-size:26px;font-weight:800;margin-bottom:6px">Members only</div>' +
      '<div style="color:#8fa0b5;font-size:14px;line-height:1.5;margin-bottom:16px">' + (FREE ? 'Enter your first and last name to use the free app.' : 'Enter your first and last name, and your access code.') + '</div>' +
      fields +
      '<div id="bg-err" style="color:#ff7a7a;font-size:12.5px;min-height:16px;margin:6px 0"></div>' +
      '<button id="bg-go" style="width:100%;border:0;border-radius:9px;padding:13px;font-weight:800;background:#e8edf4;color:#0b0d12;font-size:15px">Enter</button></div>');
    var err = function(t){ document.getElementById('bg-err').textContent = t; };
    var twoNames = function(n){ return String(n||'').trim().split(/\s+/).filter(Boolean).length >= 2; };
    var go = function(){
      var name = ((document.getElementById('bg-name') || {}).value || '').trim();
      var code = (document.getElementById('bg-code') || {}).value || '';
      if (pinOk(code) || pinOk(name)){
        try { localStorage.setItem(LS, JSON.stringify({ name: 'admin', code: atob('MjMyNQ==') })); } catch (e) {}
        pass(); return;
      }
      if (!twoNames(name)){ err('Enter your first and last name.'); return; }
      if (FREE){
        try { localStorage.setItem(LS, JSON.stringify({ free: true, name: name })); } catch (e) {}
        logFree(name); pass(); return;
      }
      var g = grantOf({ name: name, code: code }, list);
      if (okApp(g)){ try { localStorage.setItem(LS, JSON.stringify({ name: name, code: String(code).trim() })); } catch (e) {} setDk(dkEff(g, dkVisG, String(code).trim())); pass(); }
      else if (g.ok){ err('Your access doesn’t include this app. Ask the owner.'); }
      else { err('No match — check your name and code, or your access was turned off.'); }
    };
    document.getElementById('bg-go').addEventListener('click', go);
    ov.querySelectorAll('input').forEach(function(i){ i.addEventListener('keydown', function(e){ if (e.key === 'Enter') go(); }); });
    setTimeout(function(){ var i = document.getElementById('bg-name'); if (i) i.focus(); }, 200);
  }
  cover('<div style="color:#5c6b80;font:600 12px/1 ui-monospace,Menlo,monospace;letter-spacing:.16em;text-transform:uppercase">Checking access…</div>');
  (async function(){
    var list = null, dkVis = true;
    try { var r = await fetch(DOC + 'app_settings/board_access?key=' + MK, { cache: 'no-store' }); if (r.ok) list = parseMembers((await r.json()).fields || {}); } catch (e) {}
    try { var r2 = await fetch(DOC + 'app_settings/dk_auto?key=' + MK, { cache: 'no-store' }); if (r2.ok){ var f = (await r2.json()).fields || {}; if (f.dkVisible && f.dkVisible.booleanValue === false) dkVis = false; } } catch (e) {}
    dkVisG = dkVis;
    var s = saved();
    if (list === null){
      if (s && (s.free || s.name || (s.code && pinOk(s.code)))){ setDk(dkVis); pass(); return; }
      list = [];
    }
    var g = grantOf(s, list);
    setDk(g.ok ? dkEff(g, dkVis, (s && s.code) || '') : dkVis);
    if (okApp(g)){ pass(); return; }
    showGate(list);
  })();
})();
