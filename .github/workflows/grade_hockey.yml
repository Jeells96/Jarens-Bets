name: Grade - IceLine

on:
  workflow_dispatch:
  schedule:
    - cron: "41 */2 * * *"

concurrency:
  group: grade-hockey
  cancel-in-progress: false

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium
      - name: Grade IceLine
        run: node grade_cron.js hockey
