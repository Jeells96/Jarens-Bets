name: Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: "35 13 * * *"

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check every app's live record
        run: node health_check.js
