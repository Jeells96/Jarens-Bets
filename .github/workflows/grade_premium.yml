name: Grade - Diamond IQ Premium

on:
  workflow_dispatch:
  schedule:
    # Hourly: re-checks lineup confirmations and locks picks in as they post.
    - cron: "37 * * * *"

concurrency:
  group: grade-premium
  cancel-in-progress: false

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium
      - name: Grade Premium
        run: node grade_cron.js premium
