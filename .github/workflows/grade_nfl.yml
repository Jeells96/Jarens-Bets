name: Grade - Gridline

on:
  workflow_dispatch:
  schedule:
    - cron: "9 */6 * * *"

concurrency:
  group: grade-nfl
  cancel-in-progress: false

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium
      - name: Grade Gridline
        run: node grade_cron.js nfl
