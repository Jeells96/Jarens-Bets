name: DK Pull - Board Scheduled

on:
  workflow_dispatch:
  schedule:
    # Hourly sweep; each app decides for itself (via the Board's settings doc)
    # whether this hour is one of its configured pull times. Off-hours cost
    # nothing — the page reports "skipped" without touching the odds API.
    - cron: "20 * * * *"

concurrency:
  group: dk-pull
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium
      - name: DK pull (Premium + Gridline)
        run: node dk_pull.js
